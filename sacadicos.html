<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sacádicos Voice Pro v2.5 - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --acc: #a855f7; --txt: #f8fafc; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--txt); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .screen { background: rgba(15, 23, 42, 0.95); padding: 1.8rem; border-radius: 2.5rem; border: 1px solid rgba(168, 85, 247, 0.3); text-align: center; width: 90%; max-width: 420px; z-index: 100; display: none; backdrop-filter: blur(12px); }
        .active { display: block; animation: zoomIn 0.15s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        h1 { font-size: 1.6rem; color: var(--acc); margin-bottom: 0.8rem; font-weight: 900; text-transform: uppercase; }
        .instrucciones { text-align: left; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; }
        .rule { display: flex; align-items: center; margin-bottom: 0.8rem; font-size: 0.9rem; font-weight: 700; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
        .go { background: var(--success); } .stop { background: var(--danger); }
        .config-box { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 1.5rem; margin-bottom: 1rem; }
        input[type="range"] { width: 100%; accent-color: var(--acc); }
        .hud { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 1rem 1.5rem; font-weight: 900; font-size: 1rem; z-index: 50; background: linear-gradient(to bottom, rgba(2,6,23,0.9), transparent); }
        #game-area { display: none; width: 100vw; height: 100vh; position: relative; }
        .stimulus { position: absolute; font-size: var(--sz); color: var(--txt); transform: translate(-50%, -50%); font-weight: 900; text-shadow: 0 0 20px var(--acc); }
        .stimulus.inhibir { color: var(--danger); text-shadow: 0 0 20px var(--danger); }
        .btn { background: var(--success); color: #062d16; border: none; padding: 1rem; border-radius: 1.2rem; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%; box-shadow: 0 4px 0 #059669; transition: 0.1s; text-transform: uppercase; }
        #voice-indicator { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); padding: 8px 15px; background: rgba(168, 85, 247, 0.1); border-radius: 30px; font-size: 0.7rem; color: var(--acc); border: 1px solid rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body>

    <div class="hud" id="hud" style="display:none">
        <div style="color:var(--success)">S: <span id="h-ses">1/3</span></div>
        <div style="color:var(--acc)">LVL <span id="h-lvl">1</span></div>
        <div>⏱️ <span id="h-time">30</span>s</div>
    </div>

    <div id="s-intro" class="screen active">
        <h1>SACÁDICOS VOICE</h1>
        <div class="instrucciones">
            <div class="rule"><div class="dot go"></div> Di las LETRAS en voz alta.</div>
            <div class="rule"><div class="dot go"></div> Di números IMPARES (1, 3, 5...).</div>
            <div class="rule" style="color:var(--danger); margin-bottom:0;"><div class="dot stop"></div> Números PARES: ¡SILENCIO!</div>
        </div>
        <button class="btn" onclick="nextStep('s-intro', 's-config')">CONFIGURAR</button>
    </div>

    <div id="s-config" class="screen">
        <h1>PROTOCOLO</h1>
        <div class="config-box">
            <div style="margin-bottom:1rem; text-align:left;">
                <label style="font-size:0.8rem; color:var(--success); font-weight:700;">TRABAJO: <b id="v-work">30s</b></label>
                <input type="range" id="i-work" min="15" max="60" step="5" value="30" oninput="document.getElementById('v-work').innerText = this.value + 's'">
            </div>
            <div style="text-align:left;">
                <label style="font-size:0.8rem; color:var(--success); font-weight:700;">DESCANSO: <b id="v-rest">10s</b></label>
                <input type="range" id="i-rest" min="5" max="20" step="5" value="10" oninput="document.getElementById('v-rest').innerText = this.value + 's'">
            </div>
        </div>
        <button class="btn" onclick="initVoice()">EMPEZAR</button>
    </div>

    <div id="s-rest" class="screen">
        <h1 style="color:var(--success)">DESCANSO</h1>
        <div id="rest-timer" style="font-size: 5rem; font-weight: 900; color:var(--acc)">10</div>
    </div>

    <div id="s-levelup" class="screen">
        <h1 style="color:var(--acc)">¡NIVEL SUBIDO!</h1>
        <p>Aumentando dificultad...</p>
        <button class="btn" onclick="startNewLevel()">SIGUIENTE NIVEL</button>
    </div>

    <div id="game-area"></div>
    <div id="voice-indicator" style="display:none">🎙️ Escuchando...</div>
    <iframe name="target_silencioso" style="display:none;"></iframe>

    <script>
        let level = 1, currentVal = "", currentSerie = 1, autoJump, workTime, restTime, recognition;
        let hits = 0;
        const stimuli = "123456789HKMNPRTUVXY";
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";

        const AUDIO = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f) {
                const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.frequency.value = f; g.gain.setValueAtTime(0.05, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.1);
                o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + 0.1);
            }
        };

        function nextStep(h, s) {
            document.getElementById(h).style.display = 'none';
            document.getElementById(s).style.display = 'block';
            document.getElementById(s).classList.add('active');
        }

        function initVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = false; // Cambiado a false para mayor precisión al final de la palabra

            recognition.onresult = (e) => {
                const result = e.results[e.results.length - 1][0].transcript.toUpperCase();
                checkMatch(result);
            };
            
            recognition.onend = () => { if(document.getElementById('game-area').style.display !== 'none') recognition.start(); };
            
            workTime = parseInt(document.getElementById('i-work').value);
            restTime = parseInt(document.getElementById('i-rest').value);
            recognition.start();
            document.getElementById('s-config').style.display = 'none';
            document.getElementById('voice-indicator').style.display = 'block';
            startSerie();
        }

        function startSerie() {
            document.getElementById('s-rest').style.display = 'none';
            document.getElementById('s-levelup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('hud').style.display = 'flex';
            let timeLeft = workTime;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('h-time').innerText = timeLeft;
                document.getElementById('h-lvl').innerText = level;
                document.getElementById('h-ses').innerText = `${currentSerie}/3`;
                if(timeLeft <= 0) {
                    clearInterval(timer); clearTimeout(autoJump);
                    if(currentSerie >= 3) { enviarDatos(); nextStep('hud', 's-levelup'); }
                    else showRest();
                }
            }, 1000);
            spawn();
        }

        function spawn() {
            clearTimeout(autoJump);
            const area = document.getElementById('game-area');
            area.innerHTML = '';
            currentVal = stimuli[Math.floor(Math.random() * stimuli.length)];
            const isEven = !isNaN(currentVal) && (parseInt(currentVal) % 2 === 0);
            const stim = document.createElement('div');
            stim.className = 'stimulus' + (isEven ? ' inhibir' : '');
            stim.innerText = currentVal;
            const x = Math.random() * 60 + 20; const y = Math.random() * 60 + 20;
            stim.style.left = `${x}%`; stim.style.top = `${y}%`;
            stim.style.setProperty('--sz', `${Math.max(50, 140 - (level * 10))}px`);
            area.appendChild(stim);
            if(isEven) autoJump = setTimeout(() => spawn(), 1400);
        }

        function checkMatch(text) {
            // Diccionario expandido para errores fonéticos comunes
            const dict = { 
                "UNO":"1","DOS":"2","TRES":"3","CUATRO":"4","CINCO":"5","SEIS":"6","SIETE":"7","OCHO":"8","NUEVE":"9",
                "EQUIS":"X","YE":"Y","I":"Y","EME":"M","ENE":"N","PE":"P","TE":"T","DE":"T","VE":"V","U":"U"
            };
            
            let cleanText = text.trim();
            for (let key in dict) { if(cleanText.includes(key)) cleanText = dict[key]; }

            const isEven = !isNaN(currentVal) && (parseInt(currentVal) % 2 === 0);
            
            // Si el texto capturado contiene el valor actual y no es par
            if(!isEven && (cleanText.includes(currentVal) || text.includes(currentVal))) {
                AUDIO.play(1000);
                hits++;
                spawn();
            }
        }

        function showRest() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            nextStep('game-area', 's-rest');
            let c = restTime;
            const rTimer = setInterval(() => {
                c--; document.getElementById('rest-timer').innerText = c;
                if(c <= 0) { clearInterval(rTimer); currentSerie++; startSerie(); }
            }, 1000);
        }

        function startNewLevel() { level++; currentSerie = 1; startSerie(); }

        function enviarDatos() {
            const form = document.createElement("form");
            form.method = "POST"; form.action = formUrl; form.target = "target_silencioso";
            const data = {
                "entry.369874016": localStorage.getItem('pacienteActual') || "PACIENTE_VOICE",
                "entry.1353470174": "SACADICOS_VOICE_V2.5",
                "entry.721051298": hits,
                "entry.1303309812": level,
                "entry.845098414": new Date().toLocaleDateString()
            };
            for (let k in data) {
                const i = document.createElement("input"); i.type = "hidden"; i.name = k; i.value = data[k];
                form.appendChild(i);
            }
            document.body.appendChild(form); form.submit(); document.body.removeChild(form);
        }
    </script>
</body>
</html>
