<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sacádicos Voice Pro v2.4 - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --acc: #a855f7; --txt: #f8fafc; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--txt); 
            height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        
        .screen { 
            background: rgba(15, 23, 42, 0.95); padding: 1.8rem; border-radius: 2.5rem; 
            border: 1px solid rgba(168, 85, 247, 0.3); text-align: center; width: 90%; max-width: 420px; 
            z-index: 100; display: none; backdrop-filter: blur(12px);
        }
        .active { display: block; animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 1.6rem; color: var(--acc); margin-bottom: 0.8rem; font-weight: 900; text-transform: uppercase; }
        
        /* Estilo de Instrucciones */
        .instrucciones { text-align: left; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1rem; margin-bottom: 1.5rem; }
        .rule { display: flex; align-items: center; margin-bottom: 0.8rem; font-size: 0.9rem; font-weight: 700; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
        .go { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .stop { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        .config-box { background: rgba(0,0,0,0.4); padding: 1rem; border-radius: 1.5rem; margin-bottom: 1rem; }
        .config-group { margin-bottom: 1rem; text-align: left; }
        .config-group label { display: block; font-size: 0.8rem; margin-bottom: 0.4rem; color: var(--success); font-weight: 700; }
        
        input[type="range"] { width: 100%; accent-color: var(--acc); cursor: pointer; }
        
        .hud { 
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; 
            padding: 1rem 1.5rem; font-weight: 900; font-size: 1rem; z-index: 50; 
            background: linear-gradient(to bottom, rgba(2,6,23,0.9), transparent);
        }
        
        #game-area { display: none; width: 100vw; height: 100vh; position: relative; }
        .stimulus { position: absolute; font-size: var(--sz); color: var(--txt); transform: translate(-50%, -50%); font-weight: 900; text-shadow: 0 0 20px var(--acc); transition: opacity 0.2s; }
        .stimulus.inhibir { color: var(--danger); text-shadow: 0 0 20px var(--danger); }

        .btn { 
            background: var(--success); color: #062d16; border: none; padding: 1rem; 
            border-radius: 1.2rem; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%;
            box-shadow: 0 4px 0 #059669; transition: 0.1s; text-transform: uppercase;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #059669; }

        #voice-indicator {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            padding: 8px 15px; background: rgba(168, 85, 247, 0.1); border-radius: 30px;
            font-size: 0.7rem; color: var(--acc); border: 1px solid rgba(168, 85, 247, 0.2);
        }
    </style>
</head>
<body>

    <div class="hud" id="hud" style="display:none">
        <div style="color:var(--success)">S: <span id="h-ses">1/3</span></div>
        <div style="color:var(--acc)">LVL <span id="h-lvl">1</span></div>
        <div id="h-time-box">⏱️ <span id="h-time">30</span>s</div>
    </div>

    <div id="s-intro" class="screen active">
        <h1>SACÁDICOS VOICE</h1>
        <div class="instrucciones">
            <div class="rule"><div class="dot go"></div> Di las LETRAS en voz alta.</div>
            <div class="rule"><div class="dot go"></div> Di números IMPARES (1, 3, 5...).</div>
            <div class="rule" style="color:var(--danger); margin-bottom:0;"><div class="dot stop"></div> Números PARES: ¡SILENCIO!</div>
        </div>
        <p style="font-size: 0.8rem;">Mantenga la tablet a <b>40 cm</b>.</p>
        <button class="btn" onclick="nextStep('s-intro', 's-config')">CONFIGURAR</button>
    </div>

    <div id="s-config" class="screen">
        <h1>PROTOCOLO</h1>
        <div class="config-box">
            <div class="config-group">
                <label>TRABAJO: <b id="v-work">30s</b></label>
                <input type="range" id="i-work" min="15" max="60" step="5" value="30" oninput="document.getElementById('v-work').innerText = this.value + 's'">
            </div>
            <div class="config-group">
                <label>DESCANSO: <b id="v-rest">10s</b></label>
                <input type="range" id="i-rest" min="5" max="20" step="5" value="10" oninput="document.getElementById('v-rest').innerText = this.value + 's'">
            </div>
        </div>
        <button class="btn" onclick="initVoice()">EMPEZAR SESIÓN</button>
    </div>

    <div id="s-rest" class="screen">
        <h1 style="color:var(--success)">DESCANSO</h1>
        <p>Serie completada. Relaje la vista.</p>
        <div id="rest-timer" style="font-size: 5rem; font-weight: 900; color:var(--acc)">10</div>
    </div>

    <div id="s-levelup" class="screen">
        <h1 style="color:var(--acc)">¡NIVEL SUBIDO!</h1>
        <p>Mayor velocidad y menor tamaño.</p>
        <button class="btn" onclick="startNewLevel()">SIGUIENTE NIVEL</button>
    </div>

    <div id="game-area"></div>
    <div id="voice-indicator" style="display:none">🎙️ Micrófono Activo</div>

    <script>
        let level = 1, currentVal = "", currentSerie = 1, autoJump;
        let workTime, restTime, recognition;
        const stimuli = "123456789HKMNPRTUVXY"; 

        const AUDIO = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f, d) {
                try {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + d);
                } catch(e){}
            }
        };

        function nextStep(h, s) {
            document.getElementById(h).style.display = 'none';
            document.getElementById(s).style.display = 'block';
            document.getElementById(s).classList.add('active');
        }

        function initVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.onresult = (e) => {
                const result = e.results[e.results.length - 1][0].transcript.toUpperCase().trim();
                checkMatch(result.split(" ").pop());
            };
            recognition.onend = () => { if(document.getElementById('game-area').style.display !== 'none') recognition.start(); };
            
            workTime = parseInt(document.getElementById('i-work').value);
            restTime = parseInt(document.getElementById('i-rest').value);
            
            recognition.start();
            document.getElementById('s-config').style.display = 'none';
            document.getElementById('voice-indicator').style.display = 'block';
            startSerie();
        }

        function startSerie() {
            document.getElementById('s-rest').style.display = 'none';
            document.getElementById('s-levelup').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('hud').style.display = 'flex';
            let timeLeft = workTime;
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('h-time').innerText = timeLeft;
                document.getElementById('h-lvl').innerText = level;
                document.getElementById('h-ses').innerText = `${currentSerie}/3`;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    clearTimeout(autoJump);
                    if(currentSerie >= 3) nextStep('hud', 's-levelup');
                    else showRest();
                }
            }, 1000);
            spawn();
        }

        function spawn() {
            clearTimeout(autoJump);
            const area = document.getElementById('game-area');
            area.innerHTML = '';
            currentVal = stimuli[Math.floor(Math.random() * stimuli.length)];
            
            const isNumber = !isNaN(currentVal);
            const isEven = isNumber && (parseInt(currentVal) % 2 === 0);

            const stim = document.createElement('div');
            stim.className = 'stimulus' + (isEven ? ' inhibir' : '');
            stim.id = "active-stim";
            stim.innerText = currentVal;
            
            // Coordenadas seguras para celular
            const x = Math.random() > 0.5 ? (Math.random() * 22 + 10) : (Math.random() * 22 + 65);
            const y = Math.random() > 0.5 ? (Math.random() * 25 + 15) : (Math.random() * 25 + 55);
            stim.style.left = `${x}%`; stim.style.top = `${y}%`;
            stim.style.setProperty('--sz', `${Math.max(50, 140 - (level * 10))}px`);
            area.appendChild(stim);

            // Los pares saltan solos tras 1.4s
            if(isEven) autoJump = setTimeout(() => spawn(), 1400);
        }

        function checkMatch(input) {
            const dict = { "UNO":"1","DOS":"2","TRES":"3","CUATRO":"4","CINCO":"5","SEIS":"6","SIETE":"7","OCHO":"8","NUEVE":"9", "EQUIS":"X", "YE":"Y" };
            const finalInput = dict[input] || input;
            const isEven = !isNaN(currentVal) && (parseInt(currentVal) % 2 === 0);
            
            if(!isEven && finalInput.includes(currentVal)) {
                AUDIO.play(1000, 0.08);
                spawn();
            }
        }

        function showRest() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            nextStep('game-area', 's-rest');
            let c = restTime;
            document.getElementById('rest-timer').innerText = c;
            const rTimer = setInterval(() => {
                c--;
                document.getElementById('rest-timer').innerText = c;
                if(c <= 0) { clearInterval(rTimer); currentSerie++; startSerie(); }
            }, 1000);
        }

        function startNewLevel() { level++; currentSerie = 1; startSerie(); }
    </script>
</body>
</html>
