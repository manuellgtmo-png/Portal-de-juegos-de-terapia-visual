<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sacádicos Voice Pro v2.1 - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --acc: #a855f7; --txt: #f8fafc; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--txt); 
            height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; 
        }
        
        /* --- UI COMPACTA PARA CELULAR --- */
        .screen { 
            background: rgba(15, 23, 42, 0.95); padding: 1.5rem; border-radius: 2rem; 
            border: 1px solid rgba(168, 85, 247, 0.3); text-align: center; width: 85%; max-width: 400px; 
            z-index: 100; display: none; backdrop-filter: blur(10px);
        }
        .active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 1.6rem; color: var(--acc); margin-bottom: 0.8rem; font-weight: 900; }
        p { font-size: 0.9rem; margin-bottom: 1.2rem; color: #94a3b8; line-height: 1.4; }
        
        .config-box { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 1.2rem; margin-bottom: 1rem; }
        .config-group { margin-bottom: 1rem; text-align: left; }
        .config-group label { display: block; font-size: 0.8rem; margin-bottom: 0.3rem; color: var(--success); font-weight: 700; }
        
        input[type="range"] { width: 100%; accent-color: var(--acc); }
        
        .hud { 
            position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; 
            padding: 1rem 1.5rem; font-weight: 900; font-size: 1rem; z-index: 50; 
            background: linear-gradient(to bottom, rgba(2,6,23,0.9), transparent);
        }
        
        #game-area { display: none; width: 100vw; height: 100vh; position: relative; }
        
        .stimulus { 
            position: absolute; font-size: var(--sz); color: var(--txt); 
            transform: translate(-50%, -50%); font-weight: 900;
            text-shadow: 0 0 15px var(--acc);
            will-change: transform;
        }

        .btn { 
            background: var(--success); color: #062d16; border: none; padding: 1rem; 
            border-radius: 1rem; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%;
            box-shadow: 0 4px 0 #059669; transition: 0.1s; text-transform: uppercase;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #059669; }

        #voice-indicator {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 8px 15px; background: rgba(168, 85, 247, 0.15); border-radius: 20px;
            font-size: 0.7rem; color: var(--acc); border: 1px solid rgba(168, 85, 247, 0.3);
        }
    </style>
</head>
<body>

    <div class="hud" id="hud" style="display:none">
        <div style="color:var(--success)">S: <span id="h-ses">1</span></div>
        <div style="color:var(--acc)">LVL <span id="h-lvl">1</span></div>
        <div id="h-time-box">⏱️ <span id="h-time">30</span>s</div>
        <div id="h-lives">❤️❤️❤️</div>
    </div>

    <div id="s-intro" class="screen active">
        <h1>SACÁDICOS VOICE</h1>
        <p>Entrenamiento de saltos oculares.<br>Mantenga <b>40 cm</b> de distancia.</p>
        <button class="btn" onclick="nextStep('s-intro', 's-config')">CONFIGURAR</button>
    </div>

    <div id="s-config" class="screen">
        <h1>AJUSTES</h1>
        <div class="config-box">
            <div class="config-group">
                <label>TRABAJO: <b id="v-work">30s</b></label>
                <input type="range" id="i-work" min="15" max="60" step="5" value="30" oninput="document.getElementById('v-work').innerText = this.value + 's'">
            </div>
            <div class="config-group">
                <label>DESCANSO: <b id="v-rest">10s</b></label>
                <input type="range" id="i-rest" min="5" max="20" step="5" value="10" oninput="document.getElementById('v-rest').innerText = this.value + 's'">
            </div>
        </div>
        <button class="btn" onclick="initVoice()">INICIAR SESIÓN</button>
    </div>

    <div id="s-rest" class="screen">
        <h1 style="color:var(--success)">DESCANSO</h1>
        <p>Relaje la vista.</p>
        <div id="rest-timer" style="font-size: 4rem; font-weight: 900; color:var(--acc)">10</div>
    </div>

    <div id="s-end" class="screen">
        <h1>FIN DE SESIÓN</h1>
        <p>Datos enviados correctamente.</p>
        <div id="summary" style="text-align:left; font-size:0.8rem; background:rgba(0,0,0,0.3); padding:1rem; border-radius:1rem; margin-bottom:1rem;"></div>
        <button class="btn" onclick="location.reload()">NUEVO PACIENTE</button>
    </div>

    <div id="game-area"></div>
    <div id="voice-indicator" style="display:none">🎙️ Escuchando...</div>

    <iframe name="target_silencioso" style="display:none;"></iframe>

    <script>
        let level = 1, lives = 3, currentVal = "", currentSerie = 1;
        let workTime, restTime, recognition;
        let stats = { hits: 0, errors: 0 };
        const stimuli = "123456789HKMNPRTUVXY"; 
        const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";

        const AUDIO = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            play(f, type, d) {
                try {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.type = type; o.frequency.value = f;
                    g.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + d);
                } catch(e){}
            }
        };

        function nextStep(h, s) {
            document.getElementById(h).style.display = 'none';
            document.getElementById(s).style.display = 'block';
            document.getElementById(s).classList.add('active');
        }

        function initVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return alert("Usa Google Chrome.");

            workTime = parseInt(document.getElementById('i-work').value);
            restTime = parseInt(document.getElementById('i-rest').value);

            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                const result = e.results[e.results.length - 1][0].transcript.toUpperCase().trim();
                const cleanResult = result.split(" ").pop();
                checkMatch(cleanResult);
            };

            recognition.onend = () => { if(lives > 0 && document.getElementById('game-area').style.display !== 'none') recognition.start(); };
            
            recognition.start();
            document.getElementById('s-config').style.display = 'none';
            document.getElementById('voice-indicator').style.display = 'block';
            startSerie();
        }

        function startSerie() {
            document.getElementById('s-rest').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('hud').style.display = 'flex';
            
            let timeLeft = workTime;
            updateHUD(timeLeft);

            const timer = setInterval(() => {
                timeLeft--;
                updateHUD(timeLeft);
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    if(currentSerie >= 3) { endGame(); } 
                    else { showRest(); }
                }
            }, 1000);
            spawn();
        }

        function spawn() {
            const area = document.getElementById('game-area');
            area.innerHTML = '';
            currentVal = stimuli[Math.floor(Math.random() * stimuli.length)];
            
            const stim = document.createElement('div');
            stim.className = 'stimulus';
            stim.id = "active-stim";
            stim.innerText = currentVal;
            
            // Posiciones seguras para celular (10% a 80%)
            const x = Math.random() > 0.5 ? (Math.random() * 20 + 10) : (Math.random() * 20 + 65);
            const y = Math.random() > 0.5 ? (Math.random() * 25 + 15) : (Math.random() * 25 + 55);
            
            stim.style.left = `${x}%`;
            stim.style.top = `${y}%`;
            stim.style.setProperty('--sz', `${Math.max(50, 140 - (level * 8))}px`);
            
            area.appendChild(stim);
        }

        function checkMatch(input) {
            const normalizer = { "UNO":"1","DOS":"2","TRES":"3","CUATRO":"4","CINCO":"5","SEIS":"6","SIETE":"7","OCHO":"8","NUEVE":"9", "EQUIS":"X", "YE":"Y", "I":"Y" };
            const finalInput = normalizer[input] || input;

            if(finalInput.includes(currentVal)) {
                AUDIO.play(1000, 'sine', 0.08);
                stats.hits++;
                spawn();
            }
        }

        function updateHUD(t) {
            document.getElementById('h-time').innerText = t;
            document.getElementById('h-lvl').innerText = level;
            document.getElementById('h-ses').innerText = currentSerie;
            document.getElementById('h-lives').innerText = "❤️".repeat(lives);
        }

        function showRest() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('s-rest').style.display = 'block';
            document.getElementById('s-rest').classList.add('active');
            
            let c = restTime;
            document.getElementById('rest-timer').innerText = c;
            const rTimer = setInterval(() => {
                c--;
                document.getElementById('rest-timer').innerText = c;
                if(c <= 0) {
                    clearInterval(rTimer);
                    currentSerie++;
                    startSerie();
                }
            }, 1000);
        }

        function endGame() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('voice-indicator').style.display = 'none';
            nextStep('s-rest', 's-end');

            const score = Math.round((stats.hits / (stats.hits + stats.errors || 1)) * 100);
            
            document.getElementById('summary').innerHTML = `
                ACIERTOS: ${stats.hits}<br>
                NIVEL: ${level}<br>
                DISTANCIA: 40 cm
            `;

            enviarDatos(score);
        }

        function enviarDatos(p) {
            const form = document.createElement("form");
            form.method = "POST";
            form.action = formUrl;
            form.target = "target_silencioso";
            const data = {
                "entry.369874016": localStorage.getItem('pacienteActual') || "ANONIMO",
                "entry.1353470174": "SACADICOS_VOICE_V2.1",
                "entry.721051298": p,
                "entry.1303309812": level,
                "entry.845098414": new Date().toLocaleDateString()
            };
            for (let k in data) {
                const i = document.createElement("input");
                i.type = "hidden"; i.name = k; i.value = data[k];
                form.appendChild(i);
            }
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }
    </script>
</body>
</html>
