<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Túnel Snellen Pro - Perceptum Medical System v4.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ================================================================
           SISTEMA DE DISEÑO PERCEPTUM - ARQUITECTURA SNELLEN
           ================================================================
        */
        :root {
            --bg: #0b101b;
            --accent: #bc13fe;
            --neon: #00f2ff;
            --error: #ff4757;
            --success: #22c55e;
            --panel: rgba(28, 35, 49, 0.95);
            
            /* Unidades dinámicas para adaptabilidad total */
            --header-h: 10vh;
            --controls-h: 24vh;
            --stage-h: calc(100vh - var(--header-h) - var(--controls-h));
        }

        * {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: white;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        /* ----------------------------------------------------------------
           CABECERA DE MÉTRICAS (HEADER)
           ----------------------------------------------------------------
        */
        #header {
            height: var(--header-h);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--panel);
            border-bottom: 0.5vh solid var(--accent);
            box-shadow: 0 0.5vh 2vh rgba(0,0,0,0.5);
            position: relative;
            z-index: 1000;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 1.2vh;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--neon);
            font-weight: 700;
        }

        .stat-value {
            font-size: 2.8vh;
            font-weight: 900;
        }

        #v-lives {
            font-size: 3vh;
            letter-spacing: 0.5vw;
        }

        /* ----------------------------------------------------------------
           ESCENARIO DE ESTIMULACIÓN VISUAL (STAGE)
           ----------------------------------------------------------------
        */
        #stage {
            position: relative;
            width: 100%;
            height: var(--stage-h);
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1f2c 0%, #0b101b 100%);
            perspective: 1000px;
            overflow: hidden;
        }

        .snellen-e {
            position: absolute;
            font-weight: 900;
            color: white;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 0 2vh var(--neon);
            will-change: transform, opacity;
        }

        /* ----------------------------------------------------------------
           CONTROLES TÁCTILES Y ZONA DE SEGURIDAD
           ----------------------------------------------------------------
        */
        #controls-container {
            height: var(--controls-h);
            background: #161b2a;
            border-top: 0.3vh solid #2e3748;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Respetar área de gestos en móviles */
            padding-bottom: calc(1.5vh + env(safe-area-inset-bottom));
        }

        #controls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2vw;
            width: 92%;
            max-width: 600px;
            margin-bottom: 2vh; /* Margen para evitar el tope inferior */
        }

        .control-btn {
            background: #242b3d;
            border: 0.4vh solid var(--accent);
            border-radius: 2vh;
            color: white;
            font-size: 4.5vh;
            height: 10vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 0.6vh 0 var(--accent);
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            transform: translateY(0.4vh);
            box-shadow: 0 0.2vh 0 var(--accent);
            background: var(--accent);
        }

        /* ----------------------------------------------------------------
           CAPAS DE INTERFAZ (OVERLAYS & MODALS)
           ----------------------------------------------------------------
        */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 15, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            padding: 5vw;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: #1c2331;
            padding: 4vh 3vh;
            border-radius: 4vh;
            border: 0.6vh solid var(--accent);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .modal h1 {
            color: var(--neon);
            font-weight: 900;
            font-size: 4vh;
            margin-bottom: 2vh;
        }

        .step {
            display: flex;
            align-items: center;
            margin-bottom: 2vh;
            font-size: 1.8vh;
            text-align: left;
        }

        .step-num {
            background: var(--accent);
            width: 3.5vh;
            height: 3.5vh;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            margin-right: 2vh;
            flex-shrink: 0;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--accent), var(--neon));
            color: white;
            padding: 2.5vh;
            border-radius: 2vh;
            border: none;
            font-weight: 900;
            width: 100%;
            margin-top: 2vh;
            text-transform: uppercase;
            font-size: 2.2vh;
            letter-spacing: 1px;
        }

        .flash-red { background-color: var(--error) !important; }
        .flash-green { background-color: var(--success) !important; }

        #result-table {
            width: 100%;
            margin: 2vh 0;
        }

        #result-table td {
            padding: 1.5vh;
            font-size: 2vh;
            border-bottom: 1px solid #3e4859;
        }
    </style>
</head>
<body>

    <div id="header">
        <div class="stat-box">
            <span class="stat-label">Nivel</span>
            <span id="v-lvl" class="stat-value">1</span>
        </div>
        <div id="v-lives">❤️❤️❤️</div>
        <div class="stat-box">
            <span class="stat-label">Aciertos</span>
            <span class="stat-value"><span id="v-hits">0</span>/7</span>
        </div>
    </div>

    <div id="stage"></div>

    <div id="controls-container">
        <div id="controls-grid"></div>
    </div>

    <div id="intro-modal" class="overlay">
        <div class="modal">
            <h1>TÚNEL SNELLEN</h1>
            <div style="margin: 3vh 0;">
                <div class="step"><div class="step-num">1</div><div>Identifica la orientación de la "E".</div></div>
                <div class="step"><div class="step-num">2</div><div>Presiona la flecha correcta rápido.</div></div>
                <div class="step"><div class="step-num">3</div><div>¡Los botones cambian de lugar!</div></div>
            </div>
            <button class="btn-main" onclick="startGame()">¡EMPEZAR!</button>
        </div>
    </div>

    <div id="level-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h2 id="lvl-title" style="color:var(--neon); font-weight:900; font-size: 3.5vh;">¡NIVEL SUPERADO!</h2>
            <p id="lvl-msg" style="font-size: 2vh; margin: 3vh 0;">Preparando el siguiente desafío...</p>
            <button class="btn-main" onclick="nextLevel()">CONTINUAR</button>
        </div>
    </div>

    <div id="res-modal" class="overlay" style="display:none;">
        <div class="modal">
            <h1>FIN DEL JUEGO</h1>
            <table id="result-table">
                <tr><td style="text-align:left; color:var(--neon)">Nivel Final:</td><td id="res-lvl" style="text-align:right; font-weight:900;">1</td></tr>
                <tr><td style="text-align:left; color:var(--neon)">Aciertos:</td><td id="res-hits" style="text-align:right; font-weight:900;">0</td></tr>
                <tr><td style="text-align:left; color:var(--neon)">Fallos:</td><td id="res-fails" style="text-align:right; font-weight:900;">0</td></tr>
            </table>
            <p id="status-msg" style="color: var(--neon); font-weight: 700; margin-bottom: 2vh;">Sincronizando con Perceptum...</p>
            <button class="btn-main" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        /* ================================================================
           MOTOR LÓGICO SNELLEN - ARQUITECTURA CLOUD INTEGRADA
           ================================================================
        */

        const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";
        const ENTRY_IDS = {
            paciente: "entry.369874016",
            juego: "entry.1353470174",
            nivel: "entry.721051298",
            aciertos: "entry.873272199",
            fallos: "entry.1030094511",
            extra: "entry.1303309812",
            fecha: "entry.845098414"
        };

        let lvl = 1;
        let hits = 0;
        let totalHits = 0;
        let totalFails = 0;
        let lives = 3;
        let active = false;
        let currentRot = 0;
        const stage = document.getElementById('stage');
        const controlsGrid = document.getElementById('controls-grid');

        function startGame() {
            document.getElementById('intro-modal').style.display = 'none';
            active = true;
            spawn();
        }

        function shuffleControls() {
            controlsGrid.innerHTML = '';
            const btns = [
                { rot: 180, icon: '⬅️' },
                { rot: 270, icon: '⬆️' },
                { rot: 90, icon: '⬇️' },
                { rot: 0, icon: '➡️' }
            ];
            btns.sort(() => Math.random() - 0.5);
            btns.forEach(b => {
                const div = document.createElement('div');
                div.className = 'control-btn';
                div.innerHTML = b.icon;
                const action = (e) => { e.preventDefault(); checkDir(b.rot); };
                div.onmousedown = action;
                div.ontouchstart = action;
                controlsGrid.appendChild(div);
            });
        }

        function spawn() {
            if(!active) return;
            stage.innerHTML = '';
            shuffleControls();
            
            const e = document.createElement('div');
            e.className = 'snellen-e';
            const orientations = [0, 90, 180, 270];
            currentRot = orientations[Math.floor(Math.random() * orientations.length)];
            
            const stageH = stage.clientHeight;
            const minSize = stageH * 0.08;
            const maxSize = stageH * 0.28;
            const currentSize = Math.max(minSize, maxSize - (lvl * 3));
            
            e.style.fontSize = currentSize + 'px';
            e.innerHTML = 'E';
            e.style.transform = `rotate(${currentRot}deg)`;
            stage.appendChild(e);

            const duration = Math.max(800, 4000 - (lvl * 300));
            
            const animation = e.animate([
                { transform: `rotate(${currentRot}deg) scale(0.2)`, opacity: 0 },
                { opacity: 1, offset: 0.15 },
                { transform: `rotate(${currentRot}deg) scale(6)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'ease-out'
            });

            animation.onfinish = () => {
                if(e.parentElement && active) {
                    totalFails++;
                    handleFail();
                }
            };
        }

        function checkDir(userSelection) {
            if(!active) return;
            if(userSelection === currentRot) {
                hits++;
                totalHits++;
                document.getElementById('v-hits').innerText = hits;
                if(hits >= 7) pauseForLevel();
                else spawn();
            } else {
                totalFails++;
                handleFail();
            }
        }

        function handleFail() {
            lives--;
            document.body.classList.add('flash-red');
            setTimeout(() => document.body.classList.remove('flash-red'), 150);
            updateLivesUI();
            if(lives <= 0) endGame();
            else spawn();
        }

        function updateLivesUI() {
            document.getElementById('v-lives').innerText = lives > 0 ? "❤️".repeat(lives) : "💀";
        }

        function pauseForLevel() {
            active = false;
            stage.innerHTML = '';
            const modal = document.getElementById('level-modal');
            const title = document.getElementById('lvl-title');
            if(lvl % 4 === 0 && lives < 3) {
                lives++;
                title.innerText = "¡BONUS DE VIDA!";
                title.style.color = "var(--success)";
            } else {
                title.innerText = "¡NIVEL SUPERADO!";
                title.style.color = "var(--neon)";
            }
            updateLivesUI();
            modal.style.display = 'flex';
        }

        function nextLevel() {
            lvl++;
            hits = 0;
            document.getElementById('v-lvl').innerText = lvl;
            document.getElementById('v-hits').innerText = '0';
            document.getElementById('level-modal').style.display = 'none';
            active = true;
            spawn();
        }

        function endGame() {
            active = false;
            stage.innerHTML = '';
            document.getElementById('res-lvl').innerText = lvl;
            document.getElementById('res-hits').innerText = totalHits;
            document.getElementById('res-fails').innerText = totalFails;
            document.getElementById('res-modal').style.display = 'flex';
            sendDataToGoogle();
        }

        function sendDataToGoogle() {
            const formData = new FormData();
            formData.append(ENTRY_IDS.paciente, "PACIENTE_SNELLEN");
            formData.append(ENTRY_IDS.juego, "Tunel_Snellen_v4.7_Final");
            formData.append(ENTRY_IDS.nivel, lvl);
            formData.append(ENTRY_IDS.aciertos, totalHits);
            formData.append(ENTRY_IDS.fallos, totalFails);
            formData.append(ENTRY_IDS.extra, "N/A");
            formData.append(ENTRY_IDS.fecha, new Date().toISOString().split('T')[0]);

            fetch(GOOGLE_FORM_ACTION, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                document.getElementById('status-msg').innerText = "✅ DATOS SINCRONIZADOS";
                document.getElementById('status-msg').style.color = "var(--success)";
            }).catch(() => {
                document.getElementById('status-msg').innerText = "⚠️ ERROR DE RED";
                document.getElementById('status-msg').style.color = "var(--error)";
            });
        }
    </script>
</body>
</html>
