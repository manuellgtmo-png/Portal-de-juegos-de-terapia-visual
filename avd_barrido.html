<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Barrido Lineal Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05080a;
            --accent-color: #00f2ff;
            --secondary-color: #bc13fe;
            --error-color: #ff4757;
            --success-color: #2ed573;
            --panel-bg: rgba(15, 25, 35, 0.98);
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.5);
            --purple-glow: 0 0 20px rgba(188, 19, 254, 0.4);
            --font-main: 'Montserrat', sans-serif;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-color); font-family: var(--font-main);
            overflow: hidden; color: white; user-select: none;
            touch-action: none;
        }

        /* --- HEADER ADAPTABLE PARA MÓVIL --- */
        #main-header {
            height: clamp(70px, 10vh, 90px); width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 0 clamp(10px, 4vw, 30px); background: var(--panel-bg);
            border-bottom: 4px solid var(--secondary-color);
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            position: relative; z-index: 2000;
        }

        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .stat-label { font-size: clamp(0.6rem, 2vw, 0.8rem); text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); font-weight: 800; }
        .stat-value { font-size: clamp(1.2rem, 5vw, 2rem); font-weight: 900; text-shadow: var(--neon-glow); }
        
        #lives-display { font-size: clamp(1.2rem, 5vw, 2rem); letter-spacing: 4px; }

        /* --- ESCENARIO --- */
        #stage {
            position: relative; width: 100%; height: calc(100vh - clamp(70px, 10vh, 90px));
            background: radial-gradient(circle at 50% 50%, #111d29 0%, #05080a 100%);
            overflow: hidden;
        }

        /* ÁREA DE JUEGO SEGURA (Para evitar bordes físicos del celular) */
        #game-area {
            position: absolute;
            inset: clamp(40px, 8vw, 60px); /* Margen de seguridad para que los círculos no se corten */
        }

        .target-node {
            position: absolute; width: clamp(55px, 16vw, 85px); height: clamp(55px, 16vw, 85px);
            background: #1a2332; border: 3px solid var(--secondary-color);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: 900; font-size: clamp(1.4rem, 5vw, 2.2rem);
            box-shadow: var(--purple-glow); z-index: 500; color: white;
            transform: translate(-50%, -50%); /* Centrado sobre su coordenada */
            animation: nodePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: transform 0.2s, opacity 0.2s;
        }

        @keyframes nodePop { from { transform: translate(-50%, -50%) scale(0); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .target-node.hit-success {
            border-color: var(--accent-color);
            box-shadow: 0 0 40px var(--accent-color);
            transform: translate(-50%, -50%) scale(1.5); opacity: 0; pointer-events: none;
        }

        /* --- MODALES --- */
        .full-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 9000; padding: 15px;
        }

        .modal-box {
            background: #0f1923; padding: clamp(20px, 6vw, 50px); border-radius: 30px;
            border: 4px solid var(--secondary-color); width: 100%; max-width: 500px;
            text-align: center; box-shadow: 0 0 50px rgba(188, 19, 254, 0.3);
            max-height: 90vh; overflow-y: auto;
        }

        .modal-box h1 { font-size: clamp(1.6rem, 7vw, 2.8rem); color: var(--accent-color); margin-bottom: 10px; font-weight: 900; }
        .modal-box p { font-size: clamp(0.9rem, 4vw, 1.2rem); margin-bottom: 20px; color: rgba(255,255,255,0.8); }

        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .selection-card {
            background: #1a2632; border: 2px solid #3e4859; padding: 15px;
            border-radius: 20px; cursor: pointer;
        }
        .selection-card.active { border-color: var(--accent-color); background: rgba(0, 242, 255, 0.1); }
        .selection-card h3 { font-size: 1rem; margin-bottom: 5px; color: var(--accent-color); }

        .action-btn {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white; padding: 18px; border-radius: 20px; border: none;
            width: 100%; font-size: 1.4rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .results-wrapper { width: 100%; margin: 15px 0; }
        .results-wrapper td { padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; font-size: 1.2rem; }

        .flash-red-alert { background-color: var(--error-color) !important; transition: 0.1s; }
    </style>
</head>
<body onpointerdown="handleStageClick(event)">

    <header id="main-header">
        <div class="stat-box"><span class="stat-label">Nivel</span><span id="v-lvl" class="stat-value">1</span></div>
        <div id="lives-display">❤️❤️❤️</div>
        <div class="stat-box"><span class="stat-label" id="t-label">Libre</span><span id="v-timer" class="stat-value">--</span></div>
    </header>

    <div id="stage">
        <div id="game-area"></div>
    </div>

    <div id="modal-start" class="full-overlay">
        <div class="modal-box">
            <h1>BARRIDO LINEAL</h1>
            <p>Toca los números en orden secuencial (1, 2, 3...)</p>
            <div class="selection-grid">
                <div class="selection-card active" id="opt-libre" onclick="selectGameMode('libre')">
                    <h3>MODO LIBRE</h3>
                    <small>Sin presión</small>
                </div>
                <div class="selection-card" id="opt-flash" onclick="selectGameMode('flash')">
                    <h3>CAZADOR FLASH</h3>
                    <small>Con tiempo</small>
                </div>
            </div>
            <div id="timer-config" style="display:none; margin-bottom: 20px;">
                <label style="font-weight: 800;">TIEMPO: <span id="val-t" style="color:var(--accent-color)">15</span>s</label>
                <input type="range" id="input-t" min="5" max="40" value="15" style="width:100%" oninput="document.getElementById('val-t').innerText=this.value">
            </div>
            <button class="action-btn" onclick="initiateSession()">INICIAR</button>
        </div>
    </div>

    <div id="next-level-overlay" class="full-overlay" style="display:none">
        <div class="modal-box" style="border-color: var(--success-color);">
            <h1 style="color: var(--success-color);">¡NIVEL LOGRADO!</h1>
            <button class="action-btn" onclick="moveToNextLevel()" style="background: var(--success-color);">SIGUIENTE</button>
        </div>
    </div>

    <div id="modal-res" class="full-overlay" style="display:none;">
        <div class="modal-box">
            <h1 style="color: var(--error-color);">FIN DE SESIÓN</h1>
            <table class="results-wrapper">
                <tr><td style="text-align:left">Aciertos:</td><td id="res-hits" style="text-align:right; font-weight:900">0</td></tr>
            </table>
            <button class="action-btn" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        function playTherapySound(freq, type, duration, volume) {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioContext.currentTime);
                gain.gain.setValueAtTime(volume, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                osc.connect(gain); gain.connect(audioContext.destination);
                osc.start(); osc.stop(audioContext.currentTime + duration);
            } catch(e) {}
        }

        let level = 1, lives = 3, nextNumber = 1, totalHits = 0;
        let isSessionActive = false, gameMode = 'libre', timeLimit = 15, timeLeft = 0, clock = null;
        let positions = [];

        function selectGameMode(m) {
            gameMode = m;
            document.getElementById('opt-libre').classList.toggle('active', m === 'libre');
            document.getElementById('opt-flash').classList.toggle('active', m === 'flash');
            document.getElementById('timer-config').style.display = m === 'flash' ? 'block' : 'none';
            document.getElementById('t-label').innerText = m === 'flash' ? "Tiempo" : "Libre";
        }

        function initiateSession() {
            if (audioContext.state === 'suspended') audioContext.resume();
            if (gameMode === 'flash') timeLimit = parseInt(document.getElementById('input-t').value);
            document.getElementById('modal-start').style.display = 'none';
            isSessionActive = true;
            renderLevel();
        }

        function renderLevel() {
            if (!isSessionActive) return;
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = '';
            nextNumber = 1;
            positions = [];
            
            const count = Math.min(10, 2 + level); // Máximo 10 círculos para no saturar el móvil
            const areaWidth = gameArea.clientWidth;
            const areaHeight = gameArea.clientHeight;

            for (let i = 1; i <= count; i++) {
                const node = document.createElement('div');
                node.className = 'target-node';
                node.innerText = i;

                let x, y, isOverlapping;
                let tries = 0;
                do {
                    isOverlapping = false;
                    x = Math.random() * areaWidth;
                    y = Math.random() * areaHeight;
                    
                    // Verificamos que no se solapen con otros círculos
                    for (let p of positions) {
                        if (Math.hypot(x - p.x, y - p.y) < 70) {
                            isOverlapping = true; break;
                        }
                    }
                    tries++;
                } while (isOverlapping && tries < 100);

                positions.push({ x, y });
                node.style.left = `${x}px`;
                node.style.top = `${y}px`;
                
                // Usamos pointerdown para respuesta rápida en táctiles
                node.onpointerdown = (e) => { 
                    e.stopPropagation(); 
                    validateHit(i, node); 
                };
                gameArea.appendChild(node);
            }
            if (gameMode === 'flash') startTimer();
        }

        function validateHit(num, el) {
            if (!isSessionActive) return;
            if (num === nextNumber) {
                playTherapySound(850, 'sine', 0.2, 0.1);
                el.classList.add('hit-success');
                totalHits++; nextNumber++;
                if (nextNumber > (2 + level)) {
                    clearInterval(clock);
                    setTimeout(() => {
                        isSessionActive = false;
                        document.getElementById('next-level-overlay').style.display = 'flex';
                    }, 500);
                }
            } else {
                processMistake();
            }
        }

        function handleStageClick(e) {
            if (isSessionActive && !e.target.classList.contains('target-node')) {
                processMistake();
            }
        }

        function processMistake() {
            playTherapySound(150, 'sawtooth', 0.3, 0.15);
            lives--;
            document.body.classList.add('flash-red-alert');
            setTimeout(() => document.body.classList.remove('flash-red-alert'), 200);
            updateLivesUI();
            if (lives <= 0) terminateSession(); else renderLevel();
        }

        function startTimer() {
            clearInterval(clock);
            timeLeft = timeLimit;
            document.getElementById('v-timer').innerText = timeLeft + "s";
            clock = setInterval(() => {
                timeLeft--;
                document.getElementById('v-timer').innerText = timeLeft + "s";
                if (timeLeft <= 0) { clearInterval(clock); processMistake(); }
            }, 1000);
        }

        function moveToNextLevel() {
            level++;
            document.getElementById('v-lvl').innerText = level;
            document.getElementById('next-level-overlay').style.display = 'none';
            if (level % 3 === 0 && lives < 3) lives++;
            updateLivesUI();
            isSessionActive = true;
            renderLevel();
        }

        function updateLivesUI() {
            document.getElementById('lives-display').innerText = lives > 0 ? "❤️".repeat(lives) : "💀";
        }

        function terminateSession() {
            isSessionActive = false;
            clearInterval(clock);
            document.getElementById('res-hits').innerText = totalHits;
            document.getElementById('modal-res').style.display = 'flex';
        }
    </script>
</body>
</html>
