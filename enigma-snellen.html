<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enigma de Snellen - Perceptum Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --dark: #0f172a;
            --accent: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
        }
        body { margin: 0; background: var(--bg); color: var(--dark); font-family: 'Montserrat', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: manipulation; }
        
        /* UI LAYER ADAPTATIVA */
        #ui-layer { width: 100%; padding: 15px; display: flex; justify-content: space-between; box-sizing: border-box; z-index: 100; gap: 10px; }
        .stat-box { background: white; padding: 8px 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); font-weight: 900; border: 2px solid #e2e8f0; font-size: 0.8rem; flex: 1; text-align: center; }

        #game-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 800px; padding: 10px; box-sizing: border-box; }
        
        /* WRAPPER ADAPTATIVO */
        #optotipo-wrapper { 
            min-height: 220px; display: flex; align-items: center; justify-content: center; 
            gap: 15px; margin-bottom: 20px; flex-wrap: wrap; width: 100%;
        }
        .optotipo { font-weight: 900; color: var(--dark); transition: all 0.2s; line-height: 1; }

        /* CONTROLES MEJORADOS PARA MÓVIL */
        .controles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 320px; margin-top: 10px; }
        .btn-dir { 
            background: white; border: 3px solid var(--dark); padding: 18px; 
            font-size: 1.8rem; border-radius: 18px; cursor: pointer; 
            transition: 0.1s; box-shadow: 0 5px 0 var(--dark);
        }
        .btn-dir:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--dark); }

        /* MODALES */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; color: white; padding: 20px; text-align: center; backdrop-filter: blur(5px); }
        .modal { background: white; color: var(--dark); padding: 30px; border-radius: 25px; max-width: 380px; width: 90%; border: 5px solid #e2e8f0; }
        .btn-game { color: white; padding: 18px; border-radius: 15px; font-weight: 900; border: none; cursor: pointer; margin-top: 15px; width: 100%; font-size: 1.1rem; }
        
        .config-box { margin-top: 15px; background: #f1f5f9; padding: 15px; border-radius: 15px; border: 2px dashed #cbd5e1; }
        input[type=range] { width: 100%; accent-color: var(--accent); }

        #sync-screen { background: var(--dark); display: none; flex-direction: column; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-box">NIVEL: <span id="txt-nivel">1</span></div>
        <div class="stat-box">⏱️ <span id="txt-tiempo">0s</span></div>
        <div class="stat-box"><span id="txt-vidas">❤️❤️❤️</span></div>
    </div>

    <div id="modal-inicio" class="overlay">
        <div class="modal">
            <h2 style="color: var(--accent); margin:0">Enigma de Snellen</h2>
            <p style="font-size: 0.9rem; font-weight: 600;">Memoriza la secuencia de las "E" y repítelas con las flechas.</p>
            <div class="config-box">
                <label style="font-weight: 800; font-size: 0.75rem; display: block; margin-bottom: 5px;">TIEMPO DE MEMORIA: <span id="val-timer" style="color:var(--accent)">1.5</span>s</label>
                <input type="range" min="0.5" max="4.0" step="0.5" value="1.5" oninput="document.getElementById('val-timer').innerText = this.value">
            </div>
            <button class="btn-game" style="background: var(--success);" onclick="empezarPartida()">¡EMPEZAR SESIÓN!</button>
        </div>
    </div>

    <div id="modal-error" class="overlay" style="display:none">
        <div class="modal" style="border-color: #f59e0b;">
            <h2 style="color: #f59e0b; margin:0">¡Atención!</h2>
            <p style="font-weight: 600;">Mira bien la dirección de las letras.</p>
            <button class="btn-game" style="background: #f59e0b;" onclick="cerrarError()">REINTENTAR</button>
        </div>
    </div>

    <div id="modal-next" class="overlay" style="display:none">
        <div class="modal" style="border-color: var(--success);">
            <h2 style="color: var(--success); margin:0">¡Excelente! 🌟</h2>
            <button class="btn-game" style="background: var(--success);" onclick="siguienteNivel()">SIGUIENTE NIVEL</button>
        </div>
    </div>

    <div id="sync-screen" class="overlay">
        <div class="loader"></div>
        <h2 style="color: white">Guardando en Perceptum...</h2>
    </div>

    <form id="form-google" action="https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse" method="POST" target="vacio" style="display:none;">
        <input type="hidden" name="entry.369874016" id="field_paciente">
        <input type="hidden" name="entry.1353470174" id="field_juego">
        <input type="hidden" name="entry.721051298" id="field_nivel">
        <input type="hidden" name="entry.873272199" id="field_aciertos">
        <input type="hidden" name="entry.1030094511" id="field_fallos">
        <input type="hidden" name="entry.1303309812" id="field_tiempo">
        <input type="hidden" name="entry.845098414" id="field_fecha">
    </form>
    <iframe name="vacio" style="display:none;"></iframe>

    <div id="game-container">
        <div id="optotipo-wrapper"></div>
        <p id="label-fase" style="font-weight: 900; color: #94a3b8; text-transform: uppercase; margin: 10px 0;">Prepárate...</p>
        <div class="controles" id="pad" style="opacity: 0.2; pointer-events: none;">
            <button class="btn-dir" onclick="clickBoton('ARRIBA')">↑</button>
            <button class="btn-dir" onclick="clickBoton('ABAJO')">↓</button>
            <button class="btn-dir" onclick="clickBoton('IZQUIERDA')">←</button>
            <button class="btn-dir" onclick="clickBoton('DERECHA')">→</button>
        </div>
    </div>

    <script>
        let nivel = 1, vidas = 3, segundosTotal = 0, crono;
        let secuenciaOriginal = [], secuenciaUsuario = [];
        let baseSize = window.innerWidth < 600 ? 25 : 12; // Tamaño en vw
        let tiempoExposicion = 1.5;

        function empezarPartida() {
            tiempoExposicion = parseFloat(document.querySelector('input[type=range]').value);
            document.getElementById('modal-inicio').style.display = 'none';
            if(crono) clearInterval(crono);
            crono = setInterval(() => { 
                segundosTotal++; 
                document.getElementById('txt-tiempo').innerText = segundosTotal + "s"; 
            }, 1000);
            prepararRonda();
        }

        function prepararRonda() {
            secuenciaOriginal = [];
            secuenciaUsuario = [];
            const panel = document.getElementById('optotipo-wrapper');
            const numE = Math.min(8, 1 + Math.floor(nivel / 2)); // Máximo 8 figuras
            panel.innerHTML = '';
            document.getElementById('label-fase').innerText = "Memoriza...";
            document.getElementById('pad').style.opacity = "0.2";
            document.getElementById('pad').style.pointerEvents = "none";

            const dirs = ["ARRIBA", "ABAJO", "IZQUIERDA", "DERECHA"];
            const rots = { "ARRIBA": "-90deg", "ABAJO": "90deg", "IZQUIERDA": "180deg", "DERECHA": "0deg" };

            // Cálculo adaptativo del tamaño
            let currentSize = Math.max(8, baseSize - (nivel * 0.8));

            for(let i=0; i<numE; i++) {
                let d = dirs[Math.floor(Math.random()*dirs.length)];
                secuenciaOriginal.push(d);
                let span = document.createElement('div');
                span.className = 'optotipo';
                span.innerText = 'E';
                span.style.fontSize = currentSize + 'vw';
                span.style.transform = `rotate(${rots[d]})`;
                panel.appendChild(span);
            }

            setTimeout(() => {
                panel.innerHTML = '<h1 style="font-size:15vw; color:var(--accent); margin:0">?</h1>';
                document.getElementById('label-fase').innerText = "¡REPITELA!";
                document.getElementById('pad').style.opacity = "1";
                document.getElementById('pad').style.pointerEvents = "auto";
            }, tiempoExposicion * 1000);
        }

        function clickBoton(dir) {
            secuenciaUsuario.push(dir);
            const i = secuenciaUsuario.length - 1;
            
            if(dir !== secuenciaOriginal[i]) {
                vidas--;
                document.getElementById('txt-vidas').innerText = "❤️".repeat(Math.max(0, vidas));
                if(vidas <= 0) finalizarJuego();
                else document.getElementById('modal-error').style.display = 'flex';
            } else if(secuenciaUsuario.length === secuenciaOriginal.length) {
                document.getElementById('modal-next').style.display = 'flex';
                document.getElementById('pad').style.pointerEvents = "none";
            }
        }

        function cerrarError() {
            document.getElementById('modal-error').style.display = 'none';
            prepararRonda();
        }

        function siguienteNivel() {
            nivel++;
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('modal-next').style.display = 'none';
            prepararRonda();
        }

        function finalizarJuego() {
            clearInterval(crono);
            document.getElementById('sync-screen').style.display = 'flex';
            
            document.getElementById('field_paciente').value = localStorage.getItem('pacienteActual') || "Paciente";
            document.getElementById('field_juego').value = "Enigma de Snellen";
            document.getElementById('field_nivel').value = nivel;
            document.getElementById('field_aciertos').value = nivel - 1;
            document.getElementById('field_fallos').value = 3 - vidas;
            document.getElementById('field_tiempo').value = segundosTotal + "s";
            document.getElementById('field_fecha').value = new Date().toISOString().split('T')[0];

            document.getElementById('form-google').submit();

            setTimeout(() => {
                // He puesto el reload para que puedas probarlo de nuevo fácilmente
                location.reload(); 
            }, 3000);
        }

        // Si se cambia el tamaño de pantalla, ajustamos baseSize
        window.onresize = () => { baseSize = window.innerWidth < 600 ? 25 : 12; };
    </script>
</body>
</html>
