<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espejo Maestro PRO - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --primary: #f8fafc; --pink: #ff2e63; 
            --blue: #38bdf8; --card: #1e293b; --success: #10b981; --yellow: #facc15;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat'; background: var(--bg); color: var(--primary); 
            overflow: hidden; display: flex; flex-direction: column;
            touch-action: none; user-select: none;
        }

        body.error-flash { background: #450a0a !important; transition: 0.1s; }

        /* HEADER */
        .header { 
            height: 90px; background: #1e293b; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; border-bottom: 5px solid var(--blue); z-index: 100;
        }

        .stats-group { display: flex; gap: 30px; }
        .stat { text-align: center; }
        .stat b { display: block; color: var(--blue); font-size: 0.8rem; text-transform: uppercase; }
        .stat span { font-size: 1.8rem; font-weight: 900; }

        #txt-vidas { display: flex; gap: 5px; font-size: 1.5rem; }
        .corazon { transition: 0.3s; }
        .corazon.perdido { filter: grayscale(1); opacity: 0.2; }

        /* BARRA DE TIEMPO */
        .timer-container { width: 100%; height: 10px; background: #334155; position: relative; }
        #timer-bar { width: 100%; height: 100%; background: var(--yellow); transition: width 0.1s linear; }

        /* ZONA DE JUEGO */
        #game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 20px;
        }

        .secuencia-box {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 30px;
            border: 2px dashed #334155;
        }

        .item-maestro {
            background: var(--card);
            width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px; border: 4px solid var(--yellow);
            font-size: 50px; font-weight: 900;
            transition: 0.3s;
        }
        .item-maestro.completado { border-color: var(--success); opacity: 0.5; transform: scale(0.9); }
        .item-maestro.actual { box-shadow: 0 0 20px var(--yellow); transform: scale(1.1); }

        .opciones-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; width: 100%; max-width: 400px;
        }

        .btn-opcion {
            background: var(--card); border: 3px solid #334155;
            border-radius: 25px; padding: 35px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; font-size: 60px;
        }
        .btn-opcion:active { transform: scale(0.9); }

        /* OVERLAYS */
        .overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); 
            z-index: 2000; display: flex; align-items: center; justify-content: center; 
        }
        
        .card { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            border-radius: 35px; padding: 40px; width: 90%; max-width: 420px; 
            text-align: center; border: 3px solid var(--blue);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn-principal { 
            background: var(--success); color: white; padding: 22px; 
            border-radius: 20px; font-weight: 900; border: none; 
            cursor: pointer; width: 100%; font-size: 1.3rem; 
            text-transform: uppercase; box-shadow: 0 6px 0 #065f46; 
            transition: 0.1s; margin-top: 20px;
        }
        .btn-principal:active { transform: translateY(4px); box-shadow: none; }

        .habilidades { 
            background: rgba(56, 189, 248, 0.1); padding: 20px; 
            border-radius: 20px; margin: 20px 0; border: 1px dashed var(--blue);
            text-align: left; font-size: 0.9rem; color: #cbd5e1;
        }
    </style>
</head>
<body>

<div id="screen-start" class="overlay">
    <div class="card">
        <span style="font-size: 5rem;">🪞</span>
        <h1 style="color:var(--blue); margin:10px 0;">ESPEJO MAESTRO</h1>
        <div class="habilidades">
            <b>DESAFÍO COGNITIVO:</b><br>
            • Identifica el reflejo horizontal.<br>
            • Completa la secuencia antes que el tiempo agote.<br>
            • Precisión espacial extrema.
        </div>
        <button class="btn-principal" onclick="iniciarJuego()">¡INICIAR ENTRENAMIENTO!</button>
    </div>
</div>

<div id="screen-end" class="overlay" style="display:none">
    <div class="card">
        <h1 style="color:var(--success)">SESIÓN COMPLETADA</h1>
        <div class="habilidades" id="resumen-final" style="text-align:center; font-size: 1.2rem;"></div>
        <button class="btn-principal" onclick="location.reload()">JUGAR DE NUEVO</button>
        <a href="https://manuellgtmo-png.github.io/Portal-de-juegos-de-terapia-visual/" style="color:#64748b; text-decoration:none; display:block; margin-top:20px; font-weight:700;">🏠 VOLVER AL PORTAL</a>
    </div>
</div>

<div class="header">
    <div class="stats-group">
        <div class="stat"><b>Nivel</b><span id="txt-nivel">1</span></div>
        <div class="stat"><b>Vidas</b><div id="txt-vidas"></div></div>
    </div>
    <div class="stat"><b>Aciertos</b><span id="txt-aciertos">0</span></div>
</div>

<div class="timer-container"><div id="timer-bar"></div></div>

<div id="game-container">
    <div style="font-weight: 900; color: var(--yellow); letter-spacing: 2px;">SECUENCIA MAESTRA</div>
    <div class="secuencia-box" id="secuencia-container"></div>
    <div style="font-weight: 900; color: var(--blue);">TOCA EL REFLEJO CORRECTO</div>
    <div class="opciones-grid" id="opciones"></div>
</div>

<script>
    let nivel = 1, aciertos = 0, fallos = 0, vidas = 3, segs = 0;
    let timerVal = 100, timerInterval, gameActive = false;
    let secuenciaActual = [], indiceProgreso = 0;
    
    const figurasBase = ["L", "F", "E", "P", "R", "K", "7", "4"];
    const rotaciones = [0, 90, 180, 270];

    function actualizarCorazones() {
        const div = document.getElementById('txt-vidas');
        div.innerHTML = "";
        for(let i=0; i<3; i++) {
            const s = document.createElement('span');
            s.className = i < vidas ? "corazon" : "corazon perdido";
            s.innerText = i < vidas ? "❤️" : "🖤";
            div.appendChild(s);
        }
    }

    function iniciarJuego() {
        document.getElementById('screen-start').style.display = 'none';
        gameActive = true;
        actualizarCorazones();
        generarNivel();
        iniciarTimer();
    }

    function iniciarTimer() {
        clearInterval(timerInterval);
        timerVal = 100;
        const speed = Math.max(0.1, 0.5 - (nivel * 0.02)); // Se vuelve más rápido cada nivel
        timerInterval = setInterval(() => {
            if(!gameActive) return;
            timerVal -= 0.3;
            document.getElementById('timer-bar').style.width = timerVal + "%";
            if(timerVal <= 0) {
                registrarError();
                timerVal = 100;
            }
        }, 50);
    }

    function generarNivel() {
        indiceProgreso = 0;
        secuenciaActual = [];
        const container = document.getElementById('secuencia-container');
        container.innerHTML = "";
        
        // La longitud de la secuencia aumenta con el nivel (Max 5)
        let largoSecuencia = Math.min(5, 1 + Math.floor(nivel / 2));
        
        for(let i=0; i<largoSecuencia; i++) {
            let f = figurasBase[Math.floor(Math.random() * figurasBase.length)];
            let r = rotaciones[Math.floor(Math.random() * rotaciones.length)];
            secuenciaActual.push({ fig: f, rot: r });
            
            let div = document.createElement('div');
            div.className = 'item-maestro';
            div.id = 'maestro-' + i;
            div.innerHTML = `<span style="transform: rotate(${r}deg)">${f}</span>`;
            container.appendChild(div);
        }
        actualizarFocoSecuencia();
        generarOpciones();
    }

    function actualizarFocoSecuencia() {
        secuenciaActual.forEach((_, i) => {
            const el = document.getElementById('maestro-' + i);
            el.className = 'item-maestro';
            if(i < indiceProgreso) el.classList.add('completado');
            if(i === indiceProgreso) el.classList.add('actual');
        });
    }

    function generarOpciones() {
        const grid = document.getElementById('opciones');
        grid.innerHTML = "";
        const actual = secuenciaActual[indiceProgreso];

        let opciones = [];
        // La correcta (Reflejada)
        opciones.push({ fig: actual.fig, rot: actual.rot, mirror: true, correct: true });

        // Distractores
        while(opciones.length < 4) {
            let rR = rotaciones[Math.floor(Math.random() * rotaciones.length)];
            let mR = Math.random() > 0.5;
            if (!(rR === actual.rot && mR === true)) {
                opciones.push({ fig: actual.fig, rot: rR, mirror: mR, correct: false });
            }
        }
        opciones.sort(() => Math.random() - 0.5);

        opciones.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-opcion';
            btn.innerHTML = `<span style="transform: rotate(${opt.rot}deg) scaleX(${opt.mirror ? -1 : 1})">${opt.fig}</span>`;
            btn.onclick = () => validar(opt.correct);
            grid.appendChild(btn);
        });
    }

    function validar(esCorrecto) {
        if(!gameActive) return;
        if(esCorrecto) {
            aciertos++;
            document.getElementById('txt-aciertos').innerText = aciertos;
            indiceProgreso++;
            timerVal = Math.min(100, timerVal + 20); // Bonus de tiempo por acierto
            
            if(indiceProgreso >= secuenciaActual.length) {
                nivel++;
                document.getElementById('txt-nivel').innerText = nivel;
                generarNivel();
            } else {
                actualizarFocoSecuencia();
                generarOpciones();
            }
        } else {
            registrarError();
        }
    }

    function registrarError() {
        vidas--;
        actualizarCorazones();
        document.body.classList.add('error-flash');
        setTimeout(() => document.body.classList.remove('error-flash'), 200);
        if(vidas <= 0) finalizarJuego();
    }

    function finalizarJuego() {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById('screen-end').style.display = 'flex';
        document.getElementById('resumen-final').innerHTML = `
            <b>Nivel Alcanzado:</b> ${nivel}<br>
            <b>Aciertos Totales:</b> ${aciertos}
        `;
        // Aquí podrías llamar a tu función enviarExcel()
    }
</script>
</body>
</html>
