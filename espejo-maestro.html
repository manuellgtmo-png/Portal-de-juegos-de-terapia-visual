<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espejo Maestro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; --primary: #f8fafc; --pink: #ff2e63; 
            --blue: #38bdf8; --card: #1e293b; --success: #10b981; --yellow: #facc15;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Montserrat'; background: var(--bg); color: var(--primary); 
            overflow: hidden; display: flex; flex-direction: column;
            touch-action: none; user-select: none;
        }

        body.error-flash { background: #450a0a !important; transition: 0.1s; }

        /* HEADER */
        .header { 
            height: 80px; background: #1e293b; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 25px; border-bottom: 5px solid var(--blue); z-index: 100;
        }

        .stats-group { display: flex; gap: 20px; }
        .stat { text-align: center; }
        .stat b { display: block; color: var(--blue); font-size: 0.7rem; text-transform: uppercase; }
        .stat span { font-size: 1.4rem; font-weight: 900; }

        #txt-vidas { display: flex; gap: 3px; font-size: 1.2rem; }
        .corazon.perdido { filter: grayscale(1); opacity: 0.2; }

        /* ZONA DE JUEGO */
        #game-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 20px;
        }

        .maestro-box {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border: 4px solid var(--yellow);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.2);
            text-align: center;
        }

        .maestro-label { font-size: 0.8rem; color: var(--yellow); margin-bottom: 10px; font-weight: 900; }

        .figura {
            font-size: 80px;
            display: inline-block;
            transition: transform 0.3s;
        }

        .opciones-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .btn-opcion {
            background: var(--card);
            border: 3px solid #334155;
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-opcion:active { transform: scale(0.95); }
        .btn-opcion.correct { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .btn-opcion.wrong { border-color: var(--pink); background: rgba(255, 46, 99, 0.1); }

        /* OVERLAYS */
        .overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); 
            z-index: 2000; display: flex; align-items: center; justify-content: center; 
        }
        
        .card { 
            background: #1e293b; border-radius: 30px; padding: 40px; 
            width: 85%; max-width: 400px; text-align: center; border: 3px solid var(--blue);
        }

        .btn-principal { 
            background: var(--success); color: white; padding: 20px; 
            border-radius: 15px; font-weight: 900; border: none; 
            cursor: pointer; width: 100%; font-size: 1.2rem; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="screen-start" class="overlay">
    <div class="card">
        <h1 style="color:var(--blue)">ESPEJO MAESTRO</h1>
        <p>Encuentra el <b>reflejo exacto</b> de la figura superior.</p>
        <button class="btn-principal" onclick="iniciarJuego()">¡COMENZAR!</button>
    </div>
</div>

<div class="header">
    <div class="stats-group">
        <div class="stat"><b>Nivel</b><span id="txt-nivel">1</span></div>
        <div class="stat"><b>Vidas</b><div id="txt-vidas"></div></div>
    </div>
    <div class="stat"><b>Tiempo</b><span id="txt-cron">00:00</span></div>
</div>

<div id="game-container">
    <div class="maestro-box">
        <div class="maestro-label">FIGURA MAESTRA</div>
        <div id="maestro-figura" class="figura">L</div>
    </div>

    <div style="font-weight: 900; color: var(--blue);">¿CUÁL ES SU REFLEJO?</div>

    <div class="opciones-grid" id="opciones">
        </div>
</div>

<script>
    let nivel = 1, aciertos = 0, fallos = 0, vidas = 3, segs = 0;
    let crono, gameActive = false, canClick = true;
    
    const figurasBase = ["L", "F", "E", "P", "R", "K", "7", "4"];
    const rotaciones = [0, 90, 180, 270];

    function actualizarCorazones() {
        const div = document.getElementById('txt-vidas');
        div.innerHTML = "";
        for(let i=0; i<3; i++) {
            const s = document.createElement('span');
            s.className = i < vidas ? "corazon" : "corazon perdido";
            s.innerText = i < vidas ? "❤️" : "🖤";
            div.appendChild(s);
        }
    }

    function iniciarJuego() {
        document.getElementById('screen-start').style.display = 'none';
        gameActive = true;
        actualizarCorazones();
        crono = setInterval(() => { segs++; document.getElementById('txt-cron').innerText = new Date(segs * 1000).toISOString().substr(14, 5); }, 1000);
        generarNivel();
    }

    function generarNivel() {
        canClick = true;
        const grid = document.getElementById('opciones');
        grid.innerHTML = "";
        
        // 1. Seleccionar figura y rotación aleatoria para el Maestro
        const fig = figurasBase[Math.floor(Math.random() * figurasBase.length)];
        const rot = rotaciones[Math.floor(Math.random() * rotaciones.length)];
        
        const mEl = document.getElementById('maestro-figura');
        mEl.innerText = fig;
        mEl.style.transform = `rotate(${rot}deg)`;

        // 2. Crear opciones
        let opciones = [];
        
        // La correcta (Reflejada horizontalmente)
        opciones.push({ fig: fig, rot: rot, mirror: true, correct: true });

        // Las incorrectas (Rotaciones normales o la misma sin reflejar)
        while(opciones.length < 4) {
            let rRandom = rotaciones[Math.floor(Math.random() * rotaciones.length)];
            let mRandom = Math.random() > 0.5;
            
            // Evitar duplicar la correcta
            if (!(rRandom === rot && mRandom === true)) {
                opciones.push({ fig: fig, rot: rRandom, mirror: mRandom, correct: false });
            }
        }

        // Mezclar opciones
        opciones.sort(() => Math.random() - 0.5);

        opciones.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'btn-opcion';
            btn.innerHTML = `<div class="figura" style="transform: rotate(${opt.rot}deg) scaleX(${opt.mirror ? -1 : 1})">${opt.fig}</div>`;
            
            btn.onclick = () => validar(opt.correct, btn);
            grid.appendChild(btn);
        });
    }

    function validar(esCorrecto, el) {
        if (!canClick) return;
        canClick = false;

        if (esCorrecto) {
            el.classList.add('correct');
            aciertos++;
            setTimeout(() => {
                nivel++;
                document.getElementById('txt-nivel').innerText = nivel;
                generarNivel();
            }, 800);
        } else {
            el.classList.add('wrong');
            vidas--;
            fallos++;
            actualizarCorazones();
            document.body.classList.add('error-flash');
            setTimeout(() => {
                document.body.classList.remove('error-flash');
                if (vidas <= 0) finalizar();
                else canClick = true;
            }, 500);
        }
    }

    function finalizar() {
        gameActive = false;
        clearInterval(crono);
        alert(`Juego Terminado. Nivel: ${nivel} | Aciertos: ${aciertos}`);
        location.reload();
    }
</script>
</body>
</html>
