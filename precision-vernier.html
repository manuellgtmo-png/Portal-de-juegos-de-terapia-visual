<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vernier Pro v25.1 - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b101b;
            --card: #1c2331;
            --accent: #a855f7;
            --success: #22c55e;
            --error: #f43f5e;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
        }

        /* --- INTERFAZ DE CAPAS --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 16, 27, 0.98);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(15px);
        }

        .panel {
            background: var(--card);
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .titulo-vpro { font-size: 2.5rem; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .subtitulo { font-size: 0.75rem; letter-spacing: 4px; color: var(--text-dim); margin-bottom: 35px; text-transform: uppercase; }

        /* --- ÁREA DE EXAMEN --- */
        .viewport-examen {
            flex: 1;
            position: relative;
            width: 100%;
            background: radial-gradient(circle at center, #161e2e 0%, #0b101b 100%);
            overflow: hidden;
        }

        .linea {
            position: absolute;
            width: 14px;
            height: 140px;
            border-radius: 20px;
            transform-origin: center center;
            will-change: transform, left;
        }

        #ref-line { background: #334155; left: 50%; top: 35%; opacity: 0.5; z-index: 5; }
        #pac-line { 
            background: var(--accent); 
            left: 50%; 
            top: 60%; 
            box-shadow: 0 0 40px var(--accent); 
            z-index: 10;
        }

        /* --- HUD --- */
        .hud-top {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 25px;
            pointer-events: none;
            z-index: 100;
        }

        .hud-item {
            background: rgba(28, 35, 49, 0.9);
            padding: 12px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .timer-container {
            position: absolute;
            top: 85px; left: 50%;
            transform: translateX(-50%);
            width: 50%; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }
        #timer-bar { width: 100%; height: 100%; background: var(--error); transition: width 0.1s linear; }

        /* --- CONTROLES INFERIORES --- */
        .controles-footer {
            background: var(--card);
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .btn-ctrl {
            aspect-ratio: 1;
            background: #2d3748;
            border: none;
            border-radius: 22px;
            color: white;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #1a202c;
        }
        .btn-ctrl:active { transform: translateY(2px); box-shadow: none; }

        .btn-confirm {
            grid-column: span 4;
            padding: 22px;
            background: var(--success);
            color: #052e16;
            border: none;
            border-radius: 25px;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #15803d;
        }
        .btn-confirm:active { transform: translateY(3px); box-shadow: none; }

        /* --- MENÚS --- */
        .tarjeta-modo {
            background: #0b101b;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: 3px solid transparent;
            transition: 0.3s;
        }
        .tarjeta-modo.active { border-color: var(--accent); background: rgba(168, 85, 247, 0.15); }
        
        input[type=range] { width: 100%; margin: 25px 0; accent-color: var(--accent); }
    </style>
</head>
<body>

    <div id="inicio-ui" class="overlay">
        <div class="panel">
            <h1 class="titulo-vpro">VERNIER PRO</h1>
            <p class="subtitulo">SISTEMA DE PRECISIÓN VISUAL</p>
            
            <div id="m-tiempo" class="tarjeta-modo active" onclick="setModo('tiempo')">
                <div style="font-weight:900; font-size: 1.2rem;">CONTRARRELOJ</div>
                <div style="font-size:0.8rem; color:var(--text-dim); margin-top:5px">Evaluación clínica bajo estrés temporal</div>
            </div>

            <div id="config-t">
                <div style="font-size:0.9rem; font-weight:800">DURACIÓN: <span id="t-val">10</span>s</div>
                <input type="range" min="5" max="30" value="10" oninput="document.getElementById('t-val').innerText=this.value">
            </div>

            <button class="btn-confirm" style="grid-column:auto; width:100%" onclick="start()">INICIAR PROTOCOLO</button>
        </div>
    </div>

    <div id="feedback-ui" class="overlay" style="display:none">
        <div class="panel">
            <h2 id="f-title" style="font-weight: 900;">RESULTADO</h2>
            <div id="f-score" style="font-size:5rem; font-weight:900; color:var(--accent); margin: 15px 0;">0%</div>
            <div id="f-data" style="font-size:0.9rem; line-height:2; margin-bottom:30px; background:rgba(0,0,0,0.3); padding:20px; border-radius:20px; text-align: left;"></div>
            <button id="f-btn" class="btn-confirm" style="grid-column:auto; width:100%" onclick="next()">CONTINUAR</button>
        </div>
    </div>

    <div class="viewport-examen" id="game-zone">
        <div class="hud-top">
            <div class="hud-item">NIVEL <span id="h-lvl">1</span></div>
            <div class="hud-item" id="h-vidas">❤️❤️❤️</div>
        </div>
        
        <div class="timer-container" id="t-cont"><div id="timer-bar"></div></div>

        <div id="ref-line" class="linea"></div>
        <div id="pac-line" class="linea"></div>
    </div>

    <div class="controles-footer">
        <button class="btn-ctrl" ontouchstart="nudge('a', -1.5)" ontouchend="stopNudge()">↻</button>
        <button class="btn-ctrl" ontouchstart="nudge('a', 1.5)" ontouchend="stopNudge()">↺</button>
        <button class="btn-ctrl" ontouchstart="nudge('x', -0.5)" ontouchend="stopNudge()">←</button>
        <button class="btn-ctrl" ontouchstart="nudge('x', 0.5)" ontouchend="stopNudge()">→</button>
        <button class="btn-confirm" onclick="check()">CONFIRMAR ALINEACIÓN</button>
    </div>

    <iframe name="target_silencioso" style="display:none;"></iframe>

    <script>
        const state = {
            active: false, lvl: 1, vidas: 3, modo: 'tiempo',
            tBase: 10, tCurr: 10,
            ref: {x:50, a:0}, pac: {x:70, a:0},
            timer: null, nudge: null,
            formUrl: "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse"
        };

        const AUDIO = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(f, d, v, type='sine') {
                try {
                    this.init();
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.type = type; o.frequency.value = f;
                    g.gain.setValueAtTime(v, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + d);
                    o.connect(g); g.connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + d);
                } catch(e){}
            }
        };

        function setModo(m) {
            state.modo = m;
            AUDIO.play(600, 0.1, 0.1);
            document.getElementById('m-tiempo').classList.toggle('active', m==='tiempo');
        }

        function start() {
            AUDIO.play(800, 0.2, 0.1);
            state.tBase = parseInt(document.querySelector('input[type=range]').value);
            state.vidas = 3; state.lvl = 1;
            document.getElementById('inicio-ui').style.display = 'none';
            newRound();
        }

        function newRound() {
            state.active = true;
            state.tCurr = state.tBase;
            
            // Lógica de dificultad progresiva
            state.ref.x = 35 + Math.random() * 30;
            state.ref.a = state.lvl >= 3 ? (Math.random() > 0.5 ? 90 : 0) : 0;
            if(state.lvl >= 6) state.ref.a = Math.random() * 160 - 80;

            state.pac.x = state.ref.x + (Math.random() > 0.5 ? 20 : -20);
            state.pac.a = 0;
            
            draw();

            if(state.modo === 'tiempo') {
                document.getElementById('timer-bar').style.width = "100%";
                clearInterval(state.timer);
                state.timer = setInterval(() => {
                    state.tCurr -= 0.1;
                    document.getElementById('timer-bar').style.width = (state.tCurr/state.tBase)*100 + "%";
                    if(state.tCurr <= 0) check();
                }, 100);
            }
        }

        function draw() {
            document.getElementById('ref-line').style.left = state.ref.x + "%";
            document.getElementById('ref-line').style.transform = `translate(-50%, -50%) rotate(${state.ref.a}deg)`;
            document.getElementById('pac-line').style.left = state.pac.x + "%";
            document.getElementById('pac-line').style.transform = `translate(-50%, -50%) rotate(${state.pac.a}deg)`;
            document.getElementById('h-lvl').innerText = state.lvl;
            document.getElementById('h-vidas').innerText = state.vidas > 0 ? "❤️".repeat(state.vidas) : "💀";
        }

        function check() {
            if(!state.active) return;
            state.active = false;
            clearInterval(state.timer);

            const errX = Math.abs(state.ref.x - state.pac.x);
            let errA = Math.abs((state.ref.a % 180) - (state.pac.a % 180));
            if (errA > 90) errA = 180 - errA;

            const score = Math.max(0, Math.round(100 - (errX * 12 + errA * 3)));
            
            if(score >= 90) { AUDIO.play(880, 0.4, 0.2); } 
            else { AUDIO.play(150, 0.5, 0.2, 'sawtooth'); state.vidas--; }

            enviarDatosHaciaSheets(score, errX, errA);

            document.getElementById('feedback-ui').style.display = 'flex';
            document.getElementById('f-score').innerText = score + "%";
            document.getElementById('f-title').innerText = state.vidas <= 0 ? "PROTOCOLO FIN" : "ANÁLISIS";
            document.getElementById('f-data').innerHTML = `ERROR LATERAL: ${errX.toFixed(2)}%<br>ERROR ANGULAR: ${errA.toFixed(1)}°<br>ESTADO: ${state.vidas > 0 ? 'ESTABLE' : 'AGOTADO'}`;
            document.getElementById('f-btn').innerText = state.vidas <= 0 ? "REINTENTAR" : "SIGUIENTE NIVEL";
            
            if(score >= 90 && state.vidas > 0) state.lvl++;
        }

        function enviarDatosHaciaSheets(p, x, a) {
            const form = document.createElement("form");
            form.method = "POST";
            form.action = state.formUrl;
            form.target = "target_silencioso";

            const data = {
                "entry.369874016": localStorage.getItem('pacienteActual') || "ANONIMO",
                "entry.1353470174": "VERNIER_MOBILE_V25.1",
                "entry.721051298": p,
                "entry.873272199": x.toFixed(2),
                "entry.1030094511": a.toFixed(1),
                "entry.1303309812": state.lvl,
                "entry.845098414": new Date().toISOString().split('T')[0]
            };

            for (let k in data) {
                const i = document.createElement("input");
                i.type = "hidden"; i.name = k; i.value = data[k];
                form.appendChild(i);
            }
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        function next() {
            AUDIO.play(600, 0.1, 0.1);
            document.getElementById('feedback-ui').style.display = 'none';
            if(state.vidas <= 0) location.reload();
            else newRound();
        }

        function nudge(p, v) {
            if(!state.active) return;
            state.pac[p] += v;
            draw();
            state.nudge = setInterval(() => { state.pac[p] += v; draw(); }, 50);
        }

        function stopNudge() { clearInterval(state.nudge); }

        // Drag táctil en pantalla
        let isDragging = false;
        const gz = document.getElementById('game-zone');
        gz.addEventListener('touchstart', (e) => { if(state.active) isDragging = true; }, {passive: true});
        gz.addEventListener('touchmove', (e) => {
            if(!isDragging || !state.active) return;
            state.pac.x = (e.touches[0].clientX / window.innerWidth) * 100;
            draw();
        }, {passive: true});
        gz.addEventListener('touchend', () => isDragging = false);

    </script>
</body>
</html>
