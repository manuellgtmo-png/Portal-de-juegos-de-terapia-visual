<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tangram Vision Pro - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-panel: #1e293b;
            --bg-inv: #0a0f1a;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.4);
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            /* Colores Tangram Originales */
            --c1: #ff4757; --c2: #2e86de; --c3: #ffa502; 
            --c4: #2ed573; --c5: #a4b0be; --c6: #5352ed; --c7: #e056fd;
        }

        * { 
            box-sizing: border-box; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- PANTALLA DE INICIO (LAUNCHER) --- */
        #launcher { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            z-index: 100000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
        }

        .hero-title { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: var(--accent); 
            text-shadow: 0 10px 40px var(--accent-glow); 
            margin: 0; 
            letter-spacing: -2px;
        }

        .hero-subtitle { 
            font-size: 1.8rem; 
            color: var(--text-dim); 
            letter-spacing: 12px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .config-card {
            background: var(--bg-panel);
            padding: 30px;
            border-radius: 35px;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .mode-btn {
            background: rgba(255,255,255,0.03);
            border: 3px solid transparent;
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            margin-bottom: 15px;
            display: block;
            width: 100%;
            color: white;
        }

        .mode-btn.active {
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .mode-btn h4 { font-size: 1.6rem; color: var(--accent); margin-bottom: 5px; }
        .mode-btn p { font-size: 1rem; color: var(--text-dim); }

        /* --- INTERFAZ PRINCIPAL --- */
        header { 
            height: 130px; 
            padding: 0 50px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .hud-container { display: flex; gap: 20px; }
        .hud-item { 
            background: rgba(255,255,255,0.05); 
            padding: 15px 30px; 
            border-radius: 25px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hud-label { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .hud-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); }

        /* --- AREA DE JUEGO --- */
        .game-world { 
            display: flex; 
            flex: 1; 
            padding: 30px; 
            gap: 30px; 
            background: #0a0f1a; 
        }

        .panel-reference { 
            flex: 0 0 500px; 
            background: var(--bg-panel); 
            border-radius: 45px; 
            display: flex; 
            flex-direction: column; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .ref-canvas { 
            flex: 1; 
            margin: 25px; 
            background: rgba(0,0,0,0.5); 
            border-radius: 30px; 
            position: relative; 
            overflow: hidden; 
        }

        .canvas-main { 
            flex: 1; 
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
            border: 3px dashed rgba(255,255,255,0.1); 
            border-radius: 45px; 
            position: relative; 
        }

        .panel-inventory { 
            flex: 0 0 350px; 
            background: var(--bg-inv); 
            border-radius: 45px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .inv-scroll {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }

        /* --- PIEZAS --- */
        .piece { 
            position: absolute !important; 
            cursor: grab; 
            touch-action: none; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            z-index: 10;
        }
        .piece svg { width: 100%; height: 100%; display: block; overflow: visible; }

        /* --- CONTROLES INFERIORES --- */
        footer { 
            height: 150px; 
            background: rgba(15, 23, 42, 0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            border-top: 2px solid rgba(255,255,255,0.1); 
        }

        .btn-main { 
            padding: 30px 100px; 
            border-radius: 60px; 
            font-size: 2rem; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }

        .btn-success { background: var(--accent); color: var(--bg-deep); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn-danger { background: transparent; color: var(--error); border: 3px solid var(--error); }

        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.98); 
            z-index: 200000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }

        .modal { 
            background: var(--bg-panel); 
            padding: 80px; 
            border-radius: 60px; 
            text-align: center; 
            max-width: 800px; 
            width: 90%; 
            border: 8px solid var(--accent); 
        }

        .modal h2 { font-size: 5rem; margin-bottom: 30px; color: var(--accent); }
        .modal p { font-size: 2rem; color: var(--text-dim); margin-bottom: 50px; }

    </style>
</head>
<body>

    <div id="launcher">
        <h1 class="hero-title">CENTRO PERCEPTUM</h1>
        <p class="hero-subtitle">Visual Training Pro</p>
        
        <div class="config-grid">
            <div class="config-card">
                <h3 style="margin-bottom:25px; color:var(--text-dim); font-size: 1.5rem;">MODO DE TRABAJO</h3>
                <button class="mode-btn active" data-mode="copy" onclick="setMode(this)">
                    <h4>Copia Directa</h4>
                    <p>Orientación idéntica al modelo original.</p>
                </button>
                <button class="mode-btn" data-mode="mirrorV" onclick="setMode(this)">
                    <h4>Espejo Vertical</h4>
                    <p>Inversión lateral (Eje Izquierda-Derecha).</p>
                </button>
            </div>

            <div class="config-card">
                <h3 style="margin-bottom:25px; color:var(--text-dim); font-size: 1.5rem;">PARÁMETROS DE SESIÓN</h3>
                <div style="margin-bottom:35px">
                    <label style="display:block; margin-bottom:15px; font-weight:700; font-size: 1.2rem;">TEMPORIZADOR</label>
                    <select id="timer-type" style="width:100%; padding:20px; border-radius:20px; background:var(--bg-deep); color:white; border:none; font-size:1.3rem">
                        <option value="cron">Cronómetro Ascendente</option>
                        <option value="contra">Contrarreloj (45 seg)</option>
                    </select>
                </div>
                <div style="padding: 20px; background: rgba(34, 197, 94, 0.1); border-radius: 20px; border-left: 10px solid var(--accent);">
                    <p style="color:var(--accent); font-weight:900; font-size: 1.1rem;">
                        IMPORTANTE: Mantener una distancia de 40 cm respecto a la pantalla durante todo el ejercicio.
                    </p>
                </div>
            </div>
        </div>

        <button class="btn-main btn-success" style="font-size:3rem; padding:40px 150px" onclick="startApp()">INICIAR SISTEMA</button>
    </div>

    <header>
        <div class="logo">PERCEPTUM<span>PRO</span></div>
        <div class="hud-container">
            <div class="hud-item"><div class="hud-label">Nivel</div><div id="hud-lvl" class="hud-val">1</div></div>
            <div class="hud-item"><div class="hud-label">Tiempo</div><div id="hud-timer" class="hud-val">00:00</div></div>
            <div class="hud-item"><div class="hud-label">Vida Útil</div><div id="hud-hp" class="hud-val" style="color:var(--error)">❤️❤️❤️</div></div>
        </div>
    </header>

    <div class="game-world">
        <div class="panel-reference">
            <div class="ref-canvas" id="ref-zone"></div>
            <div style="padding:25px; text-align:center; font-weight:900; letter-spacing:4px; color:var(--accent); font-size: 1.5rem;">MODELO GUÍA</div>
        </div>

        <div class="canvas-main" id="drop-zone"></div>

        <div class="panel-inventory">
            <div style="padding:25px; background:rgba(255,255,255,0.03); text-align:center; font-weight:700; color:var(--text-dim); font-size: 1.2rem;">PIEZAS DISPONIBLES</div>
            <div class="inv-scroll" id="inv-zone"></div>
        </div>
    </div>

    <footer>
        <button class="btn-main btn-danger" onclick="location.reload()">Cancelar</button>
        <button class="btn-main btn-success" onclick="validateSolution()">Validar Figura</button>
    </footer>

    <div id="overlay">
        <div class="modal">
            <h2 id="modal-title">¡LOGRADO!</h2>
            <p id="modal-desc">Integración visual correcta.</p>
            <button class="btn-main btn-success" id="modal-btn">Siguiente Nivel</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS GEOMÉTRICA (COORDENADAS CENTRADAS) ---
        const SHAPES_MASTER = [
            { id: 0, pts: "-100,-50 100,-50 0,50", color: 'var(--c1)', w: 200, h: 200 }, // Triángulo G
            { id: 1, pts: "-70,-35 70,-35 0,35", color: 'var(--c2)', w: 140, h: 140 },  // Triángulo M
            { id: 2, pts: "-50,-50 50,-50 50,50 -50,50", color: 'var(--c3)', w: 100, h: 100 }, // Cuadrado
            { id: 3, pts: "-50,-25 50,-25 25,25 -75,25", color: 'var(--c7)', w: 150, h: 100 }  // Romboide
        ];

        // FIGURAS UNIFICADAS (LAS PIEZAS COMPARTEN COORDENADAS PARA PEGARSE)
        const LEVELS_DB = [
            { 
                name: "Cuadrado Maestro", 
                pieces: [
                    {i:0, x:0, y:-50, a:0}, 
                    {i:0, x:0, y:50, a:180}
                ] 
            },
            { 
                name: "Casita Perceptum", 
                pieces: [
                    {i:2, x:0, y:40, a:0}, 
                    {i:0, x:0, y:-60, a:0}
                ] 
            },
            { 
                name: "Punta de Flecha", 
                pieces: [
                    {i:0, x:0, y:-50, a:0}, 
                    {i:2, x:0, y:50, a:0}, 
                    {i:1, x:0, y:120, a:180}
                ] 
            }
        ];

        let state = {
            lvl: 0, hp: 3, time: 0, mode: 'copy', timerType: 'cron',
            activeTargets: [], isPaused: false, engineInterval: null
        };

        function setMode(btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.mode = btn.dataset.mode;
        }

        function startApp() {
            state.timerType = document.getElementById('timer-type').value;
            if(state.timerType === 'contra') state.time = 45;
            document.getElementById('launcher').style.display = 'none';
            initLevel();
            state.engineInterval = setInterval(updateTime, 1000);
        }

        function updateTime() {
            if(state.isPaused) return;
            if(state.timerType === 'cron') state.time++;
            else {
                state.time--;
                if(state.time <= 0) { handleError("TIEMPO AGOTADO"); state.time = 45; }
            }
            updateHUD();
        }

        function updateHUD() {
            const m = Math.floor(Math.abs(state.time)/60).toString().padStart(2,'0');
            const s = (Math.abs(state.time)%60).toString().padStart(2,'0');
            document.getElementById('hud-timer').innerText = `${m}:${s}`;
            document.getElementById('hud-lvl').innerText = state.lvl + 1;
            document.getElementById('hud-hp').innerText = "❤️".repeat(state.hp);
        }

        function initLevel() {
            const rz = document.getElementById('ref-zone');
            const iz = document.getElementById('inv-zone');
            const dz = document.getElementById('drop-zone');
            rz.innerHTML = iz.innerHTML = dz.innerHTML = '';
            state.activeTargets = [];

            const data = LEVELS_DB[state.lvl % LEVELS_DB.length];

            data.pieces.forEach((p, idx) => {
                const shape = SHAPES_MASTER[p.i];
                state.activeTargets.push({ id: idx, x: p.x, y: p.y, a: p.a });
                // Crear en Referencia (Pegadas)
                createPiece(shape, rz, p.x, p.y, p.a, true, idx);
                // Crear en Inventario (Sueltas)
                createPiece(shape, iz, 0, idx * 160 + 80, 0, false, idx);
            });
            initInteractions();
        }

        function createPiece(shape, container, x, y, a, isRef, id) {
            const div = document.createElement('div');
            div.className = 'piece';
            div.style.width = shape.w + 'px';
            div.style.height = shape.h + 'px';

            if(isRef) {
                div.style.left = '50%'; div.style.top = '50%';
                div.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${a}deg)`;
                div.style.pointerEvents = 'none'; div.style.opacity = '0.5';
            } else {
                div.style.left = '50%'; div.style.top = `${y}px`;
                div.style.transform = `translateX(-50%)`;
                div.setAttribute('data-id', id); 
                div.setAttribute('data-x', 0); div.setAttribute('data-y', 0);
                div.setAttribute('data-ang', 0);
            }

            div.innerHTML = `<svg viewBox="-120 -120 240 240"><polygon points="${shape.pts}" fill="${shape.color}" stroke="white" stroke-width="2"/></svg>`;
            container.appendChild(div);
        }

        function initInteractions() {
            interact('.piece:not([style*="pointer-events: none"])').draggable({
                listeners: {
                    start(event) {
                        const t = event.target;
                        if(t.parentNode.id === 'inv-zone') {
                            const rect = t.getBoundingClientRect();
                            const dzRect = document.getElementById('drop-zone').getBoundingClientRect();
                            document.getElementById('drop-zone').appendChild(t);
                            const nx = rect.left - dzRect.left + (rect.width/2);
                            const ny = rect.top - dzRect.top + (rect.height/2);
                            t.style.left = '0'; t.style.top = '0';
                            t.setAttribute('data-x', nx); t.setAttribute('data-y', ny);
                            t.style.transform = `translate(${nx}px, ${ny}px) rotate(0deg)`;
                        }
                    },
                    move(event) {
                        const t = event.target;
                        const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                        const ang = t.getAttribute('data-ang') || 0;
                        t.style.transform = `translate(${x}px, ${y}px) rotate(${ang}deg)`;
                        t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                    }
                }
            }).on('tap', (e) => {
                const t = e.currentTarget;
                let ang = (parseInt(t.getAttribute('data-ang')) || 0) + 45;
                const x = t.getAttribute('data-x'); const y = t.getAttribute('data-y');
                t.setAttribute('data-ang', ang);
                t.style.transform = `translate(${x}px, ${y}px) rotate(${ang}deg)`;
            });
        }

        function validateSolution() {
            const dz = document.getElementById('drop-zone').getBoundingClientRect();
            const cx = dz.width / 2; const cy = dz.height / 2;
            let correct = 0;

            state.activeTargets.forEach(tgt => {
                const p = document.querySelector(`.piece[data-id="${tgt.id}"]`);
                if(!p || p.parentNode.id !== 'drop-zone') return;

                const px = parseFloat(p.getAttribute('data-x')) - cx;
                const py = parseFloat(p.getAttribute('data-y')) - cy;
                const pa = (parseInt(p.getAttribute('data-ang')) % 360 + 360) % 360;

                let tx = tgt.x, ty = tgt.y;
                if(state.mode === 'mirrorV') tx = -tgt.x;

                const d = Math.sqrt(Math.pow(px-tx, 2) + Math.pow(py-ty, 2));
                const aDiff = Math.abs(pa - (tgt.a % 360));

                if(d < 50 && (aDiff < 20 || aDiff > 340)) correct++;
            });

            if(correct === state.activeTargets.length) {
                state.isPaused = true;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('modal-btn').onclick = () => {
                    state.lvl++; state.isPaused = false;
                    document.getElementById('overlay').style.display = 'none';
                    initLevel(); updateHUD();
                };
            } else {
                handleError("POSICIÓN INCORRECTA");
            }
        }

        function handleError(m) {
            state.hp--; updateHUD();
            if(state.hp <= 0) {
                alert("SESIÓN TERMINADA");
                location.reload();
            } else {
                alert(m);
            }
        }
    </script>
</body>
</html>
