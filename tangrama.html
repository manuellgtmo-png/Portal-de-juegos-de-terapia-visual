<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tangram Vision Pro - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-panel: #1e293b;
            --bg-inv: #0a0f1a;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.4);
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            /* Colores Tangram Originales */
            --c1: #ff4757; --c2: #2e86de; --c3: #ffa502; 
            --c4: #2ed573; --c5: #a4b0be; --c6: #5352ed; --c7: #e056fd;
        }

        * { 
            box-sizing: border-box; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- PANTALLA DE INICIO (LAUNCHER) --- */
        #launcher { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            z-index: 100000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
        }

        .hero-title { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: var(--accent); 
            text-shadow: 0 10px 40px var(--accent-glow); 
            margin: 0; 
            letter-spacing: -2px;
        }

        .hero-subtitle { 
            font-size: 1.8rem; 
            color: var(--text-dim); 
            letter-spacing: 12px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .config-card {
            background: var(--bg-panel);
            padding: 30px;
            border-radius: 35px;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .mode-btn {
            background: rgba(255,255,255,0.03);
            border: 3px solid transparent;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            margin-bottom: 15px;
            display: block;
            width: 100%;
            color: white;
        }

        .mode-btn.active {
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .mode-btn h4 { font-size: 1.4rem; color: var(--accent); margin-bottom: 5px; }
        .mode-btn p { font-size: 0.9rem; color: var(--text-dim); }

        /* --- INTERFAZ PRINCIPAL --- */
        header { 
            height: 110px; 
            padding: 0 50px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .hud-container { display: flex; gap: 20px; }
        .hud-item { 
            background: rgba(255,255,255,0.05); 
            padding: 10px 25px; 
            border-radius: 20px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hud-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .hud-val { font-size: 1.8rem; font-weight: 900; color: var(--accent); }

        /* --- AREA DE JUEGO --- */
        .game-world { 
            display: flex; 
            flex: 1; 
            padding: 25px; 
            gap: 25px; 
            background: #0a0f1a; 
        }

        /* Panel de Referencia (Izquierda) */
        .panel-reference { 
            flex: 0 0 400px; 
            background: var(--bg-panel); 
            border-radius: 40px; 
            display: flex; 
            flex-direction: column; 
            border: 3px solid var(--accent); 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .ref-canvas { 
            flex: 1; 
            margin: 20px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 25px; 
            position: relative; 
            overflow: hidden; 
        }

        /* Lienzo Principal (Centro) */
        .canvas-main { 
            flex: 1; 
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
            border: 2px dashed rgba(255,255,255,0.1); 
            border-radius: 40px; 
            position: relative; 
        }

        /* Inventario (Derecha) */
        .panel-inventory { 
            flex: 0 0 380px; 
            background: var(--bg-inv); 
            border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .inv-scroll {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
        }

        /* --- PIEZAS --- */
        .piece { 
            position: absolute !important; 
            cursor: grab; 
            touch-action: none; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            transition: filter 0.2s, opacity 0.3s;
            z-index: 10;
        }
        .piece:active { cursor: grabbing; z-index: 1000 !important; }
        .piece svg { width: 100%; height: 100%; display: block; }

        /* --- CONTROLES INFERIORES --- */
        footer { 
            height: 140px; 
            background: rgba(15, 23, 42, 0.9); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }

        .btn-main { 
            padding: 25px 80px; 
            border-radius: 50px; 
            font-size: 1.6rem; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }

        .btn-success { 
            background: var(--accent); 
            color: var(--bg-deep); 
            box-shadow: 0 10px 30px var(--accent-glow); 
        }
        
        .btn-danger { 
            background: transparent; 
            color: var(--error); 
            border: 2px solid var(--error); 
        }

        .btn-main:hover { transform: translateY(-5px); filter: brightness(1.1); }

        /* --- MODALES --- */
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.95); 
            z-index: 200000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .modal { 
            background: var(--bg-panel); 
            padding: 60px; 
            border-radius: 50px; 
            text-align: center; 
            max-width: 700px; 
            width: 100%; 
            border: 5px solid var(--accent); 
        }

        .modal h2 { font-size: 4rem; margin-bottom: 20px; }
        .modal p { font-size: 1.5rem; color: var(--text-dim); margin-bottom: 40px; }

        .silhouette-mode polygon { fill: #000 !important; stroke: rgba(255,255,255,0.2); stroke-width: 1; }

    </style>
</head>
<body>

    <div id="launcher">
        <h1 class="hero-title">CENTRO PERCEPTUM</h1>
        <p class="hero-subtitle">Visual Training System</p>
        
        <div class="config-grid">
            <div class="config-card">
                <h3 style="margin-bottom:20px; color:var(--text-dim)">MODO DE TRABAJO</h3>
                <button class="mode-btn active" data-mode="copy" onclick="setMode(this)">
                    <h4>Copia Directa</h4>
                    <p>Misma orientación que el modelo.</p>
                </button>
                <button class="mode-btn" data-mode="mirrorV" onclick="setMode(this)">
                    <h4>Espejo Vertical</h4>
                    <p>Inversión en eje X (Derecha-Izquierda).</p>
                </button>
                <button class="mode-btn" data-mode="mirrorH" onclick="setMode(this)">
                    <h4>Espejo Horizontal</h4>
                    <p>Inversión en eje Y (Arriba-Abajo).</p>
                </button>
                <button class="mode-btn" data-mode="rotate180" onclick="setMode(this)">
                    <h4>Rotación 180°</h4>
                    <p>Giro completo del patrón.</p>
                </button>
            </div>

            <div class="config-card">
                <h3 style="margin-bottom:20px; color:var(--text-dim)">AJUSTES DE SESIÓN</h3>
                <div style="margin-bottom:30px">
                    <label style="display:block; margin-bottom:15px; font-weight:700">TIPO DE RELOJ</label>
                    <select id="timer-type" style="width:100%; padding:15px; border-radius:15px; background:var(--bg-deep); color:white; border:none; font-size:1.1rem">
                        <option value="cron">Cronómetro (Ascendente)</option>
                        <option value="contra">Contrarreloj (30 seg/nivel)</option>
                        <option value="contra_hard">Contrarreloj Extremo (15 seg/nivel)</option>
                    </select>
                </div>
                <p style="color:var(--accent); font-weight:900; line-height:1.4">
                    ⚠️ RECORDATORIO:<br>
                    Realizar la tarea a exactamente 40 cm de distancia de la pantalla.
                </p>
            </div>
        </div>

        <button class="btn-main btn-success" style="font-size:2.5rem; padding:35px 120px" onclick="startApp()">INICIAR ENTRENAMIENTO</button>
    </div>

    <header>
        <div class="logo">PERCEPTUM<span>PRO</span></div>
        <div class="hud-container">
            <div class="hud-item"><div class="hud-label">Nivel</div><div id="hud-lvl" class="hud-val">1</div></div>
            <div class="hud-item"><div class="hud-label">Tiempo</div><div id="hud-timer" class="hud-val">00:00</div></div>
            <div class="hud-item"><div class="hud-label">Vidas</div><div id="hud-hp" class="hud-val" style="color:var(--error)">❤️❤️❤️</div></div>
        </div>
    </header>

    <div class="game-world">
        <div class="panel-reference">
            <div class="ref-canvas" id="ref-zone"></div>
            <div style="padding:15px; text-align:center; font-weight:900; letter-spacing:2px; color:var(--accent)">MODELO GUÍA</div>
        </div>

        <div class="canvas-main" id="drop-zone"></div>

        <div class="panel-inventory">
            <div style="padding:20px; background:rgba(255,255,255,0.03); text-align:center; font-weight:700; color:var(--text-dim)">BANCO DE PIEZAS</div>
            <div class="inv-scroll" id="inv-zone"></div>
        </div>
    </div>

    <footer>
        <button class="btn-main btn-danger" onclick="location.reload()">Finalizar</button>
        <button class="btn-main btn-success" onclick="validateSolution()">Validar Figura</button>
    </footer>

    <div id="overlay">
        <div class="modal" id="modal-box">
            <h2 id="modal-title">¡EXCELENTE!</h2>
            <p id="modal-desc">Percepción espacial correcta.</p>
            <button class="btn-main btn-success" id="modal-btn">Siguiente Nivel</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS GEOMÉTRICA (7 PIEZAS OFICIALES TANGRAM) ---
        const SHAPES_MASTER = [
            { id: 0, pts: "0,0 100,0 50,50", color: 'var(--c1)', w: 180, h: 90 }, // Tri Grande 1
            { id: 1, pts: "0,0 0,100 50,50", color: 'var(--c2)', w: 90, h: 180 }, // Tri Grande 2
            { id: 2, pts: "0,50 50,0 100,50 50,100", color: 'var(--c3)', w: 100, h: 100 }, // Cuadrado
            { id: 3, pts: "0,0 100,100 0,100", color: 'var(--c4)', w: 120, h: 120 }, // Tri Mediano
            { id: 4, pts: "0,0 50,50 0,100", color: 'var(--c5)', w: 60, h: 120 }, // Tri Pequeño 1
            { id: 5, pts: "0,0 100,0 50,50", color: 'var(--c6)', w: 120, h: 60 }, // Tri Pequeño 2
            { id: 6, pts: "0,0 75,0 100,50 25,50", color: 'var(--c7)', w: 160, h: 80 }  // Romboide
        ];

        const LEVELS_DB = [
            { name: "Flecha Norte", pieces: [{i:0,x:0,y:-40,a:0}, {i:2,x:0,y:50,a:0}, {i:4,x:0,y:120,a:180}] },
            { name: "El Cisne", pieces: [{i:0,x:-30,y:20,a:45}, {i:2,x:50,y:-60,a:0}, {i:5,x:20,y:40,a:90}] },
            { name: "Casita", pieces: [{i:2,x:0,y:30,a:0}, {i:0,x:0,y:-55,a:180}, {i:6,x:70,y:30,a:0}] },
            { name: "Zorro", pieces: [{i:4,x:-40,y:-60,a:0}, {i:2,x:0,y:0,a:45}, {i:5,x:60,y:40,a:0}] },
            { name: "Pez Espada", pieces: [{i:0,x:-20,y:0,a:90}, {i:5,x:70,y:0,a:0}, {i:4,x:-90,y:0,a:270}] }
        ];

        let state = {
            lvl: 1, hp: 3, time: 0, mode: 'copy', timerType: 'cron',
            activeTargets: [], isPaused: false, engineInterval: null
        };

        function setMode(btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.mode = btn.dataset.mode;
        }

        function startApp() {
            state.timerType = document.getElementById('timer-type').value;
            if(state.timerType.includes('contra')) state.time = state.timerType === 'contra' ? 30 : 15;
            document.getElementById('launcher').style.display = 'none';
            initLevel();
            startEngine();
        }

        function startEngine() {
            if(state.engineInterval) clearInterval(state.engineInterval);
            state.engineInterval = setInterval(() => {
                if(state.isPaused) return;
                if(state.timerType === 'cron') state.time++;
                else {
                    state.time--;
                    if(state.time <= 0) { handleError("¡TIEMPO AGOTADO!"); state.time = state.timerType === 'contra' ? 30 : 15; }
                }
                updateHUD();
            }, 1000);
        }

        function updateHUD() {
            const m = Math.floor(Math.abs(state.time)/60).toString().padStart(2,'0');
            const s = (Math.abs(state.time)%60).toString().padStart(2,'0');
            document.getElementById('hud-timer').innerText = `${m}:${s}`;
            document.getElementById('hud-lvl').innerText = state.lvl;
            document.getElementById('hud-hp').innerText = "❤️".repeat(state.hp);
        }

        function initLevel() {
            const refZone = document.getElementById('ref-zone');
            const invZone = document.getElementById('inv-zone');
            const dropZone = document.getElementById('drop-zone');
            refZone.innerHTML = invZone.innerHTML = dropZone.innerHTML = '';
            state.activeTargets = [];

            const data = LEVELS_DB[(state.lvl - 1) % LEVELS_DB.length];
            if(state.lvl > 10) refZone.classList.add('silhouette-mode');
            else refZone.classList.remove('silhouette-mode');

            data.pieces.forEach((p, idx) => {
                const shape = SHAPES_MASTER[p.i];
                state.activeTargets.push({ id: idx, x: p.x, y: p.y, a: p.a });
                createPiece(shape, refZone, p.x, p.y, p.a, true, idx);
                createPiece(shape, invZone, 0, (idx * 140), 0, false, idx);
            });
            initInteractions();
        }

        function createPiece(shape, container, x, y, a, isRef, id) {
            const div = document.createElement('div');
            div.className = 'piece';
            const scale = isRef ? 0.65 : 1.0;
            div.style.width = (shape.w * scale) + 'px';
            div.style.height = (shape.h * scale) + 'px';

            if(isRef) {
                div.style.left = '50%'; div.style.top = '50%';
                div.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${a}deg)`;
                div.style.pointerEvents = 'none'; div.style.opacity = '0.8';
            } else {
                div.style.left = '40px'; div.style.top = '20px';
                div.setAttribute('data-id', id); div.setAttribute('data-x', 0);
                div.setAttribute('data-y', 0); div.setAttribute('data-ang', 0);
            }

            div.innerHTML = `<svg viewBox="0 0 ${shape.w} ${shape.h}"><polygon points="${shape.pts}" fill="${shape.color}"/></svg>`;
            container.appendChild(div);
        }

        function initInteractions() {
            interact('.piece:not([style*="pointer-events: none"])').draggable({
                listeners: {
                    start(event) {
                        const t = event.target;
                        if(t.parentNode.id === 'inv-zone') {
                            const rect = t.getBoundingClientRect();
                            const dropRect = document.getElementById('drop-zone').getBoundingClientRect();
                            document.getElementById('drop-zone').appendChild(t);
                            const nx = rect.left - dropRect.left;
                            const ny = rect.top - dropRect.top;
                            t.style.left = '0px'; t.style.top = '0px';
                            t.setAttribute('data-x', nx); t.setAttribute('data-y', ny);
                            t.style.transform = `translate(${nx}px, ${ny}px) rotate(${t.getAttribute('data-ang')}deg)`;
                        }
                    },
                    move(event) {
                        const target = event.target;
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        const ang = target.getAttribute('data-ang') || 0;
                        target.style.transform = `translate(${x}px, ${y}px) rotate(${ang}deg)`;
                        target.setAttribute('data-x', x); target.setAttribute('data-y', y);
                    }
                }
            }).on('tap', function (event) {
                const target = event.currentTarget;
                let ang = (parseInt(target.getAttribute('data-ang')) || 0) + 45;
                const x = target.getAttribute('data-x') || 0;
                const y = target.getAttribute('data-y') || 0;
                target.setAttribute('data-ang', ang);
                target.style.transform = `translate(${x}px, ${y}px) rotate(${ang}deg)`;
            });
        }

        function validateSolution() {
            const dropRect = document.getElementById('drop-zone').getBoundingClientRect();
            const centerX = dropRect.left + dropRect.width / 2;
            const centerY = dropRect.top + dropRect.height / 2;
            let correctCount = 0;

            state.activeTargets.forEach(tgt => {
                const piece = document.querySelector(`.piece[data-id="${tgt.id}"]`);
                if(!piece || piece.parentNode.id === 'inv-zone') return;

                const pRect = piece.getBoundingClientRect();
                const pX = (pRect.left + pRect.width / 2) - centerX;
                const pY = (pRect.top + pRect.height / 2) - centerY;
                const pA = (parseInt(piece.getAttribute('data-ang')) || 0) % 360;

                let tX = tgt.x, tY = tgt.y, tA = tgt.a;
                if(state.mode === 'mirrorV') tX = -tgt.x;
                if(state.mode === 'mirrorH') tY = -tgt.y;
                if(state.mode === 'rotate180') { tX = -tgt.x; tY = -tgt.y; tA = (tgt.a + 180) % 360; }

                const dist = Math.sqrt(Math.pow(pX - tX, 2) + Math.pow(pY - tY, 2));
                const angDiff = Math.abs((pA + 360) % 360 - (tA + 360) % 360);

                if(dist < 50 && (angDiff < 10 || angDiff > 350)) correctCount++;
            });

            if(correctCount === state.activeTargets.length) handleSuccess();
            else handleError("LA FIGURA NO COINCIDE");
        }

        function handleSuccess() {
            state.isPaused = true;
            const modal = document.getElementById('overlay');
            document.getElementById('modal-title').innerText = "¡LOGRADO!";
            document.getElementById('modal-title').style.color = "var(--accent)";
            document.getElementById('modal-desc').innerText = "Coordinación visomotora excelente.";
            document.getElementById('modal-btn').onclick = () => {
                state.lvl++; state.isPaused = false;
                if(state.timerType.includes('contra')) state.time = state.timerType === 'contra' ? 30 : 15;
                modal.style.display = 'none'; initLevel(); updateHUD();
            };
            modal.style.display = 'flex';
        }

        function handleError(msg) {
            state.hp--; updateHUD();
            const modal = document.getElementById('overlay');
            document.getElementById('modal-title').innerText = state.hp <= 0 ? "GAME OVER" : "REINTENTAR";
            document.getElementById('modal-title').style.color = "var(--error)";
            document.getElementById('modal-desc').innerText = msg;
            const btn = document.getElementById('modal-btn');
            btn.innerText = state.hp <= 0 ? "REINICIAR TODO" : "CONTINUAR";
            btn.onclick = () => { if(state.hp <= 0) location.reload(); else modal.style.display = 'none'; };
            modal.style.display = 'flex';
        }
    </script>
</body>
</html>
