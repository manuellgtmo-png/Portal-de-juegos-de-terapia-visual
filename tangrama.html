<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERCEPTUM PRO V10 | FULL PROTOCOL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>

    <style>
        :root {
            --bg-deep: #020617;
            --panel-bg: #0f172a;
            --clinical-green: #22c55e;
            --clinical-red: #f43f5e;
            --ui-border: #1e293b;
            --text-white: #f8fafc;
            --text-dim: #64748b;
            
            /* Colores Tangram Quantech Original */
            --c1: #ef4444; --c2: #3b82f6; --c3: #94a3b8; 
            --c4: #f59e0b; --c5: #10b981; --c6: #6366f1; --c7: #d946ef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            font-family: 'Montserrat', sans-serif; background: var(--bg-deep);
            color: var(--text-white); height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- PANTALLA DE LANZAMIENTO COMPLETA --- */
        #setup-launcher {
            position: fixed; inset: 0; z-index: 10000;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .setup-box {
            width: 90%; max-width: 900px; background: rgba(15, 23, 42, 0.98);
            padding: 50px; border-radius: 40px; border: 2px solid var(--clinical-green);
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .setup-box h1 { font-family: 'Orbitron'; font-size: 3rem; color: var(--clinical-green); letter-spacing: 10px; margin-bottom: 20px; }

        .mode-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .mode-card {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px;
            border: 2px solid transparent; cursor: pointer; transition: 0.3s;
        }
        .mode-card.active { border-color: var(--clinical-green); background: rgba(34, 197, 94, 0.1); }
        .mode-card h3 { font-family: 'Orbitron'; color: var(--clinical-green); font-size: 0.9rem; margin-bottom: 5px; }
        .mode-card p { font-size: 0.65rem; color: var(--text-dim); }

        /* --- INTERFAZ HUD --- */
        header {
            height: 80px; background: #000; border-bottom: 2px solid var(--clinical-green);
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px;
        }
        .hud-group { display: flex; gap: 20px; }
        .stat-box { background: var(--panel-bg); padding: 8px 20px; border-radius: 12px; border: 1px solid var(--ui-border); text-align: center; }
        .stat-label { display: block; font-size: 0.6rem; color: var(--text-dim); font-weight: 800; }
        .stat-val { font-family: 'Orbitron'; font-size: 1.4rem; color: var(--clinical-green); }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; padding: 20px; gap: 20px; overflow: hidden; }

        .panel { background: var(--panel-bg); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; position: relative; }

        #panel-guide { flex: 0 0 450px; background: #000; border: 3px solid var(--clinical-green); }
        .guide-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .guide-label { background: var(--clinical-green); color: #000; text-align: center; padding: 10px; font-weight: 900; font-size: 0.7rem; }

        #panel-work { flex: 1; border: 2px dashed rgba(255,255,255,0.1); background-image: radial-gradient(rgba(255,255,255,0.05) 2px, transparent 2px); background-size: 50px 50px; }

        #panel-inv { flex: 0 0 250px; }
        .inv-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .inv-item { width: 100%; aspect-ratio: 1/1; background: rgba(0,0,0,0.4); border-radius: 20px; border: 1px solid transparent; cursor: pointer; padding: 10px; transition: 0.2s; }
        .inv-item:hover { border-color: var(--clinical-green); transform: scale(1.02); }

        /* PIEZAS */
        .piece-active { position: absolute; z-index: 100; cursor: grab; }

        footer { height: 90px; background: var(--panel-bg); border-top: 1px solid var(--ui-border); display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn { padding: 18px 50px; border-radius: 100px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border: none; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn-main { background: var(--clinical-green); color: #052e16; }
        .btn-alt { background: #334155; color: white; }

        .mirror-effect svg { transform: scaleX(-1); }

        #modal-win { position: fixed; inset: 0; background: rgba(2,6,23,0.98); z-index: 20000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="setup-launcher">
        <div class="setup-box">
            <h1>PERCEPTUM PRO</h1>
            <p style="color:var(--clinical-red); font-weight:900; letter-spacing:2px;">PROTOCOLO CLÍNICO OBLIGATORIO</p>
            
            <div class="mode-selector">
                <div class="mode-card active" onclick="setMode('normal', this)">
                    <h3>COPIA</h3>
                    <p>Visión Directa</p>
                </div>
                <div class="mode-card" onclick="setMode('mirror', this)">
                    <h3>ESPEJO</h3>
                    <p>Inversión Lateral</p>
                </div>
                <div class="mode-card" onclick="setMode('timed', this)">
                    <h3>MÉTRICA</h3>
                    <p>Tiempo Límite</p>
                </div>
            </div>

            <button class="btn btn-main" style="width:100%" onclick="launch()">INICIAR PROGRAMA</button>
        </div>
    </div>

    <header>
        <div style="font-family:'Orbitron'; font-weight:900; font-size:1.6rem">PERCEPTUM <span style="color:var(--clinical-green)">VISION</span></div>
        <div class="hud-group">
            <div class="stat-box">
                <span class="stat-label">FASE</span>
                <b class="stat-val" id="hud-lvl">01</b>
            </div>
            <div class="stat-box" id="timer-box" style="display:none">
                <span class="stat-label">TIEMPO</span>
                <b class="stat-val" id="hud-time">60</b>
            </div>
        </div>
    </header>

    <main>
        <div class="panel" id="panel-guide">
            <div class="guide-container" id="guide-render"></div>
            <div class="guide-label" id="label-guide">REFERENCIA VISUAL</div>
        </div>
        <div class="panel" id="panel-work"></div>
        <div class="panel" id="panel-inv">
            <div class="inv-list" id="inv-render"></div>
            <div style="text-align:center; padding:10px; font-size:0.6rem; color:var(--text-dim); font-weight:900">BANCO DE PIEZAS</div>
        </div>
    </main>

    <footer>
        <button class="btn btn-alt" onclick="location.reload()">Cerrar</button>
        <button class="btn btn-main" onclick="checkWin()">Validar</button>
    </footer>

    <div id="modal-win">
        <h2 style="font-family:'Orbitron'; font-size:4rem; color:var(--clinical-green)">LOGRADO</h2>
        <button class="btn btn-main" style="margin-top:30px" onclick="nextPhase()">Siguiente Fase</button>
    </div>

    <script>
        const PIECES = [
            { id:0, pts:"0,0 160,0 80,80", color:"var(--c1)", w:160, h:80 },
            { id:1, pts:"0,0 0,160 80,80", color:"var(--c2)", w:80, h:160 },
            { id:2, pts:"0,0 80,80 0,160", color:"var(--c3)", w:80, h:160 },
            { id:3, pts:"0,0 80,0 40,40",   color:"var(--c4)", w:80, h:40 },
            { id:4, pts:"40,40 80,80 0,80", color:"var(--c5)", w:80, h:80 },
            { id:5, pts:"40,0 80,40 40,80 0,40", color:"var(--c6)", w:80, h:80 },
            { id:6, pts:"0,40 80,40 120,0 40,0", color:"var(--c7)", w:120, h:40 }
        ];

        const FIGURES = [
            { name: "CISNE", map: [{id:0,x:-40,y:20,r:180},{id:1,x:-120,y:-60,r:90},{id:2,x:40,y:-60,r:45},{id:3,x:-40,y:-20,r:0},{id:4,x:-80,y:100,r:90},{id:5,x:0,y:-20,r:0},{id:6,x:0,y:100,r:-45}]},
            { name: "PEZ", map: [{id:0,x:-40,y:0,r:90},{id:1,x:-40,y:80,r:0},{id:2,x:40,y:0,r:-90},{id:3,x:-40,y:-80,r:-45},{id:4,x:0,y:-120,r:45},{id:5,x:-120,y:0,r:0},{id:6,x:40,y:-80,r:0}]}
        ];

        let state = { mode: 'normal', lvl: 0, time: 60, clock: null };

        function setMode(m, el) {
            state.mode = m;
            document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function launch() {
            document.getElementById('setup-launcher').style.display = 'none';
            if(state.mode === 'mirror') {
                document.getElementById('guide-render').classList.add('mirror-effect');
                document.getElementById('label-guide').innerText = "MODO ESPEJO";
            }
            if(state.mode === 'timed') {
                document.getElementById('timer-box').style.display = 'block';
                startClock();
            }
            render();
        }

        function render() {
            const guide = document.getElementById('guide-render');
            const inv = document.getElementById('inv-render');
            guide.innerHTML = inv.innerHTML = "";
            const fig = FIGURES[state.lvl % FIGURES.length];

            let svg = `<svg viewBox="-250 -250 500 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">`;
            fig.map.forEach(p => {
                const d = PIECES.find(x => x.id === p.id);
                svg += `<polygon points="${d.pts}" fill="${d.color}" stroke="white" stroke-width="2" transform="translate(${p.x},${p.y}) rotate(${p.r})"/>`;
            });
            guide.innerHTML = svg + `</svg>`;

            PIECES.forEach(p => {
                const div = document.createElement('div');
                div.className = "inv-item";
                div.innerHTML = `<svg viewBox="-10 -10 180 180"><polygon points="${p.pts}" fill="${p.color}" stroke="white" stroke-width="6"/></svg>`;
                div.onclick = () => spawn(p);
                inv.appendChild(div);
            });
            document.getElementById('hud-lvl').innerText = (state.lvl+1).toString().padStart(2,'0');
        }

        function spawn(p) {
            const el = document.createElement('div');
            el.className = "piece-active";
            el.style.width = (p.w * 1.3) + "px";
            el.style.height = (p.h * 1.3) + "px";
            el.innerHTML = `<svg viewBox="0 0 ${p.w} ${p.h}" style="overflow:visible"><polygon points="${p.pts}" fill="${p.color}" stroke="white" stroke-width="3"/></svg>`;
            el.dataset.x = 50; el.dataset.y = 50; el.dataset.r = 0;
            document.getElementById('panel-work').appendChild(el);
            update(el);
            interact(el).draggable({ listeners: { move(e) {
                const t = e.target;
                t.dataset.x = (parseFloat(t.dataset.x)||0)+e.dx;
                t.dataset.y = (parseFloat(t.dataset.y)||0)+e.dy;
                update(t);
            }}}).on('doubletap', e => {
                const t = e.currentTarget;
                t.dataset.r = (parseInt(t.dataset.r)+45)%360;
                update(t);
            });
        }

        function update(el) { el.style.transform = `translate(${el.dataset.x}px, ${el.dataset.y}px) rotate(${el.dataset.r}deg)`; }
        function startClock() { state.clock = setInterval(() => { state.time--; document.getElementById('hud-time').innerText = state.time; if(state.time<=0) location.reload(); }, 1000); }
        function checkWin() { document.getElementById('modal-win').style.display = 'flex'; clearInterval(state.clock); }
        function nextPhase() { state.lvl++; document.getElementById('modal-win').style.display = 'none'; if(state.mode==='timed'){state.time=60; startClock();} render(); }
    </script>
</body>
</html>
