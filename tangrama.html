<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tangram Vision Pro - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-panel: #1e293b;
            --bg-inv: #0a0f1a;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.4);
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --c1: #ff4757; --c2: #2e86de; --c3: #ffa502; 
            --c4: #2ed573; --c5: #a4b0be; --c6: #5352ed; --c7: #e056fd;
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        * { 
            box-sizing: border-box; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- PANTALLA DE INICIO (LAUNCHER COMPLETO) --- */
        #launcher { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            z-index: 100000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
        }

        .hero-title { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: var(--accent); 
            text-shadow: 0 10px 40px var(--accent-glow); 
            margin: 0; 
            letter-spacing: -2px;
        }

        .hero-subtitle { 
            font-size: 1.8rem; 
            color: var(--text-dim); 
            letter-spacing: 12px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
        }

        .distance-alert {
            background: rgba(34, 197, 94, 0.1);
            border: 2px dashed var(--accent);
            padding: 25px 50px;
            border-radius: 25px;
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 40px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .config-card {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 35px;
            border: 2px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mode-btn {
            background: rgba(255,255,255,0.03);
            border: 3px solid transparent;
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            width: 100%;
            color: white;
        }

        .mode-btn.active {
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .mode-btn h4 { font-size: 1.6rem; color: var(--accent); margin-bottom: 5px; }
        .mode-btn p { font-size: 1rem; color: var(--text-dim); }

        /* SLIDER DE TIEMPO RESTAURADO */
        .time-slider-wrap {
            margin-top: 10px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }
        input[type=range] {
            width: 100%;
            height: 12px;
            background: #2d3748;
            border-radius: 10px;
            appearance: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .range-vals {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: var(--text-dim);
            font-weight: 900;
            font-size: 1.2rem;
        }

        /* --- INTERFAZ PRINCIPAL --- */
        header { 
            height: 130px; 
            padding: 0 50px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .hud-container { display: flex; gap: 20px; }
        .hud-item { 
            background: rgba(255,255,255,0.05); 
            padding: 15px 30px; 
            border-radius: 25px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 150px;
        }
        .hud-label { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .hud-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); }

        /* --- ÁREA DE TRABAJO --- */
        .game-world { 
            display: flex; 
            flex: 1; 
            padding: 30px; 
            gap: 30px; 
            background: #0a0f1a; 
        }

        .panel-reference { 
            flex: 0 0 500px; 
            background: var(--bg-panel); 
            border-radius: 45px; 
            display: flex; 
            flex-direction: column; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .ref-canvas { 
            flex: 1; 
            margin: 25px; 
            background: rgba(0,0,0,0.5); 
            background-image: radial-gradient(var(--grid-color) 2px, transparent 2px);
            background-size: 50px 50px;
            border-radius: 30px; 
            position: relative; 
            overflow: hidden; 
        }

        .canvas-main { 
            flex: 1; 
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            border: 3px dashed rgba(255,255,255,0.1); 
            border-radius: 45px; 
            position: relative; 
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        .panel-inventory { 
            flex: 0 0 350px; 
            background: var(--bg-inv); 
            border-radius: 45px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .inv-scroll {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        /* --- PIEZAS TANGRAM --- */
        .piece { 
            position: absolute !important; 
            cursor: grab; 
            touch-action: none; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            z-index: 10;
        }
        .piece svg { width: 100%; height: 100%; display: block; overflow: visible; }
        
        .piece.in-inventory {
            position: relative !important;
            transform: none !important;
            left: auto !important;
            top: auto !important;
            margin-bottom: 40px;
        }

        /* --- FOOTER --- */
        footer { 
            height: 150px; 
            background: rgba(15, 23, 42, 0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            border-top: 2px solid rgba(255,255,255,0.1); 
        }

        .btn-main { 
            padding: 30px 100px; 
            border-radius: 60px; 
            font-size: 2rem; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }

        .btn-success { background: var(--accent); color: var(--bg-deep); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn-danger { background: transparent; color: var(--error); border: 3px solid var(--error); }

        /* MODALES */
        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.98); 
            z-index: 200000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }

        .modal { 
            background: var(--bg-panel); 
            padding: 80px; 
            border-radius: 60px; 
            text-align: center; 
            max-width: 800px; 
            width: 90%; 
            border: 8px solid var(--accent); 
        }

    </style>
</head>
<body>

    <div id="launcher">
        <h1 class="hero-title">CENTRO PERCEPTUM</h1>
        <p class="hero-subtitle">Visual Training System</p>
        
        <div class="distance-alert">
            ⚠️ TAREA A REALIZAR A 40 CM DE DISTANCIA
        </div>

        <div class="config-grid">
            <div class="config-card">
                <h3 style="color:var(--text-dim); font-size: 1.5rem; text-transform: uppercase;">Modo Terapéutico</h3>
                <button class="mode-btn active" data-mode="direct" onclick="setMode(this)">
                    <h4>Copia Directa</h4>
                    <p>Orientación idéntica al modelo.</p>
                </button>
                <button class="mode-btn" data-mode="mirror" onclick="setMode(this)">
                    <h4>Inversión Lateral</h4>
                    <p>Estimulación bi-hemisférica (Espejo).</p>
                </button>
            </div>
            <div class="config-card">
                <h3 style="color:var(--text-dim); font-size: 1.5rem; text-transform: uppercase;">Cronometría (Seg)</h3>
                <div class="time-slider-wrap">
                    <input type="range" id="time-range" min="15" max="120" value="45" oninput="document.getElementById('time-display').innerText = this.value + 's'">
                    <div class="range-labels">
                        <span>15s</span>
                        <span id="time-display" style="color:var(--accent); font-size:2rem">45s</span>
                        <span>120s</span>
                    </div>
                </div>
                <p style="color: var(--text-dim); font-size: 0.9rem; margin-top: 10px;">Niveles infinitos. Se pierde al agotar las vidas.</p>
            </div>
        </div>

        <button class="btn-main btn-success" style="font-size:3rem; padding:40px 150px" onclick="startApp()">INICIAR SISTEMA</button>
    </div>

    <header>
        <div class="logo">PERCEPTUM<span>PRO</span></div>
        <div class="hud-container">
            <div class="hud-item"><div class="hud-label">Nivel</div><div id="hud-lvl" class="hud-val">1</div></div>
            <div class="hud-item"><div class="hud-label">Tiempo</div><div id="hud-timer" class="hud-val">45</div></div>
            <div class="hud-item"><div class="hud-label">Vidas</div><div id="hud-hp" class="hud-val" style="color:var(--error)">❤️❤️❤️</div></div>
        </div>
    </header>

    <div class="game-world">
        <div class="panel-reference">
            <div class="ref-canvas" id="ref-zone"></div>
            <div style="padding:25px; text-align:center; font-weight:900; letter-spacing:4px; color:var(--accent); font-size: 1.5rem;">MODELO GUÍA</div>
        </div>

        <div class="canvas-main" id="drop-zone"></div>

        <div class="panel-inventory">
            <div style="padding:25px; background:rgba(255,255,255,0.03); text-align:center; font-weight:700; color:var(--text-dim); font-size: 1.2rem;">PIEZAS</div>
            <div class="inv-scroll" id="inv-zone"></div>
        </div>
    </div>

    <footer>
        <button class="btn-main btn-danger" onclick="location.reload()">Finalizar Sesión</button>
        <button class="btn-main btn-success" onclick="validateSolution()">Validar Posición</button>
    </footer>

    <div id="overlay">
        <div class="modal" id="modal-content">
            <h2 id="modal-title" style="font-size: 4rem; margin-bottom: 30px;">¡EXCELENTE!</h2>
            <button class="btn-main btn-success" id="modal-btn">SIGUIENTE NIVEL</button>
        </div>
    </div>

    <script>
        const SHAPES = [
            { id: 0, pts: "0,0 160,0 80,80", c: "var(--c1)", w: 160, h: 80 },
            { id: 1, pts: "0,0 0,160 80,80", c: "var(--c2)", w: 80, h: 160 },
            { id: 2, pts: "80,80 160,80 160,160", c: "var(--c3)", w: 80, h: 80 },
            { id: 3, pts: "0,160 80,160 40,120", c: "var(--c4)", w: 80, h: 40 },
            { id: 4, pts: "80,0 120,40 80,80", c: "var(--c5)", w: 40, h: 80 },
            { id: 5, pts: "40,0 80,40 40,80 0,40", c: "var(--c6)", w: 80, h: 80 },
            { id: 6, pts: "40,0 120,0 80,40 0,40", c: "var(--c7)", w: 120, h: 40 }
        ];

        const LEVELS_DB = [
            { name: "Cisne", coords: [[0,-60,0], [0,20,0], [100,-100,45], [40,-80,0], [-40,-20,90], [0,100,0], [80,60,45]] },
            { name: "Gato", coords: [[0,0,45], [40,40,0], [-40,-40,180], [0,-100,0], [80,0,90], [-20,60,0], [60,80,45]] },
            { name: "Barco", coords: [[-40,40,0], [40,40,0], [0,-40,0], [-80,80,0], [80,80,0], [0,80,0], [0,120,0]] }
        ];

        let state = { lvl: 0, hp: 3, mode: 'direct', baseTime: 45, currentSecs: 45, timer: null };

        function setMode(btn) {
            document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.mode = btn.dataset.mode;
        }

        function startApp() {
            state.baseTime = parseInt(document.getElementById('time-range').value);
            document.getElementById('launcher').style.display = 'none';
            initLevel();
        }

        function initLevel() {
            clearInterval(state.timer);
            state.currentSecs = state.baseTime;
            document.getElementById('hud-timer').innerText = state.currentSecs;
            
            const gz = document.getElementById('ref-zone'), iz = document.getElementById('inv-zone'), dz = document.getElementById('drop-zone');
            gz.innerHTML = iz.innerHTML = dz.innerHTML = "";

            const fig = state.lvl < LEVELS_DB.length ? LEVELS_DB[state.lvl] : LEVELS_DB[state.lvl % LEVELS_DB.length];
            
            SHAPES.forEach((s, i) => {
                createPiece(s, gz, fig.coords[i][0], fig.coords[i][1], fig.coords[i][2], true, i);
                createPiece(s, iz, 0, 0, 0, false, i);
            });

            startCountdown();
            initInteract();
            updateHUD();
        }

        function startCountdown() {
            state.timer = setInterval(() => {
                state.currentSecs--;
                document.getElementById('hud-timer').innerText = state.currentSecs;
                if(state.currentSecs <= 0) {
                    clearInterval(state.timer);
                    state.hp--;
                    updateHUD();
                    if(state.hp <= 0) { alert("ENTRENAMIENTO FINALIZADO"); location.reload(); }
                    else { alert("¡TIEMPO AGOTADO!"); initLevel(); }
                }
            }, 1000);
        }

        function createPiece(s, container, x, y, r, isRef, id) {
            const div = document.createElement('div');
            div.className = isRef ? 'piece' : 'piece in-inventory';
            div.style.width = s.w + 'px'; div.style.height = s.h + 'px';
            div.setAttribute('data-id', id);

            if(isRef) {
                div.style.left = '50%'; div.style.top = '50%';
                let fx = x, fr = r;
                if(state.mode === 'mirror') { fx = -x; fr = (360 - r) % 360; }
                div.style.transform = `translate(-50%, -50%) translate(${fx}px, ${y}px) rotate(${fr}deg)`;
                div.style.opacity = '0.35';
            } else {
                div.setAttribute('data-x', 0); div.setAttribute('data-y', 0); div.setAttribute('data-r', 0);
            }

            div.innerHTML = `<svg viewBox="0 0 ${s.w} ${s.h}"><polygon points="${s.pts}" fill="${s.c}" stroke="white" stroke-width="2"/></svg>`;
            container.appendChild(div);
        }

        function initInteract() {
            interact('.piece:not(.in-inventory)').draggable({
                listeners: {
                    move(e) {
                        const t = e.target;
                        const x = (parseFloat(t.getAttribute('data-x')) || 0) + e.dx;
                        const y = (parseFloat(t.getAttribute('data-y')) || 0) + e.dy;
                        const r = t.getAttribute('data-r') || 0;
                        t.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
                        t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                    }
                }
            }).on('doubletap', (e) => {
                const t = e.currentTarget;
                let r = (parseInt(t.getAttribute('data-r')) || 0) + 45;
                t.setAttribute('data-r', r);
                t.style.transform = `translate(${t.getAttribute('data-x')}px, ${t.getAttribute('data-y')}px) rotate(${r}deg)`;
            });

            interact('.piece.in-inventory').on('tap', (e) => {
                const t = e.currentTarget;
                const dz = document.getElementById('drop-zone');
                t.classList.remove('in-inventory');
                dz.appendChild(t);
                const rect = dz.getBoundingClientRect();
                const x = rect.width/2 - t.offsetWidth/2;
                const y = rect.height/2 - t.offsetHeight/2;
                t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                t.style.transform = `translate(${x}px, ${y}px) rotate(0deg)`;
                initInteract();
            });
        }

        function validateSolution() {
            const dz = document.getElementById('drop-zone').getBoundingClientRect();
            const cx = dz.width / 2, cy = dz.height / 2;
            const fig = state.lvl < LEVELS_DB.length ? LEVELS_DB[state.lvl] : LEVELS_DB[state.lvl % LEVELS_DB.length];
            let hits = 0;

            SHAPES.forEach((s, i) => {
                const p = document.querySelector(`#drop-zone [data-id="${i}"]`);
                if(!p) return;
                const px = parseFloat(p.getAttribute('data-x')) - cx + (p.offsetWidth/2);
                const py = parseFloat(p.getAttribute('data-y')) - cy + (p.offsetHeight/2);
                const pr = (parseInt(p.getAttribute('data-r')) % 360 + 360) % 360;
                let tx = fig.coords[i][0], tr = fig.coords[i][2];
                if(state.mode === 'mirror') { tx = -tx; tr = (360 - tr) % 360; }
                if(Math.hypot(px-tx, py-fig.coords[i][1]) < 35 && Math.abs(pr-tr) < 25) hits++;
            });

            if(hits === 7) {
                clearInterval(state.timer);
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('modal-btn').onclick = () => {
                    state.lvl++;
                    document.getElementById('overlay').style.display = 'none';
                    initLevel();
                };
            } else {
                state.hp--; updateHUD();
                alert(state.hp <= 0 ? "ENTRENAMIENTO FINALIZADO" : "POSICIÓN INCORRECTA");
                if(state.hp <= 0) location.reload();
            }
        }

        function updateHUD() {
            document.getElementById('hud-lvl').innerText = state.lvl + 1;
            document.getElementById('hud-hp').innerText = "❤️".repeat(state.hp);
        }
    </script>
</body>
</html>
