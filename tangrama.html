<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERCEPTUM VISION PRO | V9 FINAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>

    <style>
        :root {
            --bg-body: #020617;
            --panel-bg: #0f172a;
            --clinical-green: #22c55e;
            --clinical-red: #f43f5e;
            --border-color: #1e293b;
            --text-primary: #f8fafc;
            
            /* Colores Tangram Oficiales Quantech */
            --c1: #ef4444; --c2: #3b82f6; --c3: #94a3b8; 
            --c4: #f59e0b; --c5: #10b981; --c6: #6366f1; --c7: #d946ef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body {
            font-family: 'Montserrat', sans-serif; background: var(--bg-body);
            color: var(--text-primary); height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- INTERFAZ SUPERIOR (HUD) --- */
        header {
            height: 85px; background: #000; border-bottom: 3px solid var(--clinical-green);
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10;
        }

        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1.8rem; letter-spacing: 2px; }
        .logo span { color: var(--clinical-green); }

        .stats-container { display: flex; gap: 20px; }
        .stat-card {
            background: var(--panel-bg); padding: 10px 25px; border-radius: 15px;
            border: 1px solid var(--border-color); text-align: center; min-width: 120px;
        }
        .stat-card small { display: block; font-size: 0.65rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .stat-card b { font-family: 'Orbitron'; font-size: 1.5rem; color: var(--clinical-green); }

        /* --- AREA DE TRABAJO --- */
        main {
            flex: 1; display: flex; padding: 20px; gap: 20px; background: #070b14;
            overflow: hidden; align-items: stretch;
        }

        .clinical-module {
            background: var(--panel-bg); border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }

        /* PANEL GUÍA (IZQUIERDA) */
        #guide-module { flex: 0 0 450px; background: #000; border: 2px solid var(--clinical-green); overflow: hidden; }
        .guide-header { background: var(--clinical-green); color: #000; text-align: center; padding: 8px; font-weight: 900; font-size: 0.75rem; letter-spacing: 1px; }
        #guide-canvas { flex: 1; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* PANEL INTERACCIÓN (CENTRO) */
        #work-module {
            flex: 1; border: 2px dashed rgba(255,255,255,0.1);
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: relative;
        }

        /* PANEL INVENTARIO (DERECHA) */
        #inventory-module { flex: 0 0 260px; }
        .inventory-title { text-align: center; padding: 15px; font-size: 0.7rem; font-weight: 900; color: #64748b; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .inventory-list { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .inv-item {
            width: 100%; aspect-ratio: 1/1; background: rgba(0,0,0,0.4);
            border-radius: 20px; border: 2px solid transparent; cursor: pointer;
            padding: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .inv-item:hover { border-color: var(--clinical-green); transform: translateY(-5px) scale(1.02); background: rgba(34, 197, 94, 0.05); }

        /* PIEZAS EN ESCENA */
        .active-piece { position: absolute; z-index: 100; cursor: grab; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        .active-piece:active { cursor: grabbing; z-index: 1000; }

        /* CONTROLES INFERIORES */
        footer {
            height: 100px; background: var(--panel-bg); border-top: 1px solid var(--border-color);
            display: flex; justify-content: center; align-items: center; gap: 25px;
        }

        .btn-action {
            padding: 20px 60px; border-radius: 100px; font-family: 'Orbitron';
            font-size: 1.1rem; font-weight: 900; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; transition: 0.3s;
        }
        .btn-confirm { background: var(--clinical-green); color: #052e16; box-shadow: 0 10px 40px rgba(34, 197, 94, 0.2); }
        .btn-cancel { background: #334155; color: white; }
        .btn-action:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* MODAL DE ÉXITO */
        #success-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 99999; display: none; flex-direction: column;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .mirror-mode svg { transform: scaleX(-1); }
    </style>
</head>
<body>

    <header>
        <div class="logo">PERCEPTUM <span>VISION</span></div>
        <div class="stats-container">
            <div class="stat-card">
                <small>Nivel</small>
                <b id="lvl-display">01</b>
            </div>
            <div class="stat-card">
                <small>Estado</small>
                <b id="status-display" style="font-size: 0.9rem;">ÓPTIMO</b>
            </div>
        </div>
    </header>

    <main>
        <div class="clinical-module" id="guide-module">
            <div class="guide-header">MODELO DE REFERENCIA - QUANTECH SYSTEM</div>
            <div id="guide-canvas"></div>
        </div>

        <div class="clinical-module" id="work-module"></div>

        <div class="clinical-module" id="inventory-module">
            <div class="inventory-title">BANCO DE PIEZAS</div>
            <div class="inventory-list" id="inv-render"></div>
        </div>
    </main>

    <footer>
        <button class="btn-action btn-cancel" onclick="location.reload()">Resetear</button>
        <button class="btn-action btn-confirm" onclick="triggerWin()">Validar Ensamble</button>
    </footer>

    <div id="success-overlay">
        <h2 style="font-family:'Orbitron'; font-size:5rem; color:var(--clinical-green); margin-bottom:20px;">COMPLETADO</h2>
        <p style="color: #64748b; font-size: 1.5rem; margin-bottom: 50px;">Coordinación visual validada.</p>
        <button class="btn-action btn-confirm" onclick="nextLevel()">Siguiente Nivel</button>
    </div>

    <script>
        // CONFIGURACIÓN DE PIEZAS (Puntos exactos del set Quantech)
        const PIECES_DATA = [
            { id:0, pts:"0,0 160,0 80,80", color:"var(--c1)", w:160, h:80 },
            { id:1, pts:"0,0 0,160 80,80", color:"var(--c2)", w:80, h:160 },
            { id:2, pts:"0,0 80,80 0,160", color:"var(--c3)", w:80, h:160 },
            { id:3, pts:"0,0 80,0 40,40",   color:"var(--c4)", w:80, h:40 },
            { id:4, pts:"40,40 80,80 0,80", color:"var(--c5)", w:80, h:80 },
            { id:5, pts:"40,0 80,40 40,80 0,40", color:"var(--c6)", w:80, h:80 },
            { id:6, pts:"0,40 80,40 120,0 40,0", color:"var(--c7)", w:120, h:40 }
        ];

        // DICCIONARIO DE FIGURAS (Coordenadas normalizadas)
        const CATALOG = [
            { 
                name: "CISNE", 
                map: [
                    {id:0,x:-40,y:20,r:180},{id:1,x:-120,y:-60,r:90},{id:2,x:40,y:-60,r:45},
                    {id:3,x:-40,y:-20,r:0},{id:4,x:-80,y:100,r:90},{id:5,x:0,y:-20,r:0},
                    {id:6,x:0,y:100,r:-45}
                ] 
            },
            { 
                name: "PEZ", 
                map: [
                    {id:0,x:-40,y:0,r:90},{id:1,x:-40,y:80,r:0},{id:2,x:40,y:0,r:-90},
                    {id:3,x:-40,y:-80,r:-45},{id:4,x:0,y:-120,r:45},{id:5,x:-120,y:0,r:0},
                    {id:6,x:40,y:-80,r:0}
                ] 
            }
        ];

        let state = { lvl: 0 };
        const WORK_SCALE = 1.35; // Escala de piezas que mueves

        function init() {
            renderGame();
        }

        function renderGame() {
            const guide = document.getElementById('guide-canvas');
            const inv = document.getElementById('inv-render');
            const work = document.getElementById('work-module');
            
            guide.innerHTML = inv.innerHTML = work.innerHTML = "";
            const figure = CATALOG[state.lvl % CATALOG.length];

            // RENDER GUÍA - ViewBox balanceado para evitar recortes
            let svgGuide = `<svg viewBox="-250 -250 500 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">`;
            figure.map.forEach(p => {
                const d = PIECES_DATA.find(x => x.id === p.id);
                svgGuide += `<polygon points="${d.pts}" fill="${d.color}" stroke="white" stroke-width="2" 
                             transform="translate(${p.x},${p.y}) rotate(${p.r})"/>`;
            });
            guide.innerHTML = svgGuide + `</svg>`;

            // RENDER INVENTARIO
            PIECES_DATA.forEach(p => {
                const btn = document.createElement('div');
                btn.className = "inv-item";
                btn.innerHTML = `<svg viewBox="-10 -10 180 180"><polygon points="${p.pts}" fill="${p.color}" stroke="white" stroke-width="5"/></svg>`;
                btn.onclick = () => spawnPiece(p);
                inv.appendChild(btn);
            });

            document.getElementById('lvl-display').innerText = (state.lvl + 1).toString().padStart(2, '0');
        }

        function spawnPiece(p) {
            const piece = document.createElement('div');
            piece.className = "active-piece";
            piece.style.width = (p.w * WORK_SCALE) + "px";
            piece.style.height = (p.h * WORK_SCALE) + "px";
            piece.innerHTML = `<svg viewBox="0 0 ${p.w} ${p.h}" style="overflow:visible">
                               <polygon points="${p.pts}" fill="${p.color}" stroke="white" stroke-width="2.5"/>
                               </svg>`;
            
            // Aparecer en el centro del área de trabajo
            piece.dataset.x = 100; piece.dataset.y = 100; piece.dataset.r = 0;
            document.getElementById('work-module').appendChild(piece);
            updateTransform(piece);
            attachInteractions(piece);
        }

        function updateTransform(el) {
            el.style.transform = `translate(${el.dataset.x}px, ${el.dataset.y}px) rotate(${el.dataset.r}deg)`;
        }

        function attachInteractions(el) {
            interact(el).draggable({
                listeners: {
                    move(e) {
                        const target = e.target;
                        target.dataset.x = (parseFloat(target.dataset.x) || 0) + e.dx;
                        target.dataset.y = (parseFloat(target.dataset.y) || 0) + e.dy;
                        updateTransform(target);
                    }
                }
            }).on('doubletap', e => {
                const target = e.currentTarget;
                target.dataset.r = (parseInt(target.dataset.r) + 45) % 360;
                updateTransform(target);
            });
        }

        function triggerWin() {
            document.getElementById('success-overlay').style.display = 'flex';
        }

        function nextLevel() {
            state.lvl++;
            document.getElementById('success-overlay').style.display = 'none';
            renderGame();
        }

        window.onload = init;
    </script>
</body>
</html>
