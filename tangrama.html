<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tangram Vision Pro - Centro Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js"></script>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-panel: #1e293b;
            --bg-inv: #0a0f1a;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.4);
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            /* Colores Tangram Originales */
            --c1: #ff4757; --c2: #2e86de; --c3: #ffa502; 
            --c4: #2ed573; --c5: #a4b0be; --c6: #5352ed; --c7: #e056fd;
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        * { 
            box-sizing: border-box; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- PANTALLA DE INICIO (LAUNCHER) --- */
        #launcher { 
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            z-index: 100000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 40px; 
        }

        .hero-title { 
            font-size: 5.5rem; 
            font-weight: 900; 
            color: var(--accent); 
            text-shadow: 0 10px 40px var(--accent-glow); 
            margin: 0; 
            letter-spacing: -2px;
        }

        .hero-subtitle { 
            font-size: 1.8rem; 
            color: var(--text-dim); 
            letter-spacing: 12px; 
            margin-bottom: 50px; 
            text-transform: uppercase; 
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
        }

        .config-card {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 35px;
            border: 2px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .mode-btn {
            background: rgba(255,255,255,0.03);
            border: 3px solid transparent;
            padding: 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            width: 100%;
            color: white;
        }

        .mode-btn.active {
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .mode-btn h4 { font-size: 1.6rem; color: var(--accent); margin-bottom: 5px; }
        .mode-btn p { font-size: 1rem; color: var(--text-dim); }

        .slider-container {
            padding: 20px 0;
            display: none; /* Se activa dinámicamente */
        }

        .custom-slider {
            width: 100%;
            height: 15px;
            border-radius: 10px;
            background: var(--bg-deep);
            outline: none;
            -webkit-appearance: none;
        }

        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* --- INTERFAZ PRINCIPAL --- */
        header { 
            height: 130px; 
            padding: 0 50px; 
            background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .hud-container { display: flex; gap: 20px; }
        .hud-item { 
            background: rgba(255,255,255,0.05); 
            padding: 15px 30px; 
            border-radius: 25px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 150px;
        }
        .hud-label { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .hud-val { font-size: 2.2rem; font-weight: 900; color: var(--accent); }

        /* --- AREA DE JUEGO --- */
        .game-world { 
            display: flex; 
            flex: 1; 
            padding: 30px; 
            gap: 30px; 
            background: #0a0f1a; 
        }

        .panel-reference { 
            flex: 0 0 500px; 
            background: var(--bg-panel); 
            border-radius: 45px; 
            display: flex; 
            flex-direction: column; 
            border: 4px solid var(--accent); 
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            position: relative;
        }

        .ref-canvas { 
            flex: 1; 
            margin: 25px; 
            background: rgba(0,0,0,0.5); 
            background-image: radial-gradient(var(--grid-color) 2px, transparent 2px);
            background-size: 50px 50px;
            border-radius: 30px; 
            position: relative; 
            overflow: hidden; 
        }

        .canvas-main { 
            flex: 1; 
            background: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=');
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            border: 3px dashed rgba(255,255,255,0.1); 
            border-radius: 45px; 
            position: relative; 
        }

        .panel-inventory { 
            flex: 0 0 350px; 
            background: var(--bg-inv); 
            border-radius: 45px; 
            border: 1px solid rgba(255,255,255,0.1); 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .inv-scroll {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        /* --- PIEZAS --- */
        .piece { 
            position: absolute !important; 
            cursor: grab; 
            touch-action: none; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            z-index: 10;
        }
        .piece svg { width: 100%; height: 100%; display: block; overflow: visible; }
        
        .piece.in-inventory {
            position: relative !important;
            transform: none !important;
            left: auto !important;
            top: auto !important;
            margin-bottom: 40px;
        }

        /* --- CONTROLES INFERIORES --- */
        footer { 
            height: 150px; 
            background: rgba(15, 23, 42, 0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 40px; 
            border-top: 2px solid rgba(255,255,255,0.1); 
        }

        .btn-main { 
            padding: 30px 100px; 
            border-radius: 60px; 
            font-size: 2rem; 
            font-weight: 900; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
        }

        .btn-success { background: var(--accent); color: var(--bg-deep); box-shadow: 0 15px 40px var(--accent-glow); }
        .btn-danger { background: transparent; color: var(--error); border: 3px solid var(--error); }

        #overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.98); 
            z-index: 200000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
        }

        .modal { 
            background: var(--bg-panel); 
            padding: 80px; 
            border-radius: 60px; 
            text-align: center; 
            max-width: 800px; 
            width: 90%; 
            border: 8px solid var(--accent); 
        }

        .modal.error { border-color: var(--error); }
        .modal h2 { font-size: 5rem; margin-bottom: 30px; }
        .modal p { font-size: 2rem; color: var(--text-dim); margin-bottom: 50px; }

    </style>
</head>
<body>

    <div id="launcher">
        <h1 class="hero-title">CENTRO PERCEPTUM</h1>
        <p class="hero-subtitle">Visual Training System</p>
        
        <div class="config-grid">
            <div class="config-card">
                <h3 style="color:var(--text-dim); font-size: 1.5rem;">ORIENTACIÓN ESPACIAL</h3>
                <button class="mode-btn active" data-mode="copy" onclick="setMode(this)">
                    <h4>Copia Directa</h4>
                    <p>Misma posición y ángulo que el modelo.</p>
                </button>
                <button class="mode-btn" data-mode="mirrorV" onclick="setMode(this)">
                    <h4>Inversión Lateral</h4>
                    <p>Efecto espejo en el eje vertical.</p>
                </button>
            </div>

            <div class="config-card">
                <h3 style="color:var(--text-dim); font-size: 1.5rem;">CRONOMETRÍA (SEG)</h3>
                <div class="slider-container" id="time-selector">
                    <input type="range" min="15" max="120" value="45" class="custom-slider" id="time-slider" oninput="updateSliderLabel(this.value)">
                    <div style="display:flex; justify-content:space-between; margin-top:15px; font-weight:900; font-size:1.5rem">
                        <span>15s</span>
                        <span id="slider-val" style="color:var(--accent)">45s</span>
                        <span>120s</span>
                    </div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="mode-btn active" id="btn-cron" onclick="setTimerType('cron')"><h4>ASCENDENTE</h4></button>
                    <button class="mode-btn" id="btn-contra" onclick="setTimerType('contra')"><h4>CUENTA REGRESIVA</h4></button>
                </div>
            </div>
        </div>

        <button class="btn-main btn-success" style="font-size:3rem; padding:40px 150px" onclick="startApp()">INICIAR ENTRENAMIENTO</button>
    </div>

    <header>
        <div class="logo">PERCEPTUM<span>PRO</span></div>
        <div class="hud-container">
            <div class="hud-item"><div class="hud-label">Nivel</div><div id="hud-lvl" class="hud-val">1</div></div>
            <div class="hud-item"><div class="hud-label">Tiempo</div><div id="hud-timer" class="hud-val">00:00</div></div>
            <div class="hud-item"><div class="hud-label">Vidas</div><div id="hud-hp" class="hud-val" style="color:var(--error)">❤️❤️❤️</div></div>
        </div>
    </header>

    <div class="game-world">
        <div class="panel-reference">
            <div class="ref-canvas" id="ref-zone"></div>
            <div style="padding:25px; text-align:center; font-weight:900; letter-spacing:4px; color:var(--accent); font-size: 1.5rem;">MODELO DE REFERENCIA</div>
        </div>

        <div class="canvas-main" id="drop-zone"></div>

        <div class="panel-inventory">
            <div style="padding:25px; background:rgba(255,255,255,0.03); text-align:center; font-weight:700; color:var(--text-dim); font-size: 1.2rem;">PIEZAS DISPONIBLES</div>
            <div class="inv-scroll" id="inv-zone"></div>
        </div>
    </div>

    <footer>
        <button class="btn-main btn-danger" onclick="location.reload()">Finalizar Sesión</button>
        <button class="btn-main btn-success" onclick="validateSolution()">Validar Posicionamiento</button>
    </footer>

    <div id="overlay">
        <div class="modal" id="modal-content">
            <h2 id="modal-title">¡EXCELENTE!</h2>
            <p id="modal-desc">La figura coincide perfectamente.</p>
            <button class="btn-main btn-success" id="modal-btn">SIGUIENTE NIVEL</button>
        </div>
    </div>

    <script>
        // --- GEOMETRÍA DE PRECISIÓN ---
        const SHAPES_MASTER = [
            { id: 0, pts: "0,-100 100,0 -100,0", color: 'var(--c1)', w: 200, h: 100 }, // Triángulo Grande
            { id: 1, pts: "0,-50 50,0 -50,0", color: 'var(--c2)', w: 100, h: 50 },    // Triángulo Pequeño
            { id: 2, pts: "-50,-50 50,-50 50,50 -50,50", color: 'var(--c3)', w: 100, h: 100 }, // Cuadrado
            { id: 3, pts: "0,-50 100,50 0,150 -100,50", color: 'var(--c7)', w: 200, h: 200 } // Romboide
        ];

        // BASE DE DATOS DE FIGURAS REALES (De tus imágenes)
        const LEVELS_DB = [
            { name: "Cisne", pieces: [{i:0, x:-50, y:50, a:0}, {i:0, x:50, y:-50, a:90}, {i:1, x:0, y:-100, a:45}, {i:2, x:-30, y:-50, a:0}] },
            { name: "Perro", pieces: [{i:2, x:0, y:0, a:45}, {i:1, x:0, y:-60, a:0}, {i:0, x:50, y:50, a:180}] },
            { name: "Conejo", pieces: [{i:0, x:-80, y:20, a:0}, {i:1, x:0, y:-100, a:90}, {i:3, x:0, y:0, a:90}] },
            { name: "Flecha Doble", pieces: [{i:2, x:0, y:0, a:0}, {i:1, x:0, y:-75, a:0}, {i:1, x:0, y:75, a:180}] }
        ];

        let state = {
            lvl: 0, hp: 3, time: 0, startTime: 45,
            mode: 'copy', timerType: 'cron', isPaused: false
        };

        function updateSliderLabel(val) {
            document.getElementById('slider-val').innerText = val + 's';
            state.startTime = parseInt(val);
        }

        function setMode(btn) {
            document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.mode = btn.dataset.mode;
        }

        function setTimerType(type) {
            state.timerType = type;
            document.getElementById('btn-cron').classList.toggle('active', type === 'cron');
            document.getElementById('btn-contra').classList.toggle('active', type === 'contra');
            document.getElementById('time-selector').style.display = (type === 'contra') ? 'block' : 'none';
        }

        function startApp() {
            document.getElementById('launcher').style.display = 'none';
            if(state.timerType === 'contra') state.time = state.startTime;
            initLevel();
            setInterval(tick, 1000);
        }

        function tick() {
            if(state.isPaused) return;
            if(state.timerType === 'cron') state.time++;
            else {
                state.time--;
                if(state.time <= 0) { 
                    handleFailure("¡TIEMPO AGOTADO!"); 
                    state.time = state.startTime;
                }
            }
            updateHUD();
        }

        function updateHUD() {
            const m = Math.floor(Math.abs(state.time)/60).toString().padStart(2,'0');
            const s = (Math.abs(state.time)%60).toString().padStart(2,'0');
            document.getElementById('hud-timer').innerText = `${m}:${s}`;
            document.getElementById('hud-lvl').innerText = state.lvl + 1;
            document.getElementById('hud-hp').innerText = "❤️".repeat(state.hp);
        }

        // FUNCIÓN DE GENERACIÓN INFINITA
        function getLevelData(index) {
            if (index < LEVELS_DB.length) return LEVELS_DB[index];
            // Si el nivel supera la DB, genera uno aleatorio sobre la rejilla
            const randomPieces = [];
            const numPieces = 3 + Math.min(Math.floor(index/5), 4);
            for(let i=0; i<numPieces; i++) {
                randomPieces.push({
                    i: Math.floor(Math.random()*4),
                    x: (Math.floor(Math.random()*6)-3)*50,
                    y: (Math.floor(Math.random()*6)-3)*50,
                    a: Math.floor(Math.random()*8)*45
                });
            }
            return { name: "Desafío Infinito " + (index+1), pieces: randomPieces };
        }

        function initLevel() {
            const rz = document.getElementById('ref-zone');
            const iz = document.getElementById('inv-zone');
            const dz = document.getElementById('drop-zone');
            rz.innerHTML = iz.innerHTML = dz.innerHTML = '';
            
            const levelData = getLevelData(state.lvl);

            levelData.pieces.forEach((p, idx) => {
                const shape = SHAPES_MASTER[p.i];
                createPiece(shape, rz, p.x, p.y, p.a, true, idx);
                createPiece(shape, iz, 0, 0, Math.floor(Math.random()*360), false, idx);
            });
            initInteract();
        }

        function createPiece(shape, container, x, y, a, isRef, id) {
            const div = document.createElement('div');
            div.className = isRef ? 'piece' : 'piece in-inventory';
            div.style.width = shape.w + 'px';
            div.style.height = shape.h + 'px';

            if(isRef) {
                div.style.left = '50%'; div.style.top = '50%';
                div.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) rotate(${a}deg)`;
                div.style.opacity = '0.35';
                div.style.pointerEvents = 'none';
            } else {
                div.setAttribute('data-id', id);
                div.setAttribute('data-x', 0); div.setAttribute('data-y', 0);
                div.setAttribute('data-ang', a);
                div.style.transform = `rotate(${a}deg)`;
            }

            div.innerHTML = `<svg viewBox="-110 -110 220 220"><polygon points="${shape.pts}" fill="${shape.color}" stroke="white" stroke-width="2"/></svg>`;
            container.appendChild(div);
        }

        function initInteract() {
            interact('.piece.in-inventory, .canvas-main .piece').draggable({
                listeners: {
                    start(event) {
                        const t = event.target;
                        if(t.classList.contains('in-inventory')) {
                            const rect = t.getBoundingClientRect();
                            const dzRect = document.getElementById('drop-zone').getBoundingClientRect();
                            t.classList.remove('in-inventory');
                            document.getElementById('drop-zone').appendChild(t);
                            const nx = rect.left - dzRect.left + (rect.width/2);
                            const ny = rect.top - dzRect.top + (rect.height/2);
                            t.style.left = '0px'; t.style.top = '0px';
                            t.setAttribute('data-x', nx); t.setAttribute('data-y', ny);
                            t.style.transform = `translate(${nx}px, ${ny}px) rotate(${t.getAttribute('data-ang')}deg)`;
                        }
                    },
                    move(event) {
                        const t = event.target;
                        const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                        const a = t.getAttribute('data-ang') || 0;
                        t.style.transform = `translate(${x}px, ${y}px) rotate(${a}deg)`;
                        t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                    }
                }
            }).on('tap', (e) => {
                const t = e.currentTarget;
                if(t.classList.contains('in-inventory')) return;
                let a = (parseInt(t.getAttribute('data-ang')) || 0) + 45;
                const x = t.getAttribute('data-x');
                const y = t.getAttribute('data-y');
                t.setAttribute('data-ang', a);
                t.style.transform = `translate(${x}px, ${y}px) rotate(${a}deg)`;
            });
        }

        function validateSolution() {
            const dz = document.getElementById('drop-zone').getBoundingClientRect();
            const cx = dz.width / 2;
            const cy = dz.height / 2;
            const level = getLevelData(state.lvl);
            let correctCount = 0;

            level.pieces.forEach((tgt, idx) => {
                const p = document.querySelector(`.piece[data-id="${idx}"]:not(.in-inventory)`);
                if(!p) return;

                const px = parseFloat(p.getAttribute('data-x')) - cx;
                const py = parseFloat(p.getAttribute('data-y')) - cy;
                const pa = (parseInt(p.getAttribute('data-ang')) % 360 + 360) % 360;

                let tx = tgt.x, ty = tgt.y;
                if(state.mode === 'mirrorV') tx = -tgt.x;

                const dist = Math.sqrt(Math.pow(px - tx, 2) + Math.pow(py - ty, 2));
                const angDiff = Math.abs(pa - (tgt.a % 360));

                if(dist < 35 && (angDiff < 20 || angDiff > 340)) {
                    // Snapping
                    p.setAttribute('data-x', tx + cx); p.setAttribute('data-y', ty + cy);
                    p.style.transform = `translate(${tx + cx}px, ${ty + cy}px) rotate(${tgt.a}deg)`;
                    correctCount++;
                }
            });

            if(correctCount === level.pieces.length) handleSuccess();
            else handleFailure("LA FIGURA NO ES EXACTA");
        }

        function handleSuccess() {
            state.isPaused = true;
            const m = document.getElementById('overlay');
            m.style.display = 'flex';
            document.getElementById('modal-content').className = "modal";
            document.getElementById('modal-title').innerText = "¡EXCELENTE!";
            document.getElementById('modal-btn').onclick = () => {
                state.lvl++; state.isPaused = false;
                if(state.timerType === 'contra') state.time = state.startTime;
                m.style.display = 'none';
                initLevel(); updateHUD();
            };
        }

        function handleFailure(msg) {
            state.hp--; updateHUD();
            const m = document.getElementById('overlay');
            m.style.display = 'flex';
            document.getElementById('modal-content').className = "modal error";
            document.getElementById('modal-title').innerText = state.hp <= 0 ? "GAME OVER" : "REINTENTAR";
            document.getElementById('modal-btn').onclick = () => {
                if(state.hp <= 0) location.reload();
                else m.style.display = 'none';
            };
        }
    </script>
</body>
</html>
