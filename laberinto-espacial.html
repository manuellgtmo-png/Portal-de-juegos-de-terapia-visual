<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e91e63;
            --bg: #0b101b;
            --wall: #1e293b;
            --accent: #00f2fe;
            --danger: #ef4444;
            --clin-card: #1c2331;
        }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; -webkit-font-smoothing: antialiased; }
        
        /* OVERLAYS Y PANTALLAS */
        .overlay { position: fixed; inset: 0; background: rgba(11, 16, 27, 0.96); display: flex; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(10px); }
        .card { background: white; color: #1e293b; padding: 35px; border-radius: 30px; max-width: 380px; width: 90%; text-align: center; border: 4px solid var(--primary); box-shadow: 0 10px 40px rgba(233, 30, 99, 0.3); }
        
        /* HUD SUPERIOR */
        #ui-layer { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; z-index: 100; pointer-events: none; }
        .stat-box { background: rgba(255,255,255,0.08); backdrop-filter: blur(5px); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); text-align: center; min-width: 70px; margin-left: auto;}
        .stat-box:first-child { margin-left: 100px; margin-right: 10px; }
        .label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; font-weight: 700; display: block; }
        .value { font-weight: 900; font-size: 1.1rem; color: var(--accent); }
        
        /* BOTÓN SALIR */
        #btn-salir {
            position: absolute; top: 20px; left: 20px;
            background: rgba(239, 68, 68, 0.2); color: var(--danger);
            border: 2px solid var(--danger); padding: 8px 15px; border-radius: 10px;
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem;
            z-index: 150; pointer-events: auto; transition: 0.2s;
        }
        #btn-salir:hover { background: rgba(239, 68, 68, 0.4); }

        /* D-PAD TÁCTIL (BOTONES DE PALANCA) */
        #controls {
            position: absolute; bottom: 30px; right: 30px;
            display: grid; grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px; z-index: 150; pointer-events: auto;
        }
        .btn-dir {
            background: var(--clin-card); border: 3px solid var(--primary);
            color: var(--primary); border-radius: 15px; font-size: 1.8rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 5px 0 #0f172a; transition: 0.1s;
        }
        .btn-dir:active { transform: translateY(3px); box-shadow: 0 2px 0 #0f172a; }

        /* Posicionamiento en cruz */
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        canvas { display: block; margin: auto; box-shadow: 0 0 30px rgba(0,0,0,0.5); border-radius: 15px;}
    </style>
</head>
<body>

    <div id="intro-screen" class="overlay">
        <div class="card">
            <h1 style="color: var(--primary); margin:0; font-size: 2.2rem;">🚀 Laberinto</h1>
            <p style="font-weight: bold; color: #64748b; font-size: 0.9rem;">Planificación Espacial Pro</p>
            <p style="font-size: 0.85rem; color: #475569; line-height: 1.4;">Guía el cohete por los pasillos hasta la meta 🏁.<br>Usa el control de mando táctil. ¡Evita los muros!</p>
            <button onclick="iniciarJuego()" style="background:var(--primary); color:white; border:none; padding:18px 40px; border-radius:40px; font-weight:900; cursor:pointer; width:100%; font-size:1.1rem; box-shadow: 0 8px 0 #ad1457; text-transform:uppercase;">¡DESPEGAR!</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none">
        <div class="stat-box"><span class="label">Nivel</span><span id="txt-nivel" class="value">1</span></div>
        <div class="stat-box"><span class="label">Vidas</span><span id="txt-vidas" class="value">❤️❤️❤️</span></div>
    </div>

    <button id="btn-salir" style="display:none;" onclick="location.reload()">SALIR</button>

    <canvas id="gameCanvas"></canvas>

    <div id="controls" style="display:none">
        <button id="btn-up" class="btn-dir" onclick="mover(0,-1)">↑</button>
        <button id="btn-left" class="btn-dir" onclick="mover(-1,0)">←</button>
        <button id="btn-right" class="btn-dir" onclick="mover(1,0)">→</button>
        <button id="btn-down" class="btn-dir" onclick="mover(0,1)">↓</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Configuración Sheets Perceptum SpA (integración total)
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";
        const ENTRIES = { paciente: "entry.369874016", juego: "entry.1353470174", nivel: "entry.721051298", aciertos: "entry.873272199", fallos: "entry.1030094511", tiempo: "entry.1303309812", fecha: "entry.845098414" };

        let nivel = 1, vidas = 3, grid = [], cols, rows, cellSize;
        let player = {x:1, y:1}, goal = {x:0, y:0};
        let juegoActivo = false, segundosTotales = 0, fallosTotales = 0, cronoInt;
        let finalizadoTotal = false;
        
        // Audios Terapéuticos
        const audioWin = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        const audioHurt = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        // Prevenir recarga accidental
        window.onbeforeunload = function() {
            if(juegoActivo && !finalizadoTotal) return "La sesión está en curso. ¿Deseas salir?";
        };

        function iniciarJuego() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('controls').style.display = 'grid';
            document.getElementById('btn-salir').style.display = 'block';
            juegoActivo = true;
            segundosTotales = 0;
            fallosTotales = 0;
            if(cronoInt) clearInterval(cronoInt);
            cronoInt = setInterval(() => { if(juegoActivo) segundosTotales++; }, 1000);
            generarNivel();
        }

        function generarNivel() {
            // Adaptabilidad Responsiva Mejorada
            const displaySize = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.75, 800);
            canvas.width = displaySize; canvas.height = displaySize;
            
            // Densidad del laberinto incremental (Niveles Complejos)
            // Usamos números impares para el algoritmo de división recursiva
            cols = 11 + nivel * 2; 
            if(cols > 41) cols = 41; // Límite de densidad para jugabilidad
            rows = cols;
            cellSize = displaySize / cols;
            
            // 1. Crear grilla llena de caminos (false)
            grid = Array(cols).fill().map(() => Array(rows).fill(false));

            // 2. Crear muros perimetrales
            for (let i = 0; i < cols; i++) {
                grid[i][0] = true;
                grid[i][rows - 1] = true;
                grid[0][i] = true;
                grid[cols - 1][i] = true;
            }

            // 3. Algoritmo DIVISION RECURSIVA (Pasillos Reales y Estéticos)
            generarMurosRecursivos(1, 1, cols - 2, rows - 2);

            // 4. Definir Inicio y Meta (siempre en suelo, false)
            player = {x:1, y:1}; grid[1][1] = false;
            goal = {x: cols-2, y: rows-2}; grid[goal.x][goal.y] = false;
            
            // Asegurar caminos alrededor de inicio/meta
            if(grid[1][2]) grid[1][2] = false;
            if(grid[2][1]) grid[2][1] = false;
            if(grid[cols-2][rows-3]) grid[cols-2][rows-3] = false;
            if(grid[cols-3][rows-2]) grid[cols-3][rows-2] = false;

            // 5. Aplicar Forma Geométrica (Recortar laberinto visualmente)
            recortarForma();

            actualizarUI();
            dibujar();
        }

        // --- ALGORITMO CORE: GENERACIÓN DE LABERINTOS REALES (DIVISIÓN RECURSIVA) ---
        function generarMurosRecursivos(x, y, w, h) {
            if (w < 2 || h < 2) return;
            
            // Decidir orientación del muro (preferir el lado más largo para dividir)
            let horizontal;
            if (w > h) horizontal = false;
            else if (h > w) horizontal = true;
            else horizontal = Math.random() < 0.5;

            if (horizontal) {
                // Muro horizontal
                let py = y + 1 + Math.floor(Math.random() * (h - 2)) * 1;
                // Asegurar que py sea par para alinearse con los pasillos existentes
                if(py % 2 !== 0) py++; 
                if(py >= y+h) py -= 2;

                for (let px = x; px < x + w; px++) grid[px][py] = true;
                
                // Crear hueco para pasar (en posición impar)
                let hx = x + Math.floor(Math.random() * w);
                if(hx % 2 === 0) hx++;
                if(hx >= x+w) hx -= 2;
                grid[hx][py] = false;

                generarMurosRecursivos(x, y, w, py - y);
                generarMurosRecursivos(x, py + 1, w, y + h - py - 1);
            } else {
                // Muro vertical
                let px = x + 1 + Math.floor(Math.random() * (w - 2)) * 1;
                // Asegurar que px sea par
                if(px % 2 !== 0) px++;
                if(px >= x+w) px -= 2;

                for (let py = y; py < y + h; py++) grid[px][py] = true;
                
                // Crear hueco para pasar (en posición impar)
                let hy = y + Math.floor(Math.random() * h);
                if(hy % 2 === 0) hy++;
                if(hy >= y+h) hy -= 2;
                grid[px][hy] = false;

                generarMurosRecursivos(x, y, px - x, h);
                generarMurosRecursivos(px + 1, y, x + w - px - 1, h);
            }
        }

        // --- MÁSCARA GEOMÉTRICA (VARIABILIDAD TERAPÉUTICA) ---
        function recortarForma() {
            const cx = (cols-1)/2, cy = (rows-1)/2;
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    const dist = Math.sqrt((x-cx)**2 + (y-cy)**2);
                    // Nivel Circular (Cambio de forma cada 3 niveles)
                    if(nivel % 3 === 2 && dist > (cols/2) - 0.5) grid[x][y] = true; 
                    // Nivel Triangular
                    if(nivel % 3 === 0 && (y < x/2 - cols/4 || y < (cols-x)/2 - cols/4)) grid[x][y] = true;
                }
            }
            // Asegurar muros perimetrales tras recorte
            for (let i = 0; i < cols; i++) {
                grid[i][0] = true; grid[i][rows - 1] = true;
                grid[0][i] = true; grid[cols - 1][i] = true;
            }
        }

        function mover(dx, dy) {
            if(!juegoActivo) return;
            let nx = player.x + dx, ny = player.y + dy;
            
            // Colisiones y límites de grilla
            if(nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                if(grid[nx][ny]) {
                    // CHOQUE CON PARED (PASILLO AUTÉNTICO)
                    vidas--; fallosTotales++;
                    audioHurt.play(); 
                    actualizarUI();
                    
                    // Efecto visual de daño
                    document.getElementById('gameCanvas').style.boxShadow = "0 0 30px rgba(239, 68, 68, 0.8)";
                    setTimeout(() => { document.getElementById('gameCanvas').style.boxShadow = "0 0 30px rgba(0,0,0,0.5)"; }, 200);

                    player = {x:1, y:1}; // Reiniciar posición al inicio del laberinto
                    
                    if(vidas <= 0) finalizarSesion(false);
                } else {
                    player.x = nx; player.y = ny;
                    if(player.x === goal.x && player.y === goal.y) { 
                        audioWin.play(); nivel++; generarNivel(); 
                    }
                }
            }
            dibujar();
        }

        function dibujar() {
            // Fondo limpio
            ctx.fillStyle = varColor('--bg');
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // Dibujar Muros del Laberinto
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    if(grid[x][y]) {
                        ctx.fillStyle = varColor('--wall');
                        // Muros estéticos redondeados para evitar fatiga visual
                        const r = cellSize * 0.25;
                        dibujarRectRedondo(ctx, x*cellSize+0.5, y*cellSize+0.5, cellSize-1, cellSize-1, r);
                    }
                }
            }
            
            // Dibujar Meta (Emoji Responsivo)
            ctx.font = `${cellSize*0.7}px Arial`;
            ctx.fillText("🏁", goal.x*cellSize + cellSize*0.15, (goal.y+1)*cellSize - cellSize*0.25);
            
            // Dibujar Jugador (Emoji Responsivo)
            ctx.fillText("🚀", player.x*cellSize + cellSize*0.15, (player.y+1)*cellSize - cellSize*0.25);
        }

        function actualizarUI() {
            document.getElementById('txt-nivel').innerText = nivel;
            document.getElementById('txt-vidas').innerText = vidas > 0 ? "❤️❤️❤️".substring(0, vidas*2) : "💀";
        }

        function finalizarSesion(exito) {
            juegoActivo = false;
            finalizadoTotal = true;
            clearInterval(cronoInt);
            
            // Ocultar elementos de juego
            document.getElementById('gameCanvas').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('btn-salir').style.display = 'none';
            
            // Mostrar pantalla de carga/sincro
            document.getElementById('sync-screen').style.display = 'flex';

            // Integración total de datos Perceptum SpA
            const nombre = localStorage.getItem('pacienteActual') || "Anonimo";
            const hoy = new Date().toISOString().split('T')[0];
            
            // Formatear tiempo MM:SS
            const min = Math.floor(segundosTotales / 60);
            const seg = segundosTotales % 60;
            const tiempoStr = `${min < 10 ? '0' : ''}${min}:${seg < 10 ? '0' : ''}${seg}`;

            const data = new FormData();
            data.append(ENTRIES.paciente, nombre);
            data.append(ENTRIES.juego, "Laberinto Espacial Pro");
            data.append(ENTRIES.nivel, nivel);
            data.append(ENTRIES.aciertos, nivel - 1); // Niveles completados
            data.append(ENTRIES.fallos, fallosTotales);
            data.append(ENTRIES.tiempo, tiempoStr);
            data.append(ENTRIES.fecha, hoy);
            
            // Envío forzado silencioso
            fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: data });
            
            // Redirección forzada tras sync visual
            setTimeout(() => { location.reload(); }, 2500);
        }
        
        // --- UTILITARIOS TÉCNICOS ---
        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function dibujarRectRedondo(ctx, x, y, w, h, r) {
            if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
            ctx.beginPath(); ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath(); ctx.fill();
        }

        // Soporte Teclado PC (Accesibilidad clínica)
        window.onkeydown = (e) => {
            if(!juegoActivo) return;
            if(e.key === "ArrowUp") { e.preventDefault(); mover(0,-1); }
            if(e.key === "ArrowDown") { e.preventDefault(); mover(0,1); }
            if(e.key === "ArrowLeft") { e.preventDefault(); mover(-1,0); }
            if(e.key === "ArrowRight") { e.preventDefault(); mover(1,0); }
        };

        // Soporte Redimensionamiento dinámico
        window.addEventListener('resize', () => { if(juegoActivo) generarNivel(); });
    </script>
</body>
</html>
