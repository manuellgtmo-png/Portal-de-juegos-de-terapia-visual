<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --clin-bg: #0b101b;
            --clin-card: #1c2331;
            --clin-accent: #e91e63;
            --clin-text: #ffffff;
            --clin-error: #ef4444;
            --clin-success: #22c55e;
            --wall: #1e293b;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; background-color: var(--clin-bg); color: var(--clin-text);
            font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* ---------------------------------------------------------
           INTERFAZ GIGANTE (INTRODUCCIÓN Y CONFIGURACIÓN)
        --------------------------------------------------------- */
        .overlay {
            position: fixed; inset: 0; background: rgba(11, 16, 27, 0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }

        .card-clinica {
            background: #ffffff; color: #1e293b; padding: 50px;
            border-radius: 40px; text-align: center; max-width: 600px; width: 100%;
            border: 8px solid var(--clin-accent); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        h1 { font-size: 4rem; color: var(--clin-accent); margin: 0; font-weight: 900; text-transform: uppercase; }
        h2 { font-size: 2.5rem; color: var(--clin-accent); margin-bottom: 20px; font-weight: 900; }
        .instrucciones { font-size: 1.6rem; color: #475569; line-height: 1.5; margin: 30px 0; font-weight: 700; }

        .clin-btn {
            background: var(--clin-accent); color: white; border: none;
            padding: 25px 50px; border-radius: 60px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
            box-shadow: 0 10px 0 #ad1457; transition: 0.1s; width: 100%;
            font-size: 1.8rem;
        }
        .clin-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #ad1457; }
        .clin-btn-alt { background: #64748b; box-shadow: 0 10px 0 #475569; font-size: 1.4rem; }

        /* AJUSTE DE BOTONES DE MODO (Sin salirse del cuadro) */
        .config-box { background: #f1f5f9; border-radius: 25px; padding: 30px; margin: 25px 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .modo-btn {
            background: white; border: 5px solid #cbd5e1; color: #64748b;
            padding: 20px; border-radius: 20px; cursor: pointer; font-weight: 900; width: 45%;
            font-size: 1.1rem; transition: 0.2s; text-align: center;
        }
        .modo-btn.active { border-color: var(--clin-accent); color: var(--clin-accent); background: #fdf2f8; transform: scale(1.05); }

        /* ---------------------------------------------------------
           ESCENARIO DE JUEGO Y HUD
        --------------------------------------------------------- */
        #gameCanvas { display: block; margin: auto; z-index: 10; position: relative; border-radius: 20px; background: #161d2b; }
        
        #ui-layer { position: absolute; top: 0; width: 100%; padding: 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none; }
        .hud-btn-salir { background: #ef4444; color: white; border: none; padding: 15px 30px; border-radius: 15px; font-weight: 900; cursor: pointer; pointer-events: auto; font-size: 1.2rem; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .value { font-weight: 900; font-size: 1.8rem; color: #00f2fe; }

        /* JOYSTICK */
        #controls { position: absolute; bottom: 40px; right: 40px; display: grid; grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); gap: 15px; z-index: 150; }
        .btn-dir { background: var(--clin-card); border: 4px solid var(--clin-accent); color: var(--clin-accent); border-radius: 25px; font-size: 2.5rem; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #000; }
        .btn-dir:active { transform: translateY(3px); box-shadow: 0 3px 0 #000; }

        #starfield { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 50%, #1c2331 0%, #0b101b 100%); }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="scr-intro" class="overlay">
        <div class="card-clinica">
            <h1>🚀 LABERINTO</h1>
            <p class="instrucciones">PLANIFICACIÓN ESPACIAL<br><br>Lleva el cohete a la meta 🏁.<br>Evita los muros y obstáculos.</p>
            <button class="clin-btn" onclick="mostrarConfig()">INICIAR</button>
            <button class="clin-btn clin-btn-alt" onclick="window.location.href='menu-relaciones.html'">VOLVER AL MENÚ</button>
        </div>
    </div>

    <div id="scr-config" class="overlay" style="display:none">
        <div class="card-clinica">
            <h2>MODO DE JUEGO</h2>
            <div class="config-box">
                <button id="mode-crono" class="modo-btn active" onclick="setModo('crono')">CRONOMETRADO</button>
                <button id="mode-reloj" class="modo-btn" onclick="setModo('contrareloj')">CONTRARELOJ</button>
            </div>
            <button class="clin-btn" onclick="iniciarJuego()">¡DESPEGAR!</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none">
        <button class="hud-btn-salir" onclick="location.reload()">SALIR</button>
        <div style="display:flex; gap:20px;">
            <div class="stat-box"><span id="txt-nivel" class="value">Nivel 1</span></div>
            <div class="stat-box"><span id="txt-vidas" class="value">❤️❤️❤️</span></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls" style="display:none">
        <button style="grid-column:2; grid-row:1" class="btn-dir" onmousedown="remover(0,-1)" ontouchstart="remover(0,-1)">↑</button>
        <button style="grid-column:1; grid-row:2" class="btn-dir" onmousedown="remover(-1,0)" ontouchstart="remover(-1,0)">←</button>
        <button style="grid-column:3; grid-row:2" class="btn-dir" onmousedown="remover(1,0)" ontouchstart="remover(1,0)">→</button>
        <button style="grid-column:2; grid-row:3" class="btn-dir" onmousedown="remover(0,1)" ontouchstart="remover(0,1)">↓</button>
    </div>

    <div id="scr-sync" class="overlay" style="display:none"><div class="card-clinica"><h2>Sincronizando...</h2></div></div>
    <div id="scr-final" class="overlay" style="display:none">
        <div class="card-clinica">
            <h1 id="txt-final-titulo">FIN</h1>
            <div id="metrics-summary" style="font-size: 1.5rem; margin: 25px 0;"></div>
            <button class="clin-btn" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const AUDIO = {
            move: new Audio('https://assets.mixkit.co/active_storage/sfx/2578/2578-preview.mp3'),
            hurt: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3')
        };

        const GAME = { active: false, modo: 'crono', nivel: 1, vidas: 3, grid: [], player: {x:1, y:1}, goal: {x:0, y:0}, seg: 0, fallos: 0, drag: false };
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";

        function mostrarConfig() { document.getElementById('scr-intro').style.display = 'none'; document.getElementById('scr-config').style.display = 'flex'; }
        function setModo(m) { GAME.modo = m; document.getElementById('mode-crono').classList.toggle('active', m==='crono'); document.getElementById('mode-reloj').classList.toggle('active', m==='contrareloj'); }

        function iniciarJuego() {
            document.getElementById('scr-config').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('controls').style.display = 'grid';
            GAME.active = true;
            setInterval(() => { if(GAME.active) GAME.seg++; }, 1000);
            generarNivel();
            initDrag();
            initEstrellas();
        }

        // ALGORITMO DE PRIM REAL (Laberinto complejo)
        function generarNivel() {
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.7);
            canvas.width = size; canvas.height = size;
            const dim = 7 + (GAME.nivel * 2);
            GAME.cellSize = size / dim;
            
            GAME.grid = Array(dim).fill().map(() => Array(dim).fill(true));
            const walls = [];
            function excavar(x, y) {
                GAME.grid[x][y] = false;
                [[x+2,y,x+1,y],[x-2,y,x-1,y],[x,y+2,x,y+1],[x,y-2,x,y-1]].forEach(v => {
                    if(v[0]>0 && v[0]<dim-1 && v[1]>0 && v[1]<dim-1 && GAME.grid[v[0]][v[1]]) walls.push(v);
                });
            }
            excavar(1, 1);
            while(walls.length > 0) {
                const [nx,ny,px,py] = walls.splice(Math.floor(Math.random()*walls.length), 1)[0];
                if(GAME.grid[nx][ny]) { GAME.grid[px][py] = false; excavar(nx, ny); }
            }
            GAME.player = {x:1, y:1}; GAME.goal = {x: dim-2, y: dim-2};
            dibujar();
        }

        function remover(dx, dy) { if(GAME.active) moverLogic(dx, dy); }

        function moverLogic(dx, dy) {
            let nx = GAME.player.x + dx, ny = GAME.player.y + dy;
            if(nx >= 0 && nx < GAME.grid.length && ny >= 0 && ny < GAME.grid.length) {
                if(GAME.grid[nx][ny]) {
                    GAME.vidas--; GAME.fallos++; AUDIO.hurt.play();
                    GAME.player = {x:1, y:1};
                    if(GAME.vidas <= 0) finalizar();
                } else {
                    GAME.player.x = nx; GAME.player.y = ny;
                    AUDIO.move.play();
                    if(nx === GAME.goal.x && ny === GAME.goal.y) ganarNivel();
                }
            }
            actualizarHUD(); dibujar();
        }

        function ganarNivel() { AUDIO.win.play(); GAME.nivel++; generarNivel(); }

        function dibujar() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            for(let x=0; x<GAME.grid.length; x++) {
                for(let y=0; y<GAME.grid.length; y++) {
                    if(GAME.grid[x][y]) {
                        ctx.fillStyle = "#1e293b";
                        ctx.fillRect(x*GAME.cellSize, y*GAME.cellSize, GAME.cellSize-1, GAME.cellSize-1);
                    }
                }
            }
            ctx.font = `${GAME.cellSize*0.7}px Arial`;
            ctx.fillText("🚀", GAME.player.x*GAME.cellSize, (GAME.player.y+0.8)*GAME.cellSize);
            ctx.fillText("🏁", GAME.goal.x*GAME.cellSize, (GAME.goal.y+0.8)*GAME.cellSize);
        }

        function actualizarHUD() {
            document.getElementById('txt-nivel').innerText = "Nivel " + GAME.nivel;
            document.getElementById('txt-vidas').innerText = "❤️❤️❤️".substring(0, GAME.vidas*2);
        }

        function initDrag() {
            canvas.addEventListener('touchstart', (e) => {
                const rect = canvas.getBoundingClientRect();
                const tx = (e.touches[0].clientX - rect.left) / GAME.cellSize;
                const ty = (e.touches[0].clientY - rect.top) / GAME.cellSize;
                if(Math.abs(tx - GAME.player.x) < 1.5 && Math.abs(ty - GAME.player.y) < 1.5) GAME.drag = true;
            });
            window.addEventListener('touchmove', (e) => {
                if(!GAME.drag) return;
                const rect = canvas.getBoundingClientRect();
                const cx = Math.floor((e.touches[0].clientX - rect.left) / GAME.cellSize);
                const cy = Math.floor((e.touches[0].clientY - rect.top) / GAME.cellSize);
                if(cx !== GAME.player.x || cy !== GAME.player.y) moverLogic(cx - GAME.player.x, cy - GAME.player.y);
            });
            window.addEventListener('touchend', () => GAME.drag = false);
        }

        function finalizar() {
            GAME.active = false;
            document.getElementById('scr-sync').style.display = 'flex';
            // Sincronización Real Perceptum
            const n = localStorage.getItem('pacienteActual') || "Anonimo";
            const form = new FormData();
            form.append("entry.369874016", n);
            form.append("entry.1353470174", "Laberinto_" + GAME.modo);
            form.append("entry.721051298", GAME.nivel);
            form.append("entry.1030094511", GAME.fallos);
            fetch(FORM_URL, { method: "POST", mode: "no-cors", body: form });

            setTimeout(() => {
                document.getElementById('scr-sync').style.display = 'none';
                document.getElementById('scr-final').style.display = 'flex';
                document.getElementById('metrics-summary').innerHTML = `Nivel: ${GAME.nivel}<br>Choques: ${GAME.fallos}<br>Tiempo: ${GAME.seg}s`;
            }, 1500);
        }

        function initEstrellas() {
            const sc = document.getElementById('starfield'); const sctx = sc.getContext('2d');
            sc.width = window.innerWidth; sc.height = window.innerHeight;
            const stars = Array(150).fill().map(() => ({x:Math.random()*sc.width, y:Math.random()*sc.height, r:Math.random()*1.5}));
            function a() { sctx.clearRect(0,0,sc.width, sc.height); sctx.fillStyle="white"; stars.forEach(s => { sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill(); s.y+=0.3; if(s.y>sc.height) s.y=0; }); requestAnimationFrame(a); } a();
        }

        window.onkeydown = (e) => {
            if(e.key === "ArrowUp") moverLogic(0,-1);
            if(e.key === "ArrowDown") moverLogic(0,1);
            if(e.key === "ArrowLeft") moverLogic(-1,0);
            if(e.key === "ArrowRight") moverLogic(1,0);
        };
    </script>
</body>
</html>
