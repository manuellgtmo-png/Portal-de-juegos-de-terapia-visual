<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ========================================================================
           1. ESTILOS DE INTERFAZ GIGANTE (ADN PERCEPTUM)
           ======================================================================== */
        :root {
            --clin-bg: #0b101b;
            --clin-card: #1c2331;
            --clin-accent: #e91e63;
            --clin-text: #ffffff;
            --clin-error: #ef4444;
            --clin-success: #22c55e;
            --wall: #1e293b;
            --curva: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; background-color: var(--clin-bg); color: var(--clin-text);
            font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(11, 16, 27, 0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }

        .card-clinica {
            background: #ffffff; color: #1e293b; padding: 50px;
            border-radius: 40px; text-align: center; max-width: 600px; width: 100%;
            border: 8px solid var(--clin-accent); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        h1 { font-size: 4rem; color: var(--clin-accent); margin: 0; font-weight: 900; }
        h2 { font-size: 2.5rem; color: var(--clin-accent); margin-bottom: 20px; }
        p.instrucciones { font-size: 1.6rem; color: #475569; line-height: 1.5; margin: 30px 0; font-weight: 600; }

        .clin-btn {
            background: var(--clin-accent); color: white; border: none;
            padding: 25px 50px; border-radius: 60px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-top: 20px;
            box-shadow: 0 10px 0 #ad1457; transition: 0.1s; width: 100%;
            font-size: 1.8rem;
        }
        .clin-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #ad1457; }
        .clin-btn-alt { background: #64748b; box-shadow: 0 10px 0 #475569; font-size: 1.4rem; }

        /* CONFIG MODOS GIGANTE */
        .config-box { background: #f1f5f9; border-radius: 25px; padding: 30px; margin: 25px 0; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 20px; }
        .modo-btn {
            background: white; border: 5px solid #cbd5e1; color: #64748b;
            padding: 25px; border-radius: 20px; cursor: pointer; font-weight: 900; width: 47%;
            font-size: 1.3rem; transition: 0.2s;
        }
        .modo-btn.active { border-color: var(--clin-accent); color: var(--clin-accent); background: #fdf2f8; transform: scale(1.05); }

        /* HUD Y ESCENARIO */
        #starfield { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 50%, #1c2331 0%, #0b101b 100%); opacity: 0.6; }
        #gameCanvas { display: block; margin: auto; z-index: 10; position: relative; cursor: grab; }
        
        #ui-layer { position: absolute; top: 0; width: 100%; padding: 30px; display: flex; justify-content: space-between; align-items: center; z-index: 100; pointer-events: none; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .value { font-weight: 900; font-size: 1.8rem; color: #00f2fe; }

        /* JOYSTICK ORDENADO */
        #controls { position: absolute; bottom: 40px; right: 40px; display: grid; grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); gap: 15px; z-index: 150; }
        .btn-dir { background: var(--clin-card); border: 4px solid var(--clin-accent); color: var(--clin-accent); border-radius: 25px; font-size: 2.5rem; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #000; }
        .btn-dir:active { transform: translateY(3px); box-shadow: 0 3px 0 #000; }

        #time-bar-container { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); width: 50%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; display: none; overflow: hidden; }
        #time-bar-fill { width: 100%; height: 100%; background: var(--clin-success); }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="scr-intro" class="overlay">
        <div class="card-clinica">
            <h1>🚀 Laberinto</h1>
            <p style="font-weight: 700; color: #64748b; font-size: 1.8rem;">Planificación Espacial Pro</p>
            <p class="instrucciones">
                Guía el cohete hasta la meta 🏁.<br>
                Usa las flechas o arrastra el cohete.<br>
                ¡Cuidado con los muros!
            </p>
            <button class="clin-btn" onclick="nextStep('scr-intro', 'scr-config')">INICIAR</button>
            <button class="clin-btn clin-btn-alt" onclick="window.location.href='menu-relaciones.html'">VOLVER AL MENÚ</button>
        </div>
    </div>

    <div id="scr-config" class="overlay" style="display:none">
        <div class="card-clinica">
            <h2>ELEGIR MODO</h2>
            <div class="config-box">
                <button id="mode-crono" class="modo-btn active" onclick="setModo('crono')">CRONOMETRADO</button>
                <button id="mode-contrareloj" class="modo-btn" onclick="setModo('contrareloj')">CONTRARELOJ</button>
                <div id="config-time" style="display:none; width: 100%; margin-top: 20px;">
                    <label style="font-weight: 900; font-size: 1.5rem;">TIEMPO LÍMITE: <span id="val-time" style="color: var(--clin-accent)">30</span>s</label>
                    <input type="range" id="slider-time" min="15" max="120" step="5" value="30" oninput="document.getElementById('val-time').innerText = this.value">
                </div>
            </div>
            <button class="clin-btn" onclick="iniciarProtocoloJuego()">¡DESPEGAR!</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none">
        <button class="clin-btn-alt" style="width:auto; padding: 12px 30px; border-radius:15px;" onclick="location.reload()">SALIR</button>
        <div style="display:flex; gap:20px;">
            <div class="stat-box"><span id="txt-nivel" class="value">Nivel 1</span></div>
            <div class="stat-box"><span id="txt-vidas" class="value">❤️❤️❤️</span></div>
        </div>
    </div>
    <div id="time-bar-container"><div id="time-bar-fill"></div></div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls" style="display:none">
        <button style="grid-column:2; grid-row:1" class="btn-dir" onclick="remover(0,-1)">↑</button>
        <button style="grid-column:1; grid-row:2" class="btn-dir" onclick="remover(-1,0)">←</button>
        <button style="grid-column:3; grid-row:2" class="btn-dir" onclick="remover(1,0)">→</button>
        <button style="grid-column:2; grid-row:3" class="btn-dir" onclick="remover(0,1)">↓</button>
    </div>

    <div id="scr-sync" class="overlay" style="display:none"><div class="card-clinica"><h2>Sincronizando...</h2></div></div>
    <div id="scr-final" class="overlay" style="display:none">
        <div class="card-clinica">
            <h1 id="txt-final-titulo">FIN</h1>
            <div id="metrics-summary" style="font-size: 1.5rem; margin: 25px 0; text-align: left;"></div>
            <button class="clin-btn" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <script>
        // ========================================================================
        // MOTOR DE JUEGO COMPLETO (ALGORITMO DE PRIM + DRAG + SYNC)
        // ========================================================================
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const GAME = { active: false, modo: 'crono', nivel: 1, vidas: 3, grid: [], cols: 0, rows: 0, cellSize: 0, player: {x:1, y:1}, goal: {x:0, y:0}, portales: [], fallos: 0, tBase: 30, tCurr: 30, segTotales: 0, timers: { game: null, bar: null }, drag: { active: false, lastX: 0, lastY: 0 } };
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";

        function nextStep(h, s) { document.getElementById(h).style.display = 'none'; document.getElementById(s).style.display = 'flex'; }
        function setModo(m) { GAME.modo = m; document.getElementById('mode-crono').classList.toggle('active', m === 'crono'); document.getElementById('mode-contrareloj').classList.toggle('active', m === 'contrareloj'); document.getElementById('config-time').style.display = (m === 'contrareloj') ? 'block' : 'none'; }

        function iniciarProtocoloJuego() {
            GAME.tBase = parseInt(document.getElementById('slider-time').value);
            document.getElementById('scr-config').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('controls').style.display = 'grid';
            if(GAME.modo === 'contrareloj') document.getElementById('time-bar-container').style.display = 'block';
            GAME.active = true;
            GAME.timers.game = setInterval(() => { if(GAME.active) GAME.segTotales++; }, 1000);
            generarNivel();
            initDragLogic();
            initEstrellas();
        }

        function generarNivel() {
            const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.75, 800);
            canvas.width = size; canvas.height = size;
            GAME.cols = 7 + (GAME.nivel * 2); if(GAME.cols > 31) GAME.cols = 31;
            GAME.rows = GAME.cols; GAME.cellSize = size / GAME.cols;
            
            // ALGORITMO DE PRIM REAL
            GAME.grid = Array(GAME.cols).fill().map(() => Array(GAME.rows).fill(true));
            const walls = [];
            function excavar(x, y) {
                GAME.grid[x][y] = false;
                [[x+2,y,x+1,y],[x-2,y,x-1,y],[x,y+2,x,y+1],[x,y-2,x,y-1]].forEach(v => {
                    if(v[0]>0 && v[0]<GAME.cols-1 && v[1]>0 && v[1]<GAME.rows-1 && GAME.grid[v[0]][v[1]]) walls.push(v);
                });
            }
            excavar(1, 1);
            while(walls.length > 0) {
                const [nx,ny,px,py] = walls.splice(Math.floor(Math.random()*walls.length), 1)[0];
                if(GAME.grid[nx][ny]) { GAME.grid[px][py] = false; excavar(nx, ny); }
            }
            GAME.player = {x:1, y:1}; GAME.goal = {x: GAME.cols-2, y: GAME.rows-2};
            if(GAME.modo === 'contrareloj') iniciarContrareloj();
            dibujar();
        }

        function remover(dx, dy) { if(!GAME.active) return; moverLogic(dx, dy); }

        function moverLogic(dx, dy) {
            let nx = GAME.player.x + dx, ny = GAME.player.y + dy;
            if(nx >= 0 && nx < GAME.cols && ny >= 0 && ny < GAME.rows) {
                if(GAME.grid[nx][ny]) {
                    GAME.vidas--; GAME.fallos++; 
                    GAME.player = {x:1, y:1};
                    document.getElementById('txt-vidas').innerText = "❤️❤️❤️".substring(0, GAME.vidas * 2);
                    if(GAME.vidas <= 0) finalizarExamen("SIN VIDAS");
                } else {
                    GAME.player.x = nx; GAME.player.y = ny;
                    if(nx === GAME.goal.x && ny === GAME.goal.y) ganarNivel();
                }
            }
            dibujar();
        }

        function initDragLogic() {
            canvas.addEventListener('touchstart', (e) => {
                const rect = canvas.getBoundingClientRect();
                const tx = (e.touches[0].clientX - rect.left) / GAME.cellSize;
                const ty = (e.touches[0].clientY - rect.top) / GAME.cellSize;
                if(Math.abs(tx - GAME.player.x) < 1.5 && Math.abs(ty - GAME.player.y) < 1.5) {
                    GAME.drag.active = true; GAME.drag.lastX = Math.floor(tx); GAME.drag.lastY = Math.floor(ty);
                }
            });
            window.addEventListener('touchmove', (e) => {
                if(!GAME.drag.active) return;
                const rect = canvas.getBoundingClientRect();
                const cx = Math.floor((e.touches[0].clientX - rect.left) / GAME.cellSize);
                const cy = Math.floor((e.touches[0].clientY - rect.top) / GAME.cellSize);
                if(cx !== GAME.drag.lastX || cy !== GAME.drag.lastY) {
                    moverLogic(cx - GAME.drag.lastX, cy - GAME.drag.lastY);
                    GAME.drag.lastX = cx; GAME.drag.lastY = cy;
                }
            });
            window.addEventListener('touchend', () => GAME.drag.active = false);
        }

        function dibujar() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            for(let x=0; x<GAME.cols; x++) {
                for(let y=0; y<GAME.rows; y++) {
                    if(GAME.grid[x][y]) {
                        ctx.fillStyle = '#1e293b';
                        ctx.beginPath(); ctx.roundRect(x*GAME.cellSize+1, y*GAME.cellSize+1, GAME.cellSize-2, GAME.cellSize-2, GAME.cellSize*0.2); ctx.fill();
                    }
                }
            }
            ctx.font = `${GAME.cellSize*0.7}px Arial`;
            ctx.fillText("🏁", GAME.goal.x*GAME.cellSize + GAME.cellSize*0.1, (GAME.goal.y+0.8)*GAME.cellSize);
            ctx.fillText("🚀", GAME.player.x*GAME.cellSize + GAME.cellSize*0.1, (GAME.player.y+0.8)*GAME.cellSize);
        }

        function ganarNivel() {
            GAME.nivel++; document.getElementById('txt-nivel').innerText = "Nivel " + GAME.nivel;
            generarNivel();
        }

        function iniciarContrareloj() {
            GAME.tCurr = GAME.tBase;
            clearInterval(GAME.timers.bar);
            GAME.timers.bar = setInterval(() => {
                if(!GAME.active) return;
                GAME.tCurr -= 0.1;
                document.getElementById('time-bar-fill').style.width = (GAME.tCurr / GAME.tBase * 100) + '%';
                if(GAME.tCurr <= 0) finalizarExamen("TIEMPO AGOTADO");
            }, 100);
        }

        function finalizarExamen(msg) {
            GAME.active = false; clearInterval(GAME.timers.game); clearInterval(GAME.timers.bar);
            nextStep('ui-layer', 'scr-sync');
            setTimeout(() => {
                nextStep('scr-sync', 'scr-final');
                document.getElementById('txt-final-titulo').innerText = msg;
                document.getElementById('metrics-summary').innerHTML = `• Nivel: ${GAME.nivel}<br>• Choques: ${GAME.fallos}<br>• Tiempo: ${GAME.segTotales}s`;
            }, 1500);
        }

        function initEstrellas() {
            const sc = document.getElementById('starfield'); const sctx = sc.getContext('2d');
            sc.width = window.innerWidth; sc.height = window.innerHeight;
            const stars = Array(150).fill().map(() => ({x:Math.random()*sc.width, y:Math.random()*sc.height, r:Math.random()*1.5}));
            function a() { sctx.clearRect(0,0,sc.width, sc.height); sctx.fillStyle="white"; stars.forEach(s => { sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill(); s.y+=0.3; if(s.y>sc.height) s.y=0; }); requestAnimationFrame(a); } a();
        }
    </script>
    <iframe name="target_silencioso" style="display:none;"></iframe>
</body>
</html>
