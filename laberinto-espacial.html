<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --clin-bg: #0b101b;
            --clin-card: #1c2331;
            --clin-accent: #e91e63;
            --clin-text: #ffffff;
            --path-glow: #00f2fe;
            --wall: #1e293b;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; background-color: var(--clin-bg); color: var(--clin-text);
            font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #starfield { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 50%, #1c2331 0%, #0b101b 100%); }

        /* --- INTERFAZ DE MENÚS (RESTAURADA) --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(11, 16, 27, 0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }

        .card-clinica {
            background: #ffffff; color: #1e293b; padding: 35px;
            border-radius: 30px; text-align: center; max-width: 460px; width: 100%;
            border: 6px solid var(--clin-accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2.8rem; color: var(--clin-accent); margin: 0; font-weight: 900; }
        
        .clin-btn {
            background: var(--clin-accent); color: white; border: none;
            padding: 20px; border-radius: 50px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-top: 15px;
            box-shadow: 0 8px 0 #ad1457; transition: 0.1s; width: 100%;
            font-size: 1.4rem;
        }
        .clin-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #ad1457; }

        /* Arreglo para botones de modo */
        .config-box { background: #f1f5f9; border-radius: 20px; padding: 20px; margin: 15px 0; }
        .modo-row { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .modo-btn {
            flex: 1; background: white; border: 3px solid #cbd5e1; color: #64748b;
            padding: 15px 5px; border-radius: 12px; cursor: pointer; font-weight: 900;
            font-size: 0.8rem; text-transform: uppercase; min-width: 120px;
        }
        .modo-btn.active { border-color: var(--clin-accent); color: var(--clin-accent); background: #fdf2f8; }

        /* --- CONTENEDOR DE JUEGO (CENTRADO) --- */
        #game-view {
            width: 100%; height: 100%; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            position: relative; z-index: 10;
        }

        #gameCanvas {
            background: #161d2b; border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            max-width: 95vw; max-height: 65vh;
        }

        /* HUD Y CONTROLES */
        #ui-layer {
            position: absolute; top: 20px; width: 100%; padding: 0 25px;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none;
        }
        .hud-item { background: rgba(0,0,0,0.6); padding: 10px 18px; border-radius: 12px; border: 1px solid var(--clin-accent); pointer-events: auto; }
        
        #controls {
            position: absolute; bottom: 25px; right: 25px;
            display: grid; grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(3, 75px); gap: 12px;
        }
        .btn-dir {
            background: var(--clin-card); border: 3px solid var(--clin-accent);
            color: var(--clin-accent); border-radius: 18px; font-size: 2rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        #scr-sync { background: rgba(11,16,27,0.9); z-index: 3000; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--path-glow); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="scr-intro" class="overlay">
        <div class="card-clinica">
            <h1>🚀 LABERINTO</h1>
            <p style="font-weight: 700; color: #64748b; margin-top:10px;">Centro de Salud Perceptum</p>
            <p style="margin: 20px 0;">Ayuda al cohete a cruzar el laberinto dibujando el camino con tu dedo.</p>
            <button class="clin-btn" onclick="cambiarPantalla('scr-intro', 'scr-config')">CONTINUAR</button>
        </div>
    </div>

    <div id="scr-config" class="overlay" style="display:none">
        <div class="card-clinica">
            <h2>MODO DE JUEGO</h2>
            <div class="config-box">
                <div class="modo-row">
                    <button id="mode-crono" class="modo-btn active" onclick="setModo('crono')">Cronometrado</button>
                    <button id="mode-reloj" class="modo-btn" onclick="setModo('contrareloj')">Contrareloj</button>
                </div>
                <div id="cont-slider" style="display:none; margin-top:20px;">
                    <p style="font-weight:900;">TIEMPO: <span id="val-tiempo">30</span>s</p>
                    <input type="range" id="input-tiempo" min="10" max="120" value="30" style="width:100%" oninput="document.getElementById('val-tiempo').innerText=this.value">
                </div>
            </div>
            <button class="clin-btn" onclick="iniciarJuego()">¡DESPEGAR!</button>
        </div>
    </div>

    <div id="game-view" style="display:none">
        <div id="ui-layer">
            <button class="hud-item" onclick="location.reload()" style="background:var(--clin-accent); color:white; border:none; cursor:pointer; font-weight:900;">SALIR</button>
            <div style="display:flex; gap:10px;">
                <div class="hud-item"><span id="txt-nivel" style="color:var(--path-glow); font-weight:900;">NV 1</span></div>
                <div class="hud-item"><span id="txt-vidas">❤️❤️❤️</span></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls">
            <button style="grid-column:2; grid-row:1" class="btn-dir" onmousedown="remover(0,-1)" ontouchstart="remover(0,-1)">↑</button>
            <button style="grid-column:1; grid-row:2" class="btn-dir" onmousedown="-remover(-1,0)" ontouchstart="remover(-1,0)">←</button>
            <button style="grid-column:3; grid-row:2" class="btn-dir" onmousedown="remover(1,0)" ontouchstart="remover(1,0)">→</button>
            <button style="grid-column:2; grid-row:3" class="btn-dir" onmousedown="remover(0,1)" ontouchstart="remover(0,1)">↓</button>
        </div>
    </div>

    <div id="scr-sync" class="overlay" style="display:none"><div class="card-clinica"><div class="loader"></div><p>Sincronizando datos...</p></div></div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";
        
        const AUDIO = {
            move: new Audio('https://assets.mixkit.co/active_storage/sfx/2578/2578-preview.mp3'),
            hurt: new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'),
            win: new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3')
        };

        let GAME = {
            active: false, modo: 'crono', nivel: 1, vidas: 3, grid: [],
            player: {x:1, y:1}, goal: {x:0, y:0}, dim: 0, cellSize: 0,
            isDrawing: false, plannedPath: [], isExecuting: false,
            currentTime: 30, maxTime: 30, fallos: 0
        };

        function cambiarPantalla(id1, id2) { document.getElementById(id1).style.display='none'; document.getElementById(id2).style.display='flex'; }
        
        function setModo(m) {
            GAME.modo = m;
            document.getElementById('mode-crono').classList.toggle('active', m==='crono');
            document.getElementById('mode-reloj').classList.toggle('active', m==='contrareloj');
            document.getElementById('cont-slider').style.display = (m==='contrareloj') ? 'block' : 'none';
        }

        function iniciarJuego() {
            GAME.maxTime = parseInt(document.getElementById('input-tiempo').value);
            cambiarPantalla('scr-config', 'game-view');
            GAME.active = true;
            generarNivel();
            initEvents();
            initEstrellas();
        }

        function generarNivel() {
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.65);
            canvas.width = size; canvas.height = size;
            GAME.dim = 7 + (GAME.nivel * 2); if(GAME.dim > 21) GAME.dim = 21;
            GAME.cellSize = size / GAME.dim;
            
            GAME.grid = Array(GAME.dim).fill().map(() => Array(GAME.dim).fill(true));
            const stack = [[1,1]]; GAME.grid[1][1] = false;
            while(stack.length > 0) {
                let [x, y] = stack[stack.length-1];
                let neighbors = [[x+2,y,x+1,y],[x-2,y,x-1,y],[x,y+2,x,y+1],[x,y-2,x,y-1]].filter(n => 
                    n[0]>0 && n[0]<GAME.dim-1 && n[1]>0 && n[1]<GAME.dim-1 && GAME.grid[n[0]][n[1]]
                );
                if(neighbors.length > 0) {
                    let [nx, ny, px, py] = neighbors[Math.floor(Math.random()*neighbors.length)];
                    GAME.grid[nx][ny] = false; GAME.grid[px][py] = false; stack.push([nx, ny]);
                } else stack.pop();
            }
            GAME.player = {x:1, y:1}; GAME.goal = {x: GAME.dim-2, y: GAME.dim-2};
            GAME.plannedPath = []; dibujar();
        }

        function remover(dx, dy) { if(GAME.active && !GAME.isExecuting) moverLogic(dx, dy); }

        function moverLogic(dx, dy) {
            let nx = GAME.player.x + dx, ny = GAME.player.y + dy;
            if(nx < 0 || ny < 0 || nx >= GAME.dim || ny >= GAME.dim || GAME.grid[nx][ny]) {
                GAME.vidas--; GAME.fallos++; AUDIO.hurt.play();
                GAME.player = {x:1, y:1};
                if(GAME.vidas <= 0) finalizarJuego();
            } else {
                GAME.player.x = nx; GAME.player.y = ny; AUDIO.move.play();
                if(nx === GAME.goal.x && ny === GAME.goal.y) { GAME.nivel++; AUDIO.win.play(); generarNivel(); }
            }
            actualizarHUD(); dibujar();
        }

        function dibujar() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            for(let x=0; x<GAME.dim; x++) {
                for(let y=0; y<GAME.dim; y++) {
                    if(GAME.grid[x][y]) {
                        ctx.fillStyle = "#1e293b"; ctx.beginPath();
                        ctx.roundRect(x*GAME.cellSize+1, y*GAME.cellSize+1, GAME.cellSize-2, GAME.cellSize-2, 4); ctx.fill();
                    }
                }
            }

            // CAMINO ILUMINADO (RESTAURADO)
            if(GAME.plannedPath.length > 0) {
                ctx.strokeStyle = varProp('--path-glow'); ctx.lineWidth = GAME.cellSize * 0.45;
                ctx.lineCap = "round"; ctx.lineJoin = "round";
                ctx.shadowBlur = 20; ctx.shadowColor = varProp('--path-glow');
                ctx.beginPath();
                ctx.moveTo(GAME.player.x*GAME.cellSize + GAME.cellSize/2, GAME.player.y*GAME.cellSize + GAME.cellSize/2);
                GAME.plannedPath.forEach(p => ctx.lineTo(p.x*GAME.cellSize + GAME.cellSize/2, p.y*GAME.cellSize + GAME.cellSize/2));
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            ctx.font = `${GAME.cellSize*0.8}px Arial`;
            ctx.fillText("🏁", GAME.goal.x*GAME.cellSize + 2, (GAME.goal.y+0.85)*GAME.cellSize);
            ctx.fillText("🚀", GAME.player.x*GAME.cellSize + 2, (GAME.player.y+0.85)*GAME.cellSize);
        }

        function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function initEvents() {
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: Math.floor((cx - rect.left)/GAME.cellSize), y: Math.floor((cy - rect.top)/GAME.cellSize) };
            };
            canvas.onmousedown = canvas.ontouchstart = (e) => {
                const p = getPos(e);
                if(p.x === GAME.player.x && p.y === GAME.player.y && !GAME.isExecuting) { GAME.isDrawing = true; GAME.plannedPath = []; }
            };
            window.onmousemove = window.ontouchmove = (e) => {
                if(!GAME.isDrawing) return;
                const p = getPos(e);
                if(p.x >= 0 && p.x < GAME.dim && p.y >= 0 && p.y < GAME.dim) {
                    if(GAME.grid[p.x][p.y]) { GAME.isDrawing = false; GAME.plannedPath = []; moverLogic(0,0); }
                    else {
                        const last = GAME.plannedPath[GAME.plannedPath.length-1] || GAME.player;
                        const dist = Math.abs(p.x - last.x) + Math.abs(p.y - last.y);
                        if(dist === 1) { // BLOQUEO DIAGONAL
                            if(!GAME.plannedPath.find(pos => pos.x === p.x && pos.y === p.y)) GAME.plannedPath.push(p);
                        }
                    }
                }
                dibujar();
            };
            window.onmouseup = window.ontouchend = () => { if(GAME.isDrawing) { GAME.isDrawing = false; ejecutarVuelo(); } };
        }

        async function ejecutarVuelo() {
            GAME.isExecuting = true;
            for(let step of GAME.plannedPath) {
                GAME.player = step; AUDIO.move.play(); dibujar();
                await new Promise(r => setTimeout(r, 60));
                if(GAME.player.x === GAME.goal.x && GAME.player.y === GAME.goal.y) { 
                    GAME.nivel++; AUDIO.win.play(); generarNivel(); break; 
                }
            }
            GAME.plannedPath = []; GAME.isExecuting = false; dibujar();
        }

        function finalizarJuego() {
            GAME.active = false;
            document.getElementById('scr-sync').style.display='flex';
            const data = new FormData();
            data.append("entry.369874016", localStorage.getItem('pacienteActual') || "Anonimo");
            data.append("entry.721051298", GAME.nivel);
            fetch(FORM_URL, { method: "POST", mode: "no-cors", body: data }).then(() => location.reload());
        }

        function actualizarHUD() {
            document.getElementById('txt-nivel').innerText = "NV " + GAME.nivel;
            document.getElementById('txt-vidas').innerText = "❤️❤️❤️".substring(0, GAME.vidas*2);
        }

        function initEstrellas() {
            const sc = document.getElementById('starfield'); const sctx = sc.getContext('2d');
            sc.width = window.innerWidth; sc.height = window.innerHeight;
            const stars = Array(100).fill().map(() => ({x:Math.random()*sc.width, y:Math.random()*sc.height, r:Math.random()*1.5}));
            function anim() { 
                sctx.clearRect(0,0,sc.width, sc.height); sctx.fillStyle="white"; 
                stars.forEach(s => { sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill(); s.y+=0.3; if(s.y>sc.height) s.y=0; }); 
                requestAnimationFrame(anim); 
            } anim();
        }
    </script>
</body>
</html>
