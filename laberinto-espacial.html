<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --clin-bg: #0b101b;
            --clin-card: #1c2331;
            --clin-accent: #e91e63;
            --clin-text: #ffffff;
            --path-glow: #00f2fe;
        }

        * { box-sizing: border-box; touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0; background-color: var(--clin-bg); color: var(--clin-text);
            font-family: 'Montserrat', sans-serif; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #starfield { position: fixed; inset: 0; z-index: 0; background: radial-gradient(circle at 50% 50%, #1c2331 0%, #0b101b 100%); }

        .overlay {
            position: fixed; inset: 0; background: rgba(11, 16, 27, 0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }

        .card-clinica {
            background: #ffffff; color: #1e293b; padding: 35px;
            border-radius: 30px; text-align: center; max-width: 500px; width: 100%;
            border: 6px solid var(--clin-accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 2.8rem; color: var(--clin-accent); margin: 0; font-weight: 900; }
        
        .clin-btn {
            background: var(--clin-accent); color: white; border: none;
            padding: 22px; border-radius: 50px; font-weight: 900;
            cursor: pointer; text-transform: uppercase; margin-top: 15px;
            box-shadow: 0 8px 0 #ad1457; transition: 0.1s; width: 100%;
            font-size: 1.5rem;
        }
        .clin-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #ad1457; }
        .btn-secundario { background: #64748b; box-shadow: 0 8px 0 #475569; }

        .config-box { background: #f1f5f9; border-radius: 20px; padding: 20px; margin: 15px 0; }
        .modo-row { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .modo-btn {
            flex: 1; background: white; border: 3px solid #cbd5e1; color: #64748b;
            padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 900;
            text-transform: uppercase;
        }
        .modo-btn.active { border-color: var(--clin-accent); color: var(--clin-accent); background: #fdf2f8; }

        input[type=range] { width: 100%; margin: 15px 0; accent-color: var(--clin-accent); }

        #game-view { width: 100%; height: 100%; position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; }

        #ui-layer {
            position: absolute; top: 20px; width: 100%; padding: 0 25px;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .hud-top-btn { 
            background: var(--clin-accent); color:white; padding: 15px 25px; 
            border-radius: 12px; border:none; font-weight:900; cursor:pointer; 
            pointer-events: auto; font-size: 1.1rem;
        }
        .stat-box { background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 12px; border: 2px solid var(--clin-accent); color: white; font-weight: 900; }
        
        #controls {
            position: absolute; bottom: 30px; right: 30px;
            display: grid; grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px); gap: 15px;
        }
        .btn-dir {
            background: var(--clin-card); border: 3px solid var(--clin-accent);
            color: var(--clin-accent); border-radius: 20px; font-size: 2.2rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 6px 0 #000;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="scr-intro" class="overlay">
        <div class="card-clinica">
            <h1>🚀 LABERINTO</h1>
            <p style="font-weight: 700; color: #64748b;">Centro de Salud Perceptum</p>
            <p style="margin: 25px 0; line-height: 1.5; font-size: 1.1rem;">
                Entrena tu visión y precisión guiando al cohete hasta la meta. 
                Puedes usar las <b>flechas en pantalla</b>, el <b>teclado</b> o <b>deslizar tu dedo</b> marcando el camino neón.
            </p>
            <button class="clin-btn" onclick="cambiarPantalla('scr-intro', 'scr-config')">CONTINUAR</button>
            <button class="clin-btn btn-secundario" onclick="location.reload()">VOLVER AL MENÚ PRINCIPAL</button>
        </div>
    </div>

    <div id="scr-config" class="overlay" style="display:none">
        <div class="card-clinica">
            <h2>MODO DE JUEGO</h2>
            <div class="config-box">
                <div class="modo-row">
                    <button id="mode-crono" class="modo-btn active" onclick="setModo('crono')">Cronometrado</button>
                    <button id="mode-reloj" class="modo-btn" onclick="setModo('contrareloj')">Contrareloj</button>
                </div>
                <div id="timer-setup" style="display:none">
                    <p>Elegir Tiempo: <span id="val-tiempo">60</span>s</p>
                    <input type="range" id="range-tiempo" min="10" max="120" value="60" oninput="document.getElementById('val-tiempo').innerText=this.value">
                </div>
            </div>
            <button class="clin-btn" onclick="iniciarJuego()">¡DESPEGAR!</button>
        </div>
    </div>

    <div id="game-view" style="display:none">
        <div id="ui-layer">
            <button class="hud-top-btn" onclick="location.reload()">MENÚ PRINCIPAL</button>
            <div style="display:flex; gap:12px;">
                <div id="timer-box" class="stat-box" style="display:none">⏱️ <span id="txt-timer">0</span></div>
                <div class="stat-box"><span id="txt-nivel" style="color:var(--path-glow)">NV 1</span></div>
                <div class="stat-box"><span id="txt-vidas">❤️❤️❤️</span></div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="controls">
            <button style="grid-column:2; grid-row:1" class="btn-dir" onclick="remover(0,-1)">↑</button>
            <button style="grid-column:1; grid-row:2" class="btn-dir" onclick="remover(-1,0)">←</button>
            <button style="grid-column:3; grid-row:2" class="btn-dir" onclick="remover(1,0)">→</button>
            <button style="grid-column:2; grid-row:3" class="btn-dir" onclick="remover(0,1)">↓</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let GAME = {
            active: false, modo: 'crono', nivel: 1, vidas: 3, grid: [],
            player: {x:1, y:1}, goal: {x:0, y:0}, dim: 0, cellSize: 0,
            isDrawing: false, plannedPath: [], isExecuting: false,
            tiempo: 0, timerInterval: null
        };

        function cambiarPantalla(id1, id2) { 
            document.getElementById(id1).style.display='none'; 
            document.getElementById(id2).style.display='flex'; 
        }
        
        function setModo(m) {
            GAME.modo = m;
            document.getElementById('mode-crono').classList.toggle('active', m==='crono');
            document.getElementById('mode-reloj').classList.toggle('active', m==='contrareloj');
            document.getElementById('timer-setup').style.display = (m === 'contrareloj') ? 'block' : 'none';
        }

        function iniciarJuego() {
            cambiarPantalla('scr-config', 'game-view');
            GAME.active = true;
            if(GAME.modo === 'contrareloj') {
                GAME.tiempo = parseInt(document.getElementById('range-tiempo').value);
                document.getElementById('timer-box').style.display = 'block';
                iniciarTimer();
            }
            generarNivel();
            initEvents();
        }

        function iniciarTimer() {
            clearInterval(GAME.timerInterval);
            GAME.timerInterval = setInterval(() => {
                GAME.tiempo--;
                document.getElementById('txt-timer').innerText = GAME.tiempo;
                if(GAME.tiempo <= 0) { alert("¡Tiempo agotado!"); location.reload(); }
            }, 1000);
        }

        function generarNivel() {
            const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.7);
            canvas.width = size; canvas.height = size;
            GAME.dim = 7 + (GAME.nivel * 2); if(GAME.dim > 15) GAME.dim = 15;
            GAME.cellSize = size / GAME.dim;
            
            GAME.grid = Array(GAME.dim).fill().map(() => Array(GAME.dim).fill(true));
            const stack = [[1,1]]; GAME.grid[1][1] = false;
            while(stack.length > 0) {
                let [x, y] = stack[stack.length-1];
                let neighbors = [[x+2,y,x+1,y],[x-2,y,x-1,y],[x,y+2,x,y+1],[x,y-2,x,y-1]].filter(n => 
                    n[0]>0 && n[0]<GAME.dim-1 && n[1]>0 && n[1]<GAME.dim-1 && GAME.grid[n[0]][n[1]]
                );
                if(neighbors.length > 0) {
                    let [nx, ny, px, py] = neighbors[Math.floor(Math.random()*neighbors.length)];
                    GAME.grid[nx][ny] = false; GAME.grid[px][py] = false; stack.push([nx, ny]);
                } else stack.pop();
            }
            GAME.player = {x:1, y:1}; GAME.goal = {x: GAME.dim-2, y: GAME.dim-2};
            dibujar();
        }

        function remover(dx, dy) { if(GAME.active && !GAME.isExecuting) moverLogic(dx, dy); }

        function moverLogic(dx, dy) {
            let nx = GAME.player.x + dx, ny = GAME.player.y + dy;
            if(nx >= 0 && ny >= 0 && nx < GAME.dim && ny < GAME.dim && !GAME.grid[nx][ny]) {
                GAME.player.x = nx; GAME.player.y = ny;
                if(nx === GAME.goal.x && ny === GAME.goal.y) { GAME.nivel++; generarNivel(); }
            } else {
                GAME.vidas--; actualizarHUD();
                if(GAME.vidas <= 0) location.reload();
            }
            dibujar();
        }

        function dibujar() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            // Paredes
            for(let x=0; x<GAME.dim; x++) {
                for(let y=0; y<GAME.dim; y++) {
                    if(GAME.grid[x][y]) {
                        ctx.fillStyle = "#1e293b";
                        ctx.fillRect(x*GAME.cellSize, y*GAME.cellSize, GAME.cellSize, GAME.cellSize);
                    }
                }
            }
            // Línea Neón (SIN DIAGONALES)
            if(GAME.plannedPath.length > 0) {
                ctx.strokeStyle = var(--path-glow); ctx.lineWidth = GAME.cellSize * 0.4;
                ctx.lineCap = "round"; ctx.lineJoin = "round";
                ctx.beginPath();
                ctx.moveTo(GAME.player.x*GAME.cellSize + GAME.cellSize/2, GAME.player.y*GAME.cellSize + GAME.cellSize/2);
                GAME.plannedPath.forEach(p => ctx.lineTo(p.x*GAME.cellSize + GAME.cellSize/2, p.y*GAME.cellSize + GAME.cellSize/2));
                ctx.stroke();
            }
            // Iconos
            ctx.font = `${GAME.cellSize*0.7}px Arial`;
            ctx.fillText("🏁", GAME.goal.x*GAME.cellSize + 5, (GAME.goal.y+0.8)*GAME.cellSize);
            ctx.fillText("🚀", GAME.player.x*GAME.cellSize + 5, (GAME.player.y+0.8)*GAME.cellSize);
        }

        function initEvents() {
            // Teclado
            window.onkeydown = (e) => {
                if(e.key === "ArrowUp") remover(0,-1);
                if(e.key === "ArrowDown") remover(0,1);
                if(e.key === "ArrowLeft") remover(-1,0);
                if(e.key === "ArrowRight") remover(1,0);
            };

            // Touch / Mouse
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: Math.floor((cx - rect.left)/GAME.cellSize), y: Math.floor((cy - rect.top)/GAME.cellSize) };
            };

            canvas.onmousedown = canvas.ontouchstart = (e) => {
                const p = getPos(e);
                if(p.x === GAME.player.x && p.y === GAME.player.y) { GAME.isDrawing = true; GAME.plannedPath = []; }
            };

            window.onmousemove = window.ontouchmove = (e) => {
                if(!GAME.isDrawing) return;
                const p = getPos(e);
                const last = GAME.plannedPath[GAME.plannedPath.length-1] || GAME.player;
                // VALIDACIÓN: Solo permitir pasos adyacentes (evita diagonales)
                const dx = Math.abs(p.x - last.x); const dy = Math.abs(p.y - last.y);
                if((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
                    if(!GAME.grid[p.x][p.y]) {
                        if(!GAME.plannedPath.find(pos => pos.x === p.x && pos.y === p.y)) {
                            GAME.plannedPath.push(p);
                        }
                    } else {
                        GAME.isDrawing = false; GAME.plannedPath = []; GAME.vidas--; 
                        actualizarHUD(); if(GAME.vidas <= 0) location.reload();
                    }
                }
                dibujar();
            };

            window.onmouseup = window.ontouchend = () => {
                if(GAME.isDrawing && GAME.plannedPath.length > 0) {
                    GAME.isDrawing = false; ejecutarCamino();
                }
            };
        }

        async function ejecutarCamino() {
            GAME.isExecuting = true;
            for(let step of GAME.plannedPath) {
                GAME.player = step;
                dibujar();
                await new Promise(r => setTimeout(r, 50));
                if(GAME.player.x === GAME.goal.x && GAME.player.y === GAME.goal.y) {
                    GAME.nivel++; generarNivel(); break;
                }
            }
            GAME.plannedPath = []; GAME.isExecuting = false; dibujar();
        }

        function actualizarHUD() {
            document.getElementById('txt-vidas').innerText = "❤️❤️❤️".substring(0, GAME.vidas*2);
        }
    </script>
</body>
</html>
