<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e91e63; --bg: #0b101b; --wall: #1e293b; --accent: #00f2fe; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; }
        
        #ui-layer { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .stat-box { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .value { display: block; font-weight: 900; font-size: 1.1rem; color: var(--accent); }
        
        #btn-salir { position: absolute; top: 20px; left: 20px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 2px solid #ef4444; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; z-index: 150; }

        canvas { display: block; margin: auto; cursor: grab; }
        canvas:active { cursor: grabbing; }

        #controls { position: absolute; bottom: 20px; right: 20px; display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        .btn-dir { background: var(--wall); border: 2px solid var(--primary); color: white; border-radius: 12px; height: 60px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div style="margin-left: 90px" class="stat-box"><span id="txt-nivel" class="value">Nivel 1</span></div>
        <div class="stat-box"><span id="txt-vidas" class="value">❤️❤️❤️</span></div>
    </div>

    <button id="btn-salir" onclick="location.reload()">SALIR</button>
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
        <div style="grid-column: 2"><button class="btn-dir" onclick="moverBoton(0,-1)">↑</button></div>
        <button class="btn-dir" onclick="moverBoton(-1,0)">←</button>
        <button class="btn-dir" onclick="moverBoton(0,1)">↓</button>
        <button class="btn-dir" onclick="moverBoton(1,0)">→</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let nivel = 1, vidas = 3, grid = [], cols, rows, cellSize;
        let player = { x: 1, y: 1 }, goal = { x: 0, y: 0 };
        let isDragging = false;

        function init() {
            const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.75);
            canvas.width = size; canvas.height = size;
            
            // Dificultad escalable: Más niveles = Laberinto más denso
            cols = 7 + (nivel * 2); 
            rows = cols;
            cellSize = size / cols;
            
            generarLaberintoReal(cols, rows);
            player = { x: 1, y: 1 };
            goal = { x: cols - 2, y: rows - 2 };
            actualizarUI();
            dibujar();
        }

        // ALGORITMO DE PRIM (Laberintos perfectos)
        function generarLaberintoReal(w, h) {
            grid = Array(w).fill().map(() => Array(h).fill(1));
            const walls = [];
            
            function mazePath(x, y) {
                grid[x][y] = 0;
                [[x+2,y,x+1,y], [x-2,y,x-1,y], [x,y+2,x,y+1], [x,y-2,x,y-1]].forEach(dir => {
                    if(dir[0]>0 && dir[0]<w-1 && dir[1]>0 && dir[1]<h-1 && grid[dir[0]][dir[1]] === 1) {
                        walls.push(dir);
                    }
                });
            }

            mazePath(1, 1);
            while(walls.length > 0) {
                const index = Math.floor(Math.random() * walls.length);
                const [nx, ny, px, py] = walls.splice(index, 1)[0];
                if(grid[nx][ny] === 1) {
                    grid[px][py] = 0;
                    mazePath(nx, ny);
                }
            }
        }

        // LÓGICA DE ARRASTRE (DRAG)
        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', drag);
        canvas.addEventListener('mouseup', endDrag);
        canvas.addEventListener('touchstart', e => startDrag(e.touches[0]));
        canvas.addEventListener('touchmove', e => drag(e.touches[0]));
        canvas.addEventListener('touchend', endDrag);

        function startDrag(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = Math.floor((e.clientX - rect.left) / cellSize);
            const mouseY = Math.floor((e.clientY - rect.top) / cellSize);
            if(mouseX === player.x && mouseY === player.y) isDragging = true;
        }

        function drag(e) {
            if(!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const nx = Math.floor((e.clientX - rect.left) / cellSize);
            const ny = Math.floor((e.clientY - rect.top) / cellSize);

            if(nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                if(nx !== player.x || ny !== player.y) {
                    if(grid[nx][ny] === 1) {
                        chocar();
                        isDragging = false;
                    } else {
                        player.x = nx; player.y = ny;
                        if(player.x === goal.x && player.y === goal.y) ganar();
                        dibujar();
                    }
                }
            }
        }

        function endDrag() { isDragging = false; }

        function moverBoton(dx, dy) {
            const nx = player.x + dx;
            const ny = player.y + dy;
            if(grid[nx][ny] === 1) chocar();
            else {
                player.x = nx; player.y = ny;
                if(player.x === goal.x && player.y === goal.y) ganar();
            }
            dibujar();
        }

        function chocar() {
            vidas--;
            player = { x: 1, y: 1 };
            actualizarUI();
            if(vidas <= 0) { alert("Fin del juego"); location.reload(); }
        }

        function ganar() {
            nivel++;
            init();
        }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let x=0; x<cols; x++) {
                for(let y=0; y<rows; y++) {
                    if(grid[x][y] === 1) {
                        ctx.fillStyle = "#1e293b";
                        ctx.beginPath();
                        ctx.roundRect(x*cellSize+1, y*cellSize+1, cellSize-2, cellSize-2, 5);
                        ctx.fill();
                    }
                }
            }
            ctx.font = `${cellSize*0.7}px Arial`;
            ctx.fillText("🏁", goal.x*cellSize + cellSize*0.1, (goal.y+0.8)*cellSize);
            ctx.fillText("🚀", player.x*cellSize + cellSize*0.1, (player.y+0.8)*cellSize);
        }

        function actualizarUI() {
            document.getElementById('txt-nivel').innerText = "Nivel " + nivel;
            document.getElementById('txt-vidas').innerText = "❤️".repeat(vidas);
        }

        init();
    </script>
</body>
</html>
