<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Laberinto Espacial Pro - Perceptum</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --clin-bg: #0b101b;
            --clin-card: #ffffff;
            --clin-accent: #e91e63;
            --clin-cobalto: #0047ab;
            --clin-turquesa: #40e0d0;
            --path-glow: #00f2fe;
            --shadow-btn: #ad1457;
            --pared-color: #1e293b;
        }

        /* --- BASE Y RESET --- */
        * { 
            box-sizing: border-box; 
            touch-action: none; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        body {
            margin: 0; 
            background-color: var(--clin-bg); 
            color: #fff;
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: background-color 0.15s ease;
        }

        /* EFECTO FLASH ROJO DE IMPACTO */
        body.hit-flash { 
            background-color: #ff0000 !important; 
        }

        #starfield { 
            position: fixed; 
            inset: 0; 
            z-index: 0; 
            background: radial-gradient(circle at 50% 50%, #1c2331 0%, #0b101b 100%); 
        }

        /* --- COMPONENTES DE INTERFAZ (CARDS) --- */
        .overlay {
            position: fixed; 
            inset: 0; 
            background: rgba(11, 16, 27, 0.98);
            display: flex; 
            align-items: center; 
            justify-content: center;
            z-index: 2000; 
            padding: 20px; 
            backdrop-filter: blur(15px);
        }

        .card-clinica {
            background: var(--clin-card); 
            color: #1e293b; 
            padding: 45px 35px;
            border-radius: 45px; 
            text-align: center; 
            max-width: 520px; 
            width: 100%;
            border: 8px solid var(--clin-accent); 
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        h1 { font-size: 3.2rem; color: var(--clin-accent); margin: 0; font-weight: 900; letter-spacing: -1.5px; }
        .sub-titulo { font-weight: 700; color: #64748b; margin-top: 5px; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.9rem; }

        /* --- BOTONES ESTILO PERCEPTUM --- */
        .clin-btn {
            background: var(--clin-accent); 
            color: white; 
            border: none;
            padding: 24px; 
            border-radius: 60px; 
            font-weight: 900;
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 20px;
            box-shadow: 0 10px 0 var(--shadow-btn); 
            transition: all 0.1s; 
            width: 100%;
            font-size: 1.6rem; 
            display: block; 
            text-decoration: none;
            position: relative;
        }

        .clin-btn:active { 
            transform: translateY(6px); 
            box-shadow: 0 4px 0 var(--shadow-btn); 
        }

        .btn-secundario { 
            background: #64748b; 
            box-shadow: 0 10px 0 #475569; 
            font-size: 1.1rem;
            padding: 18px;
        }

        /* --- CONFIGURACIÓN DE MODOS --- */
        .config-box { 
            background: #f1f5f9; 
            border-radius: 30px; 
            padding: 30px; 
            margin: 25px 0; 
            color: #1e293b; 
            border: 2px solid #e2e8f0;
        }

        .modo-row { display: flex; gap: 15px; width: 100%; margin-bottom: 20px; }

        .modo-btn {
            flex: 1; 
            background: white; 
            border: 5px solid #cbd5e1; 
            color: #64748b;
            padding: 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.3s;
        }

        .modo-btn.active { 
            border-color: var(--clin-accent); 
            color: var(--clin-accent); 
            background: #fdf2f8; 
            transform: scale(1.05);
        }

        /* --- HUD Y JUEGO --- */
        #game-view { 
            width: 100%; height: 100%; position: relative; z-index: 10; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }

        #ui-layer {
            position: absolute; top: 30px; width: 100%; padding: 0 40px;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }

        .hud-top-btn { 
            background: var(--clin-accent); color:white; padding: 15px 25px; 
            border-radius: 18px; border:none; font-weight:900; cursor:pointer; 
            pointer-events: auto; font-size: 1.1rem; box-shadow: 0 6px 0 var(--shadow-btn);
        }

        .stat-box { 
            background: rgba(0,0,0,0.85); padding: 12px 22px; border-radius: 18px; 
            border: 3px solid var(--clin-accent); color: white; font-weight: 900;
            font-size: 1.3rem; min-width: 110px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #gameCanvas { 
            background: #161d2b; border-radius: 25px; 
            box-shadow: 0 0 60px rgba(0,0,0,0.8); border: 4px solid #334155; 
        }

        /* --- CONTROLES --- */
        #controls {
            position: absolute; bottom: 40px; right: 40px;
            display: grid; grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px); gap: 18px;
        }

        .btn-dir {
            background: #1c2331; border: 4px solid var(--clin-accent);
            color: var(--clin-accent); border-radius: 22px; font-size: 2.8rem;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 7px 0 #000; transition: 0.1s;
        }
        .btn-dir:active { transform: translateY(5px); box-shadow: 0 2px 0 #000; }

        /* --- RESPONSIVIDAD --- */
        @media (max-width: 768px) {
            #controls { right: 50%; transform: translateX(50%); bottom: 25px; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); }
            #gameCanvas { margin-bottom: 240px; }
            h1 { font-size: 2.4rem; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="scr-intro" class="overlay">
        <div class="card-clinica">
            <div style="font-size: 5rem; margin-bottom: 10px;">🚀</div>
            <h1>LABERINTO</h1>
            <p class="sub-titulo">Centro de Salud Perceptum</p>
            
            <div style="background: #fdf2f8; padding: 25px; border-radius: 25px; margin: 30px 0; border: 4px dashed var(--clin-accent);">
                <p style="margin: 0; color: #1e293b; font-weight: 800; font-size: 1.1rem;">INDICACIÓN MÉDICA:</p>
                <p style="margin: 10px 0 0 0; color: var(--clin-accent); font-weight: 900; font-size: 1.5rem;">Realizar a 40 cm de distancia.</p>
            </div>

            <button class="clin-btn" onclick="mostrarConfig()">COMENZAR TERAPIA</button>
            <a href="menu-relaciones.html" class="clin-btn btn-secundario">SALIR AL INICIO</a>
        </div>
    </div>

    <div id="scr-config" class="overlay" style="display:none">
        <div class="card-clinica">
            <h2 style="margin:0; font-weight:900; color:var(--clin-accent); font-size: 1.8rem;">ENTRENAMIENTO VISUAL</h2>
            <div class="config-box">
                <div class="modo-row">
                    <button id="mode-crono" class="modo-btn active" onclick="setModo('libre')">Libre</button>
                    <button id="mode-reloj" class="modo-btn" onclick="setModo('reto')">Reto Tiempo</button>
                </div>
                <div id="timer-setup" style="display:none">
                    <p style="font-weight:900; font-size: 1.3rem; margin-bottom: 15px;">Tiempo: <span id="val-tiempo" style="color:var(--clin-accent)">60</span>s</p>
                    <input type="range" id="range-tiempo" min="10" max="120" value="60" oninput="document.getElementById('val-tiempo').innerText=this.value" style="width:100%; accent-color:var(--clin-accent); height: 15px; cursor: pointer;">
                </div>
            </div>
            <button class="clin-btn" onclick="iniciarJuego()">¡DESPEGAR!</button>
            <button class="clin-btn btn-secundario" onclick="irInstrucciones()">← VOLVER A INSTRUCCIONES</button>
        </div>
    </div>

    <div id="scr-final" class="overlay" style="display:none">
        <div class="card-clinica">
            <h1 id="final-title" style="margin-bottom: 10px;">¡COMPLETADO!</h1>
            <div id="final-icon" style="font-size: 5rem; margin: 20px 0;">🌟</div>
            <p id="final-msg" style="font-size: 1.3rem; font-weight: 700; color: #475569;"></p>
            <div style="background: #f1f5f9; padding: 20px; border-radius: 20px; margin: 20px 0;">
                <p style="margin: 0; font-weight: 900; font-size: 1.8rem; color: var(--clin-accent);" id="final-stats"></p>
            </div>
            <button class="clin-btn" onclick="location.reload()">JUGAR DE NUEVO</button>
            <a href="menu-relaciones.html" class="clin-btn btn-secundario">MENU PRINCIPAL</a>
        </div>
    </div>

    <div id="game-view">
        <div id="ui-layer">
            <button class="hud-top-btn" onclick="location.reload()">SALIR</button>
            <div style="display:flex; gap:15px; pointer-events: none;">
                <div id="timer-box" class="stat-box" style="display:none">⏱️ <span id="txt-timer">0</span></div>
                <div class="stat-box"><span id="txt-nivel" style="color:var(--clin-turquesa)">NV 1</span></div>
                <div class="stat-box"><span id="txt-vidas">❤️❤️❤️</span></div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="controls">
            <button style="grid-column:2; grid-row:1" class="btn-dir" onclick="remover(0,-1)">↑</button>
            <button style="grid-column:1; grid-row:2" class="btn-dir" onclick="remover(-1,0)">←</button>
            <button style="grid-column:3; grid-row:2" class="btn-dir" onclick="remover(1,0)">→</button>
            <button style="grid-column:2; grid-row:3" class="btn-dir" onclick="remover(0,1)">↓</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let GAME = {
            active: false, modo: 'libre', nivel: 1, vidas: 3, grid: [],
            player: {x:1, y:1}, goal: {x:0, y:0}, dim: 0, cellSize: 0,
            isDrawing: false, plannedPath: [], isExecuting: false,
            tiempo: 0, timerInterval: null
        };

        function irInstrucciones() {
            document.getElementById('scr-config').style.display = 'none';
            document.getElementById('scr-intro').style.display = 'flex';
        }

        function mostrarConfig() {
            document.getElementById('scr-intro').style.display = 'none';
            document.getElementById('scr-config').style.display = 'flex';
        }

        function setModo(m) {
            GAME.modo = m;
            document.getElementById('mode-crono').classList.toggle('active', m==='libre');
            document.getElementById('mode-reloj').classList.toggle('active', m==='reto');
            document.getElementById('timer-setup').style.display = (m === 'reto') ? 'block' : 'none';
        }

        function triggerFinal(exito, razon) {
            GAME.active = false;
            clearInterval(GAME.timerInterval);
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('scr-final').style.display = 'flex';
            
            const title = document.getElementById('final-title');
            const msg = document.getElementById('final-msg');
            const stats = document.getElementById('final-stats');
            const icon = document.getElementById('final-icon');

            if(exito) {
                title.innerText = "¡META LOGRADA!";
                title.style.color = "var(--clin-turquesa)";
                icon.innerText = "🏆";
                msg.innerText = "Excelente precisión y control visual.";
            } else {
                title.innerText = "¡BUEN INTENTO!";
                title.style.color = "var(--clin-accent)";
                icon.innerText = "👨‍🚀";
                msg.innerText = razon || "Sigue entrenando para mejorar tus reflejos.";
            }
            stats.innerText = `Nivel: ${GAME.nivel}`;
        }

        function triggerError() {
            document.body.classList.add('hit-flash');
            setTimeout(() => document.body.classList.remove('hit-flash'), 250);
            
            if(GAME.vidas <= 0) {
                triggerFinal(false, "Te has quedado sin combustible (vidas).");
            }
        }

        function iniciarJuego() {
            document.getElementById('scr-config').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            GAME.active = true;
            
            if(GAME.modo === 'reto') {
                GAME.tiempo = parseInt(document.getElementById('range-tiempo').value);
                document.getElementById('timer-box').style.display = 'block';
                document.getElementById('txt-timer').innerText = GAME.tiempo;
                GAME.timerInterval = setInterval(() => {
                    if(!GAME.active) return;
                    GAME.tiempo--;
                    document.getElementById('txt-timer').innerText = GAME.tiempo;
                    if(GAME.tiempo <= 0) triggerFinal(false, "¡Se agotó el tiempo de la misión!");
                }, 1000);
            }
            
            generarNivel();
            initInputSystem();
            initEstrellas();
        }

        function generarNivel() {
            const hLimit = window.innerHeight * 0.58;
            const wLimit = window.innerWidth * 0.92;
            const size = Math.min(wLimit, hLimit);
            canvas.width = size; canvas.height = size;
            
            GAME.dim = Math.min(7 + (GAME.nivel * 2), 15);
            GAME.cellSize = size / GAME.dim;
            
            // Laberinto
            GAME.grid = Array(GAME.dim).fill().map(() => Array(GAME.dim).fill(true));
            const stack = [[1,1]];
            GAME.grid[1][1] = false;
            
            while(stack.length > 0) {
                let [x, y] = stack[stack.length-1];
                let neighbors = [[x+2,y,x+1,y],[x-2,y,x-1,y],[x,y+2,x,y+1],[x,y-2,x,y-1]]
                    .filter(n => n[0]>0 && n[0]<GAME.dim-1 && n[1]>0 && n[1]<GAME.dim-1 && GAME.grid[n[0]][n[1]]);
                if(neighbors.length > 0) {
                    let [nx, ny, px, py] = neighbors[Math.floor(Math.random()*neighbors.length)];
                    GAME.grid[nx][ny] = GAME.grid[px][py] = false;
                    stack.push([nx, ny]);
                } else stack.pop();
            }
            GAME.player = {x:1, y:1};
            GAME.goal = {x: GAME.dim-2, y: GAME.dim-2};
            dibujar();
        }

        function remover(dx, dy) {
            if(!GAME.active || GAME.isExecuting) return;
            moverLogica(dx, dy);
        }

        function moverLogica(dx, dy) {
            let nx = GAME.player.x + dx, ny = GAME.player.y + dy;
            if(nx >= 0 && ny >= 0 && nx < GAME.dim && ny < GAME.dim && !GAME.grid[nx][ny]) {
                GAME.player = {x:nx, y:ny};
                if(nx === GAME.goal.x && ny === GAME.goal.y) { 
                    GAME.nivel++; 
                    generarNivel(); 
                    actualizarHUD();
                }
            } else {
                GAME.vidas--;
                triggerError();
                GAME.player = {x:1, y:1};
                actualizarHUD();
            }
            dibujar();
        }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Paredes
            ctx.fillStyle = "#1e293b";
            for(let x=0; x<GAME.dim; x++) {
                for(let y=0; y<GAME.dim; y++) {
                    if(GAME.grid[x][y]) {
                        ctx.fillRect(x*GAME.cellSize+1, y*GAME.cellSize+1, GAME.cellSize-2, GAME.cellSize-2);
                    }
                }
            }

            // Rastro Neón
            if(GAME.plannedPath.length > 0) {
                ctx.strokeStyle = "#00f2fe";
                ctx.lineWidth = GAME.cellSize * 0.45;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00f2fe";
                ctx.beginPath();
                ctx.moveTo((GAME.player.x + 0.5) * GAME.cellSize, (GAME.player.y + 0.5) * GAME.cellSize);
                for(let p of GAME.plannedPath) ctx.lineTo((p.x + 0.5) * GAME.cellSize, (p.y + 0.5) * GAME.cellSize);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Elementos
            ctx.font = `${GAME.cellSize * 0.75}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🏁", (GAME.goal.x + 0.5) * GAME.cellSize, (GAME.goal.y + 0.5) * GAME.cellSize);
            ctx.fillText("🚀", (GAME.player.x + 0.5) * GAME.cellSize, (GAME.player.y + 0.5) * GAME.cellSize);
        }

        function initInputSystem() {
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { 
                    x: Math.floor((cx - rect.left) / GAME.cellSize), 
                    y: Math.floor((cy - rect.top) / GAME.cellSize) 
                };
            };

            canvas.onpointerdown = (e) => {
                if(!GAME.active || GAME.isExecuting) return;
                const p = getPos(e);
                if(p.x === GAME.player.x && p.y === GAME.player.y) {
                    GAME.isDrawing = true;
                    GAME.plannedPath = [];
                }
            };

            window.onpointermove = (e) => {
                if(!GAME.isDrawing || !GAME.active) return;
                const p = getPos(e);
                const last = GAME.plannedPath[GAME.plannedPath.length-1] || GAME.player;
                
                if((Math.abs(p.x - last.x) === 1 && p.y === last.y) || (Math.abs(p.y - last.y) === 1 && p.x === last.x)) {
                    if(!GAME.grid[p.x][p.y]) {
                        if(!GAME.plannedPath.some(s => s.x === p.x && s.y === p.y)) {
                            GAME.plannedPath.push(p);
                            dibujar();
                        }
                    } else {
                        GAME.isDrawing = false;
                        GAME.vidas--;
                        triggerError();
                        GAME.player = {x:1, y:1};
                        GAME.plannedPath = [];
                        actualizarHUD();
                        dibujar();
                    }
                }
            };

            window.onpointerup = () => {
                if(GAME.isDrawing && GAME.plannedPath.length > 0 && GAME.active) {
                    ejecutarVuelo();
                }
                GAME.isDrawing = false;
            };
        }

        async function ejecutarVuelo() {
            GAME.isExecuting = true;
            let path = [...GAME.plannedPath];
            GAME.plannedPath = [];
            for(let step of path) {
                if(!GAME.active) break;
                GAME.player = step;
                dibujar();
                await new Promise(r => setTimeout(r, 65));
                if(step.x === GAME.goal.x && step.y === GAME.goal.y) {
                    GAME.nivel++;
                    generarNivel();
                    actualizarHUD();
                    break;
                }
            }
            GAME.isExecuting = false;
            dibujar();
        }

        function actualizarHUD() {
            document.getElementById('txt-nivel').innerText = "NV " + GAME.nivel;
            document.getElementById('txt-vidas').innerText = "❤️❤️❤️".substring(0, GAME.vidas * 2);
        }

        function initEstrellas() {
            const sc = document.getElementById('starfield');
            const sctx = sc.getContext('2d');
            sc.width = window.innerWidth; sc.height = window.innerHeight;
            const stars = Array(100).fill().map(() => ({
                x: Math.random() * sc.width,
                y: Math.random() * sc.height,
                r: Math.random() * 1.5,
                v: 0.3 + Math.random()
            }));
            function anim() {
                sctx.clearRect(0,0,sc.width, sc.height);
                sctx.fillStyle = "rgba(255,255,255,0.8)";
                stars.forEach(s => {
                    sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill();
                    s.y += s.v; if(s.y > sc.height) s.y = 0;
                });
                requestAnimationFrame(anim);
            }
            anim();
        }
    </script>
</body>
</html>
