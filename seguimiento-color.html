<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seguimiento Mágico - Perceptum Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #818cf8; --success: #34d399; --bg: #0f172a; --cat: #fbbf24; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 200; backdrop-filter: blur(8px); }
        .card { background: white; color: #1e293b; padding: 30px; border-radius: 30px; max-width: 450px; width: 100%; text-align: center; border: 4px solid var(--primary); }
        
        .habilidades-box { background: #f1f5f9; border: 2px dashed var(--primary); color: #4338ca; padding: 15px; border-radius: 15px; font-size: 0.85rem; margin: 15px 0; }
        
        button { background: var(--success); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: 900; text-transform: uppercase; box-shadow: 0 8px 0 #059669; width: 100%; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #059669; }

        #ui-layer { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; }
        .stat-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .label { font-size: 0.6rem; text-transform: uppercase; display: block; opacity: 0.7; font-weight: 700; }
        .value { font-weight: 900; font-size: 1.1rem; }

        #goal-bar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 60%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.3); }
        #goal-bar-fill { width: 0%; height: 100%; background: var(--cat); transition: width 0.3s; }

        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="intro-screen" class="overlay">
        <div class="card">
            <h1 style="margin:0; font-size: 1.8rem;">✨ Seguimiento Mágico</h1>
            <div class="habilidades-box">
                <strong>MODO RELAJADO:</strong><br>
                Sigue al círculo para escuchar el ronroneo.
            </div>
            <p style="color: #64748b; font-size: 0.9rem;">Ideal para motilidad y estabilidad de fijación a 40 cm.</p>
            <button onclick="iniciarJuego()">¡EMPEZAR!</button>
        </div>
    </div>

    <div id="result-screen" class="overlay" style="display:none">
        <div class="card">
            <h2 id="result-title">¡Miauravilloso! 🐾</h2>
            <div id="metrics-summary" style="text-align: left; margin-bottom: 20px; font-size: 0.9rem; color: #475569;"></div>
            <button id="next-btn" onclick="proximoNivel()">Siguiente Nivel</button>
            <button onclick="location.reload()" style="background:#94a3b8; box-shadow:0 8px 0 #64748b; margin-top:10px;">Finalizar</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none">
        <div class="stat-box"><span class="label">Nivel</span><span id="txt-nivel" class="value">1</span></div>
        <div class="stat-box"><span class="label">Vidas</span><span id="txt-vidas" class="value">❤️❤️❤️</span></div>
    </div>

    <div id="goal-bar-container" style="display:none"><div id="goal-bar-fill"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Sonidos
        const audioWin = new Audio('https://assets.mixkit.co/active_storage/sfx/134/134-preview.mp3'); // Pajaritos
        
        // Generador de ronroneo (Audio Sintético para evitar fallos de carga)
        const AudioEngine = {
            ctx: new (window.AudioContext || window.webkitAudioContext)(),
            osc: null,
            gain: null,
            startPurr() {
                if(this.osc) return;
                this.osc = this.ctx.createOscillator();
                this.gain = this.ctx.createGain();
                this.lfo = this.ctx.createOscillator();
                this.lfoGain = this.ctx.createGain();

                this.osc.type = 'sawtooth';
                this.osc.frequency.value = 60; // Frecuencia baja tipo ronroneo
                this.lfo.frequency.value = 2; // Pulso del ronroneo
                this.lfoGain.gain.value = 30;

                this.gain.gain.value = 0.05;
                
                this.lfo.connect(this.lfoGain);
                this.lfoGain.connect(this.osc.frequency);
                this.osc.connect(this.gain);
                this.gain.connect(this.ctx.destination);
                
                this.osc.start();
                this.lfo.start();
            },
            stopPurr() {
                if(this.osc) {
                    this.osc.stop();
                    this.osc = null;
                }
            }
        };

        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";
        const ENTRIES = { paciente: "entry.369874016", juego: "entry.1353470174", nivel: "entry.721051298", aciertos: "entry.873272199", fallos: "entry.1030094511", tiempo: "entry.1303309812", fecha: "entry.845098414" };

        let nivelActual = 1, vidas = 3, segundosTotales = 0, segundosContacto = 0, fallosTotales = 0;
        let juegoActivo = false, enContacto = false, frameCount = 0;
        let x, y, dx, dy, radio, animId, tiempoMeta;
        const colores = ['#818cf8', '#34d399', '#fbbf24', '#f87171', '#a78bfa'];

        function ajustarDificultad() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radio = Math.max(35, 90 - (nivelActual * 5));
            let vel = 1.5 + (nivelActual * 0.4);
            dx = vel; dy = vel;
            tiempoMeta = 10 + (nivelActual * 3);
            if(!x) { x = canvas.width / 2; y = canvas.height / 2; }
        }

        function iniciarJuego() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('goal-bar-container').style.display = 'block';
            ajustarDificultad();
            segundosContacto = 0;
            juegoActivo = true;
            actualizarUI();
            render();
        }

        function actualizarUI() {
            document.getElementById('txt-nivel').innerText = nivelActual;
            document.getElementById('txt-vidas').innerText = "❤️".repeat(Math.max(0, vidas));
            document.getElementById('goal-bar-fill').style.width = (segundosContacto / tiempoMeta * 100) + "%";
        }

        const handleInput = (ex, ey) => {
            if(!juegoActivo) return;
            let dist = Math.sqrt((ex - x)**2 + (ey - y)**2);
            let previo = enContacto;
            enContacto = dist < (radio + 10); // Margen de error pequeño
            
            if (enContacto) {
                AudioEngine.startPurr();
            } else {
                AudioEngine.stopPurr();
            }
        };

        canvas.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => handleInput(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

        function finalizarJuego(exito) {
            juegoActivo = false;
            AudioEngine.stopPurr();
            cancelAnimationFrame(animId);
            if(exito) {
                audioWin.play();
                mostrarResultados("¡NIVEL COMPLETADO!", true);
            } else {
                mostrarResultados("SESIÓN FINALIZADA", false);
                enviarDatos();
            }
        }

        function mostrarResultados(titulo, exito) {
            document.getElementById('result-title').innerText = titulo;
            document.getElementById('metrics-summary').innerHTML = `
                • Nivel alcanzado: ${nivelActual}<br>
                • Tiempo en contacto: ${segundosContacto}s<br>
                • Pérdidas de foco: ${fallosTotales}
            `;
            document.getElementById('next-btn').style.display = exito ? "block" : "none";
            document.getElementById('result-screen').style.display = 'flex';
        }

        function enviarDatos() {
            const data = new FormData();
            data.append(ENTRIES.paciente, localStorage.getItem('paciente') || "Paciente_Seguimiento");
            data.append(ENTRIES.juego, "Seguimiento Mágico 🐾");
            data.append(ENTRIES.nivel, nivelActual);
            data.append(ENTRIES.aciertos, segundosContacto);
            data.append(ENTRIES.fallos, fallosTotales);
            data.append(ENTRIES.fecha, new Date().toLocaleDateString());
            fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: data });
        }

        function proximoNivel() { nivelActual++; iniciarJuego(); }

        function render() {
            if(!juegoActivo) return;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!enContacto) {
                frameCount++;
                if(frameCount > 120) { // 2 segundos fuera para perder vida
                    vidas--; fallosTotales++; frameCount = 0;
                    actualizarUI();
                    if(vidas <= 0) return finalizarJuego(false);
                }
            } else { frameCount = 0; }

            // Dibujo
            ctx.beginPath();
            ctx.arc(x, y, radio, 0, Math.PI * 2);
            ctx.fillStyle = colores[(nivelActual - 1) % colores.length];
            ctx.fill();
            if(enContacto) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = "white";
                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            ctx.closePath();
            ctx.shadowBlur = 0;

            x += dx; y += dy;
            if(x + radio > canvas.width || x - radio < 0) dx = -dx;
            if(y + radio > canvas.height || y - radio < 0) dy = -dy;

            animId = requestAnimationFrame(render);
        }

        setInterval(() => {
            if(juegoActivo && enContacto) {
                segundosContacto++;
                actualizarUI();
                if(segundosContacto >= tiempoMeta) finalizarJuego(true);
            }
        }, 1000);

        window.addEventListener('resize', ajustarDificultad);
    </script>
</body>
</html>
