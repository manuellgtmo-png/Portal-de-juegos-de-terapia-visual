<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seguimiento Mágico - Perceptum Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; }
        
        /* PANTALLAS */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 200; backdrop-filter: blur(8px); }
        .card { background: white; color: #1e293b; padding: 30px; border-radius: 30px; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 4px solid var(--primary); }
        
        .habilidades-box { background: #f1f5f9; border: 2px dashed var(--primary); color: #4338ca; padding: 15px; border-radius: 15px; font-size: 0.85rem; margin: 15px 0; }
        
        button { background: var(--success); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; font-weight: 900; text-transform: uppercase; box-shadow: 0 8px 0 #16a34a; width: 100%; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 4px 0 #16a34a; }

        /* HUD */
        #ui-layer { position: absolute; top: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; box-sizing: border-box; }
        .stat-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); min-width: 70px; text-align: center; pointer-events: auto; }
        .label { font-size: 0.65rem; text-transform: uppercase; display: block; opacity: 0.7; font-weight: 700; }
        .value { font-weight: 900; font-size: 1.2rem; }

        #goal-bar-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 60%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 2px solid white; }
        #goal-bar-fill { width: 0%; height: 100%; background: var(--success); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .loader { border: 6px solid #f3f3f3; border-top: 6px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="intro-screen" class="overlay">
        <div class="card">
            <h1 style="margin:0; font-size: 1.8rem;">✨ Seguimiento Mágico</h1>
            <div class="habilidades-box">
                <strong>OBJETIVO CLÍNICO:</strong><br>
                Seguimiento Suave, Motilidad y Estabilidad de Fijación.
            </div>
            <p style="color: #64748b; font-size: 0.9rem;">Sigue el círculo con el dedo o puntero. El sonido indica que lo estás haciendo bien.</p>
            <button onclick="iniciarJuego()">¡COMENZAR!</button>
        </div>
    </div>

    <div id="pause-screen" class="overlay" style="display:none">
        <div class="card">
            <h2 style="color: var(--primary)">SESIÓN EN PAUSA</h2>
            <p style="color: #64748b">Descansa la vista un momento.</p>
            <button onclick="reanudarJuego()" style="background: var(--primary); box-shadow: 0 8px 0 #4338ca;">CONTINUAR</button>
        </div>
    </div>

    <div id="sync-screen" class="overlay" style="display:none">
        <div class="card">
            <div class="loader"></div>
            <h3>Guardando sesión...</h3>
        </div>
    </div>

    <div id="result-screen" class="overlay" style="display:none">
        <div class="card">
            <h2 id="result-title">¡Excelente!</h2>
            <div id="metrics-summary" style="text-align: left; margin-bottom: 20px; font-size: 0.9rem; color: #475569;"></div>
            <button id="next-btn" onclick="proximoNivel()">Siguiente Nivel</button>
            <button id="retry-btn" onclick="location.reload()" style="background:#94a3b8; box-shadow:0 8px 0 #64748b; margin-top:10px;">Finalizar</button>
        </div>
    </div>

    <div id="ui-layer" style="display:none">
        <div class="stat-box"><span class="label">Nivel</span><span id="txt-nivel" class="value">1</span></div>
        <div class="stat-box" onclick="pausarJuego()" style="cursor:pointer"><span class="label">Tiempo</span><span id="txt-cronometro" class="value">00:00</span></div>
        <div class="stat-box"><span class="label">Vidas</span><span id="txt-vidas" class="value">❤️❤️❤️</span></div>
    </div>

    <div id="goal-bar-container" style="display:none"><div id="goal-bar-fill"></div></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Audios (Mixkit direct links corregidos)
        const audioWin = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3');
        const audioContact = new Audio('https://assets.mixkit.co/active_storage/sfx/610/610-preview.mp3'); 
        audioContact.loop = true;
        audioContact.volume = 0.2;

        // Configuración Google Sheets (Perceptum SpA)
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSeLlcvlhrTSHDhvxctLghiM3caGsgBL2wdaT7nBxrz6UARwYg/formResponse";
        const ENTRIES = { paciente: "entry.369874016", juego: "entry.1353470174", nivel: "entry.721051298", aciertos: "entry.873272199", fallos: "entry.1030094511", tiempo: "entry.1303309812", fecha: "entry.845098414" };

        let nivelActual = 1, vidas = 3, segundosTotales = 0, segundosContacto = 0, fallosTotales = 0;
        let juegoActivo = false, enContacto = false, frameCount = 0;
        let x, y, dx, dy, radio, animId;
        const colores = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#a855f7'];

        function ajustarDificultad() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Reducción de tamaño más gradual para control clínico
            radio = Math.max(40, 100 - (nivelActual * 6));
            // Velocidad: progresión suave para evitar saltos sacádicos involuntarios
            let vel = 1.8 + (nivelActual * 0.5);
            dx = vel; dy = vel;
            // Meta: tiempo de contacto necesario para pasar
            tiempoMeta = 10 + (nivelActual * 5);
            if(!x) { x = canvas.width / 2; y = canvas.height / 2; }
        }

        function iniciarJuego() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'flex';
            document.getElementById('goal-bar-container').style.display = 'block';
            ajustarDificultad();
            segundosContacto = 0;
            actualizarUI();
            juegoActivo = true;
            render();
        }

        function pausarJuego() {
            juegoActivo = false;
            audioContact.pause();
            document.getElementById('pause-screen').style.display = 'flex';
        }

        function reanudarJuego() {
            document.getElementById('pause-screen').style.display = 'none';
            juegoActivo = true;
            render();
        }

        function actualizarUI() {
            document.getElementById('txt-nivel').innerText = nivelActual;
            document.getElementById('txt-vidas').innerText = "❤️".repeat(Math.max(0, vidas));
            document.getElementById('goal-bar-fill').style.width = (segundosContacto / tiempoMeta * 100) + "%";
            let min = Math.floor(segundosTotales / 60), seg = segundosTotales % 60;
            document.getElementById('txt-cronometro').innerText = `${min}:${seg < 10 ? '0' : ''}${seg}`;
        }

        const handleInput = (ex, ey) => {
            if(!juegoActivo) return;
            let dist = Math.sqrt((ex - x)**2 + (ey - y)**2);
            enContacto = dist < radio;
            
            if (enContacto) {
                if (audioContact.paused) audioContact.play().catch(()=>{});
            } else {
                audioContact.pause();
            }
        };

        canvas.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => handleInput(e.touches[0].clientX, e.touches[0].clientY));
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleInput(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        function finalizarJuego(exito) {
            juegoActivo = false;
            audioContact.pause();
            cancelAnimationFrame(animId);
            
            if(exito) {
                audioWin.play();
                mostrarResultados("¡NIVEL COMPLETADO!", true);
            } else {
                document.getElementById('sync-screen').style.display = 'flex';
                enviarDatos(() => {
                    document.getElementById('sync-screen').style.display = 'none';
                    mostrarResultados("SESIÓN FINALIZADA", false);
                });
            }
        }

        function mostrarResultados(titulo, exito) {
            const screen = document.getElementById('result-screen');
            document.getElementById('result-title').innerText = titulo;
            document.getElementById('metrics-summary').innerHTML = `
                • Tiempo Total: ${document.getElementById('txt-cronometro').innerText}<br>
                • Tiempo en Contacto: ${segundosContacto}s<br>
                • Pérdidas de Seguimiento: ${fallosTotales}
            `;
            document.getElementById('next-btn').style.display = exito ? "block" : "none";
            screen.style.display = 'flex';
        }

        function enviarDatos(callback) {
            const nombre = localStorage.getItem('paciente') || "Paciente_Anonimo";
            const data = new FormData();
            data.append(ENTRIES.paciente, nombre);
            data.append(ENTRIES.juego, "Seguimiento Mágico");
            data.append(ENTRIES.nivel, nivelActual);
            data.append(ENTRIES.aciertos, segundosContacto);
            data.append(ENTRIES.fallos, fallosTotales);
            data.append(ENTRIES.tiempo, document.getElementById('txt-cronometro').innerText);
            data.append(ENTRIES.fecha, new Date().toISOString().split('T')[0]);

            fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: data })
                .then(() => setTimeout(callback, 1500));
        }

        function proximoNivel() { nivelActual++; iniciarJuego(); }

        function render() {
            if(!juegoActivo) return;
            
            // Efecto de rastro suave
            ctx.fillStyle = 'rgba(15, 23, 42, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!enContacto) {
                frameCount++;
                ctx.globalAlpha = 0.3;
                // Si pasa 1.5 segundos fuera (90 frames a 60fps), pierde vida
                if(frameCount > 90) { 
                    vidas--; fallosTotales++; frameCount = 0; 
                    actualizarUI();
                    if(vidas <= 0) return finalizarJuego(false);
                }
            } else { 
                frameCount = 0; 
                ctx.globalAlpha = 1.0;
                // Glow effect cuando hay contacto
                ctx.shadowBlur = 30;
                ctx.shadowColor = colores[(nivelActual - 1) % colores.length];
            }

            // Dibujo del estímulo
            ctx.beginPath();
            ctx.arc(x, y, radio, 0, Math.PI * 2);
            ctx.fillStyle = colores[(nivelActual - 1) % colores.length];
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.closePath();
            ctx.shadowBlur = 0;

            // Movimiento
            x += dx; y += dy;
            if(x + radio > canvas.width || x - radio < 0) dx = -dx;
            if(y + radio > canvas.height || y - radio < 0) dy = -dy;

            animId = requestAnimationFrame(render);
        }

        // Timer de segundos
        setInterval(() => {
            if(juegoActivo) {
                segundosTotales++;
                if(enContacto) segundosContacto++;
                actualizarUI();
                if(segundosContacto >= tiempoMeta) finalizarJuego(true);
            }
        }, 1000);

        window.addEventListener('resize', ajustarDificultad);
    </script>
</body>
</html>
