<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seguimiento Mágico v2.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --primary: #818cf8; --success: #34d399; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .card { background: white; color: #1e293b; padding: 2rem; border-radius: 2rem; text-align: center; width: 85%; max-width: 400px; }
        
        button { background: var(--success); color: white; border: none; padding: 1.2rem; border-radius: 1rem; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 6px 0 #059669; text-transform: uppercase; }
        button:active { transform: translateY(3px); box-shadow: 0 3px 0 #059669; }

        #ui { position: absolute; top: 0; width: 100%; padding: 1rem; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; pointer-events: none; }
        .stat { background: rgba(255,255,255,0.15); padding: 0.5rem 1rem; border-radius: 1rem; text-align: center; }
        
        #goal-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 60%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid white; }
        #fill { width: 0%; height: 100%; background: var(--success); transition: width 0.2s; }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="intro" class="overlay">
        <div class="card">
            <h1 style="margin-top:0">Seguimiento Mágico</h1>
            <p style="font-size: 0.9rem; color: #64748b">Sigue el círculo con el dedo.<br>Distancia sugerida: <b>40 cm</b>.</p>
            <button onclick="start()">¡COMENZAR!</button>
        </div>
    </div>

    <div id="ui" style="display:none">
        <div class="stat"><small>NIVEL</small><br><b id="lv">1</b></div>
        <div class="stat"><small>VIDAS</small><br><b id="vd">❤️❤️❤️</b></div>
    </div>

    <div id="goal-bar" style="display:none"><div id="fill"></div></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Sonidos reales y suaves
        const sndContact = new Audio('https://assets.mixkit.co/active_storage/sfx/134/134-preview.mp3'); // Pajaritos
        sndContact.loop = true;
        const sndWin = new Audio('https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3'); // Triángulo/Éxito

        let level = 1, lives = 3, targetSecs = 10, contactSecs = 0;
        let x, y, dx, dy, radius, active = false, isTouching = false;
        let frameCount = 0;
        const colors = ['#818cf8', '#34d399', '#fbbf24', '#f87171', '#a78bfa'];

        function initLevel() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radius = Math.max(35, 85 - (level * 5));
            let speed = 1.6 + (level * 0.4);
            dx = speed; dy = speed;
            targetSecs = 8 + (level * 2);
            contactSecs = 0;
            if(!x) { x = canvas.width/2; y = canvas.height/2; }
            document.getElementById('lv').innerText = level;
            document.getElementById('vd').innerText = "❤️".repeat(lives);
        }

        function start() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('goal-bar').style.display = 'block';
            initLevel();
            active = true;
            render();
        }

        // Lógica de Entrada (Mouse y Touch corregida)
        function handlePos(ex, ey, state) {
            if(!active) return;
            isTouching = state;
            let dist = Math.sqrt((ex - x)**2 + (ey - y)**2);
            let inContact = isTouching && dist < (radius + 15);

            if(inContact) {
                if(sndContact.paused) sndContact.play().catch(()=>{});
            } else {
                sndContact.pause();
                sndContact.currentTime = 0;
            }
            return inContact;
        }

        // Eventos para evitar el "pegado"
        window.addEventListener('mousedown', e => handlePos(e.clientX, e.clientY, true));
        window.addEventListener('mouseup', () => handlePos(0,0, false));
        window.addEventListener('mousemove', e => { if(isTouching) handlePos(e.clientX, e.clientY, true); });

        canvas.addEventListener('touchstart', e => handlePos(e.touches[0].clientX, e.touches[0].clientY, true));
        canvas.addEventListener('touchmove', e => { 
            e.preventDefault(); 
            handlePos(e.touches[0].clientX, e.touches[0].clientY, true); 
        }, {passive: false});
        canvas.addEventListener('touchend', () => handlePos(0,0, false));
        canvas.addEventListener('touchcancel', () => handlePos(0,0, false));

        function render() {
            if(!active) return;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Verificar contacto real en este frame
            let dist = 999;
            // Si no hay toque, aumentar contador de pérdida de vida
            if(!isTouching) {
                frameCount++;
                if(frameCount > 120) { // 2 segundos fuera
                    lives--;
                    frameCount = 0;
                    document.getElementById('vd').innerText = "❤️".repeat(Math.max(0, lives));
                    if(lives <= 0) location.reload();
                }
            } else {
                frameCount = 0;
            }

            // Dibujar círculo
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = colors[(level-1) % colors.length];
            ctx.fill();
            
            // Glow solo si hay contacto físico real
            if(isTouching && sndContact.paused === false) {
                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            ctx.closePath();

            // Movimiento
            x += dx; y += dy;
            if(x + radius > canvas.width || x - radius < 0) dx *= -1;
            if(y + radius > canvas.height || y - radius < 0) dy *= -1;

            requestAnimationFrame(render);
        }

        // Timer de progreso
        setInterval(() => {
            if(active && !sndContact.paused) {
                contactSecs++;
                document.getElementById('fill').style.width = (contactSecs / targetSecs * 100) + "%";
                if(contactSecs >= targetSecs) {
                    active = false;
                    sndContact.pause();
                    sndWin.play();
                    setTimeout(() => { level++; initLevel(); active = true; render(); }, 1500);
                }
            }
        }, 1000);

    </script>
</body>
</html>
