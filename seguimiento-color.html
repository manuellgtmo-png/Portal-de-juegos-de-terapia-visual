<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Seguimiento Mágico v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --primary: #818cf8; --danger: #ef4444; --success: #22c55e; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; touch-action: none; }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .card { background: white; color: #1e293b; padding: 2rem; border-radius: 2rem; text-align: center; width: 85%; max-width: 400px; border: 5px solid var(--primary); }
        
        button { background: var(--success); color: white; border: none; padding: 1.2rem; border-radius: 1rem; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 6px 0 #16a34a; text-transform: uppercase; font-size: 1.2rem; }
        
        #ui { position: absolute; top: 0; width: 100%; padding: 1rem; display: flex; justify-content: space-between; z-index: 100; box-sizing: border-box; pointer-events: none; }
        .stat { background: rgba(255,255,255,0.15); padding: 0.5rem 1rem; border-radius: 1rem; text-align: center; backdrop-filter: blur(5px); min-width: 80px; }
        
        #goal-bar { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 65%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 2px solid white; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--success); transition: width 0.3s linear; }
        
        canvas { display: block; }
        #flash { position: fixed; inset: 0; background: rgba(239, 68, 68, 0.4); display: none; pointer-events: none; z-index: 150; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="intro" class="overlay">
        <div class="card">
            <h1 style="margin-top:0; color: var(--primary); font-size: 1.8rem;">✨ Seguimiento Mágico</h1>
            <p style="color: #64748b; line-height: 1.4;">Mantén el dedo sobre el círculo.<br>¡Cuidado con tocar fuera!</p>
            <button onclick="start()">¡JUGAR!</button>
        </div>
    </div>

    <div id="ui" style="display:none">
        <div class="stat"><small>NIVEL</small><br><b id="lv">1</b></div>
        <div class="stat"><small>VIDAS</small><br><b id="vd">❤️❤️❤️</b></div>
    </div>

    <div id="goal-bar" style="display:none"><div id="fill"></div></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // SONIDOS DE BURBUJAS Y ÉXITO
        const sndBubble = new Audio('https://assets.mixkit.co/active_storage/sfx/707/707-preview.mp3'); // Burbuja constante
        const sndError = new Audio('https://assets.mixkit.co/active_storage/sfx/441/441-preview.mp3'); // Pop seco
        const sndWin = new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'); // Campana

        let level = 1, lives = 3, targetSecs = 10, contactSecs = 0;
        let x, y, dx, dy, radius, active = false, isTouching = false;
        let frameCount = 0, canLoseLife = true;
        const colors = ['#818cf8', '#34d399', '#fbbf24', '#f87171', '#a78bfa'];

        function initLevel() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            radius = Math.max(35, 80 - (level * 4));
            let speed = 1.7 + (level * 0.3);
            dx = speed; dy = speed;
            targetSecs = 6 + (level * 2);
            contactSecs = 0;
            if(!x) { x = canvas.width/2; y = canvas.height/2; }
            document.getElementById('lv').innerText = level;
            document.getElementById('vd').innerText = "❤️".repeat(lives);
            document.getElementById('fill').style.width = "0%";
        }

        function start() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('goal-bar').style.display = 'block';
            initLevel();
            active = true;
            render();
        }

        function penalizar() {
            if(!canLoseLife) return; // Evita perder vidas en ráfaga
            
            canLoseLife = false;
            lives--;
            document.getElementById('vd').innerText = "❤️".repeat(Math.max(0, lives));
            
            // Efecto Visual
            const flash = document.getElementById('flash');
            flash.style.display = 'block';
            sndError.play();
            
            setTimeout(() => { 
                flash.style.display = 'none'; 
                canLoseLife = true; // Recupera la capacidad de perder vida tras 1 segundo
            }, 1000);

            if(lives <= 0) setTimeout(() => location.reload(), 500);
        }

        function checkContact(ex, ey) {
            let dist = Math.sqrt((ex - x)**2 + (ey - y)**2);
            let hitting = dist < (radius + 15);
            
            if(hitting) {
                if(sndBubble.paused) {
                    sndBubble.currentTime = 0;
                    sndBubble.play().catch(()=>{});
                }
            } else {
                sndBubble.pause();
                if(isTouching) penalizar(); // Si está tocando pero fuera del círculo
            }
            return hitting;
        }

        // Eventos corregidos
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            isTouching = true;
            checkContact(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            checkContact(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            isTouching = false;
            sndBubble.pause();
        });

        function render() {
            if(!active) return;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Penalización por no tocar la pantalla (pérdida de rastro)
            if(!isTouching) {
                frameCount++;
                if(frameCount > 110) { // ~2 segundos de gracia
                    penalizar();
                    frameCount = 0;
                }
            } else {
                frameCount = 0;
            }

            // Dibujar Círculo con Glow
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = colors[(level-1) % colors.length];
            if(isTouching && !sndBubble.paused) {
                ctx.shadowBlur = 25;
                ctx.shadowColor = "white";
            }
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;

            // Movimiento
            x += dx; y += dy;
            if(x + radius > canvas.width || x - radius < 0) dx *= -1;
            if(y + radius > canvas.height || y - radius < 0) dy *= -1;

            requestAnimationFrame(render);
        }

        // Timer de contacto
        setInterval(() => {
            if(active && isTouching && !sndBubble.paused) {
                contactSecs++;
                let porc = (contactSecs / targetSecs * 100);
                document.getElementById('fill').style.width = porc + "%";
                if(contactSecs >= targetSecs) {
                    active = false;
                    sndBubble.pause();
                    sndWin.play();
                    setTimeout(() => { 
                        level++; 
                        initLevel(); 
                        active = true; 
                        render(); 
                    }, 1500);
                }
            }
        }, 1000);
    </script>
</body>
</html>
